- entry_id: http://arxiv.org/abs/2602.24196v1
  short_id: 2602.24196v1
  title: Linear Polarization Variations and Circular Polarization are Common Among
    Airless Bodies
  authors:
  - name: Sloane J. Wiktorowicz
    affiliation: []
  - name: Amanda J. Bayless
    affiliation: []
  - name: Larissa A. Nofi
    affiliation: []
  summary: Using the POLISH2 polarimeter at the Lick Observatory Shane 3-m and Nickel
    1-m telescopes, we discover rotation phase-locked variations in linear polarization
    to be common among asteroids and a NEO in a clear, 383 to 720 nm bandpass. Essentially
    all bodies in our eight-year study harbor statistically significant, repeatable
    linear polarization variations at the $0.01\% = 100$ ppm level or above (1 Ceres,
    2 Pallas, 3 Juno, 4 Vesta, 6 Hebe, 7 Iris, 12 Victoria, 15 Eunomia, 16 Psyche,
    132 Aethra, 216 Kleopatra, and 65803 Didymos). Since polarimetry is a differential
    technique, such variations cannot be due to shape changes and must be caused by
    heterogeneity in surface albedo and/or composition. While (4) Vesta has long been
    known to exhibit large, repeatable polarization variations across its surface,
    we discover the variations on (6) Hebe, (12) Victoria, and (65803) Didymos to
    be 1.5 to 3.5 times as large. We hypothesize that the \textit{DART} impact with
    Dimorphos blanketed Didymos with depolarizing ejecta, which suggests pristine
    variations across Didymos to have been even larger. As the only NEO in this study
    with data quality sufficient to investigate polarization variations, Didymos'
    huge variations suggest they may be common among NEOs. We also discover optical
    circular polarization to be enhanced for low-albedo, M type asteroids, which is
    correlated with their large radar albedos. Thus, we present optical circular polarimetry
    as an alternative method for the identification of metalliferous bodies.
