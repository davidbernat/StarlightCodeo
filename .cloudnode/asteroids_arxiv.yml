  title: Oort cloud perturbations as a source of hyperbolic Earth impactors
  authors:
  - name: Eloy Peña-Asensio
    affiliation: []
  - name: Jaakko Visuri
    affiliation: []
  - name: Josep M. Trigo-Rodríguez
    affiliation: []
