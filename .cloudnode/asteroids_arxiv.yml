  summary: Citizen science offers an opportunity for ordinary people, known as citizen
    scientists or citizen astronomers in the context of astronomy, to contribute to
    scientific research. The Pan-African Citizen Science e-Lab (PACS e-Lab) was founded
    to promote and engage the African public in citizen science and soft astronomy
    research to advance space research and exploration and enhance space education
    and outreach. PACS e-Lab, in collaboration with several international astronomy
    research, education, and outreach organizations, currently runs several projects
    including but not limited to asteroid search, exoplanet photometry, research writing
    for peer-reviewed publications, astrophoto visual development, and Amateur Radio
    contact with astronauts aboard the International Space Station (ARISS). Despite
    several challenges, the group has engaged over 600 Africans from more than 40
    countries and is working towards covering the entire continent in the future.
    PACS e-Lab's development efforts resonate with seven United Nations Sustainable
    Development Goals (UN-SDGs).
