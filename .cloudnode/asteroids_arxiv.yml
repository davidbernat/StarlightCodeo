- entry_id: http://arxiv.org/abs/2503.17311v2
  short_id: 2503.17311v2
  title: Early solar wind and dynamo magnetic field topology predictions for (16)
    Psyche and other asteroids
  authors:
  - name: Atma Anand
    affiliation: []
  - name: Jonathan Carroll-Nellenback
    affiliation: []
  - name: Eric G. Blackman
    affiliation: []
  - name: John A. Tarduno
    affiliation: []
  summary: Asteroid (16) Psyche is a metal-rich body that might record an ancient
    coherent magnetization if some relict crust or mantle is preserved. Herein, we
    use magnetohydrodynamic simulations to predict (16) Psyche's field topology for
    several distinct pathways, (i) an early solar wind-induced magnetization imparted
    after a larger body was impacted, forming the present-day asteroid, (ii) a core
    dynamo magnetization imparted in an asteroid that is either presently largely
    intact or was a rubble pile, and (iii) magnetization in the turbulent solar nebula
    disk. For pathway (i) we find the field to be predominantly dipolar and spin axis-aligned.
    For pathway (ii) we find the field to be either dipolar and spin axis-misaligned,
    or highly multipolar. We also find that (iii) a field produced earlier before
    the solar nebula cleared, would be highly multipolar. In cases (i) and (ii) we
    also place constraints on the field strength. Simple detection of a magnetic field
    without constraining its topology and temporal variability would be insufficient
    to confirm a remanent source, due to the influence of the present-day solar wind,
    electromagnetic induction, and (16) Psyche's high obliquity. For sufficiently
    strong fields however, the field topology and orientation may reveal key observable
    consequences of the nature and history of (16) Psyche. Our framework is also broadly
    applicable to the study of magnetic fields from other asteroids.
