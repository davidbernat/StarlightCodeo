- entry_id: http://arxiv.org/abs/2512.12203v2
  short_id: 2512.12203v2
  title: Navigation Around Unknown Space Objects Using Visible-Thermal Image Fusion
  authors:
  - name: Eric J. Elias
    affiliation: []
  - name: Michael Esswein
    affiliation: []
  - name: Jonathan P. How
    affiliation: []
  - name: David W. Miller
    affiliation: []
  summary: As the popularity of on-orbit operations grows, so does the need for precise
    navigation around unknown resident space objects (RSOs) such as other spacecraft,
    orbital debris, and asteroids. The use of Simultaneous Localization and Mapping
    (SLAM) algorithms is often studied as a method to map out the surface of an RSO
    and find the inspector's relative pose using a lidar or conventional camera. However,
    conventional cameras struggle during eclipse or shadowed periods, and lidar, though
    robust to lighting conditions, tends to be heavier, bulkier, and more power-intensive.
    Thermal-infrared cameras can track the target RSO throughout difficult illumination
    conditions without these limitations. While useful, thermal-infrared imagery lacks
    the resolution and feature-richness of visible cameras. In this work, images of
    a target satellite in low Earth orbit are photo-realistically simulated in both
    visible and thermal-infrared bands. Pixel-level fusion methods are used to create
    visible/thermal-infrared composites that leverage the best aspects of each camera.
    Navigation errors from a monocular SLAM algorithm are compared between visible,
    thermal-infrared, and fused imagery in various lighting and trajectories. Fused
    imagery yields substantially improved navigation performance over visible-only
    and thermal-only methods.
