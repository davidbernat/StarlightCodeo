- entry_id: http://arxiv.org/abs/2604.09762v1
  short_id: 2604.09762v1
  title: High-energy neutrino constraints on primordial black holes as dark matter
  authors:
  - name: Mainak Mukhopadhyay
    affiliation: []
  - name: Joaquim Iguaz Juan
    affiliation: []
  summary: Primordial black holes (PBHs) are one of the most appealing dark matter
    candidates over a wide range of masses and abundances. This broad parameter space
    has been constrained by a variety of observational probes. In this work, for the
    first time, we use data from high-energy neutrino telescopes, like IceCube and
    ANTARES, to constrain sub-asteroid mass ($\lesssim 10^{18}\,\mathrm{g}$) Schwarzschild
    PBHs with extended mass functions. We derive limits from the diffuse high-energy
    neutrino flux produced by the direct evaporation of PBHs, as well as from the
    transient signatures associated with PBHs passing in the vicinity of the Earth.
    While our bounds are slightly weaker than existing constraints from gamma-ray
    observations, they provide an independent and complementary probe based on observational
    high-energy neutrino data. We further show that future detectors such as IceCube-Gen2
    and KM3NeT can significantly improve these constraints, potentially excluding
    PBHs with masses up to $\sim \mathrm{few} \times 10^{18}\,\mathrm{g}$ composing
    the entirety of dark matter.
