  title: Estimates of Rotation Periods for Jupiter Trojans with the Zwicky Transient
    Facility Photometric Lightcurves
  authors:
  - name: Zhuofu Li
    affiliation: []
  - name: Yasin A. Chowdhury
    affiliation: []
  - name: Željko Ivezić
