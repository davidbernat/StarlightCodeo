- entry_id: http://arxiv.org/abs/2410.00326v1
  short_id: 2410.00326v1
  title: Resonant amplitude distribution of the Hilda asteroids and the free-floating
    planet flyby scenario
  authors:
  - name: Jian Li
    affiliation: []
  - name: Zhihong Jeff Xia
    affiliation: []
  - name: Hanlun Lei
    affiliation: []
  - name: Nikolaos Georgakarakos
    affiliation: []
  - name: Fumi Yoshida
    affiliation: []
  - name: Xin Li
    affiliation: []
  summary: 'In some recent work, we provided a quantitative explanation for the number
    asymmetry of Jupiter Trojans by hypothesizing a free-floating planet (FFP) flyby
    into the Solar System. In support of that explanation, this paper examines the
    influence of the same FFP flyby on the Hilda asteroids, which orbit stably in
    the 3:2 mean motion resonance with Jupiter. The observed Hilda population exhibits
    two distinct resonant patterns: (1) a lack of Hildas with resonant amplitudes
    < 40 deg. at eccentricities < 0.1; (2) a nearly complete absence of Hildas with
    amplitudes < 20 deg., regardless of eccentricity. Previous models of Jupiter migration
    and resonance capture could account for the eccentricity distribution of Hildas
    but have failed to replicate the unusual absence of those with the smallest resonant
    amplitudes, which theoretically should be the most stable. Here we report that
    the FFP flyby can trigger an extremely rapid outward migration of Jupiter, causing
    a sudden shift in the 3:2 Jovian resonance. Consequently, Hildas with varying
    eccentricities would have their resonant amplitudes changed by different degrees,
    leading to the observed resonant patterns. We additionally show that, in our FFP
    flyby scenario, these patterns are consistently present across different resonant
    amplitude distributions of primordial Hildas arising from various formation models.
    We also place constraints on the potential parameters of the FFP, suggesting it
    should have an eccentricity of 1-1.3 or larger, an inclination up to 30 deg. or
    higher, and a minimum mass of about 50 Earth masses.'
