- entry_id: http://arxiv.org/abs/2404.03779v3
  short_id: 2404.03779v3
  title: Primordial black holes and induced gravitational waves in non-singular matter
    bouncing cosmology
  authors:
  - name: Theodoros Papanikolaou
    affiliation: []
  - name: Shreya Banerjee
    affiliation: []
  - name: Yi-Fu Cai
    affiliation: []
  - name: Salvatore Capozziello
    affiliation: []
  - name: Emmanuel N. Saridakis
    affiliation: []
  summary: We present a novel model-independent generic mechanism for primordial black
    hole formation within the context of non-singular matter bouncing cosmology. In
    particular, considering a short duration transition from the matter contracting
    phase to the Hot Big Bang expanding Universe, we find naturally enhanced curvature
    perturbations on very small scales which can collapse and form primordial black
    holes. Interestingly, the primordial black hole masses that we find can lie within
    the observationally unconstrained asteroid-mass window, potentially explaining
    the totality of dark matter. Remarkably, the enhanced curvature perturbations,
    collapsing to primordial black holes, can induce as well a stochastic gravitational-wave
    background, being potentially detectable by future experiments, in particular
    by SKA, PTAs, LISA and ET, hence serving as a new portal to probe the potential
    bouncing nature of the initial conditions prevailed in the early Universe.
