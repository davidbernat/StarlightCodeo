- entry_id: http://arxiv.org/abs/2409.12063v4
  short_id: 2409.12063v4
  title: Post-Keplerian perturbations of the hyperbolic motion in the field of a rotating
    massive object. Analysis in terms of osculating and nonosculating (contact) elements
  authors:
  - name: Lorenzo Iorio
    affiliation: []
  summary: The perturbations of the hyperbolic motion of a test particle due to the
    general relativistic gravitoelectromagnetic Schwarzschild and Lense-Thirring components
    of the gravitational field of a rotating massive body are analytically worked
    out to the first post-Newtonian level in terms of the osculating Keplerian orbital
    elements. To the Newtonian order, the impact of the quadrupole mass moment of
    the source is calculated as well. The resulting analytical expressions are valid
    for a generic orientation in space of both the orbital plane of the probe and
    the spin axis of the primary, and for arbitrary values of the eccentricity. They
    are applied to 'Oumuamua, an interstellar asteroid which recently visited our
    solar system along an unbound heliocentric orbit, and to the Near Earth Asteroid
    Rendezvous (NEAR) spacecraft during its flyby of the Earth. The calculational
    approach developed can be straightforwardly extended to any alternative models
    of gravity as well.
