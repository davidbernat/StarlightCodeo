  title: 'BYORP and Dissipation in Binary Asteroids: Lessons from DART'
  authors:
  - name: Matija Ćuk
    affiliation: []
  - name: Harrison Agrusa
    affiliation: []
  - name: Rachel H. Cueva
    affiliation: []
  - name: Fabio Ferrari
