  title: Multi-wavelength JWST observations of (3200) Phaethon show a dehydrated object
    with an aqueously altered origin
  authors:
  - name: Cristina A. Thomas
    affiliation: []
  - name: Andrew S. Rivkin
    affiliation: []
  - name: Ian Wong
    affiliation: []
  - name: Matthew M. Knight
    affiliation: []
  - name: Sean E. Marshall
    affiliation: []
  - name: Christopher W. Haberle
    affiliation: []
  - name: Aidan Madden-Watson
    affiliation: []
  - name: Joshua P. Emery
    affiliation: []
  - name: Annika Gustafsson
    affiliation: []
  - name: Stefanie N. Milam
    affiliation: []
  - name: Heidi B. Hammel
    affiliation: []
  - name: Ellen S. Howell
    affiliation: []
  - name: Ronald J. Vervack
    affiliation: []
  summary: We present JWST observations of the near-Earth asteroid (3200) Phaethon
    using the Near-Infrared Camera (NIRCam), Near-Infrared Spectrograph (NIRSpec),
    and Mid-Infrared Instrument (MIRI) to further investigate the composition of Phaethon's
    surface. Our NIRSpec data confirms that Phaethon's surface is dehydrated, showing
    no evidence of hydrated minerals in the 3-$μ$m region. We estimate an upper limit
    on the hydrogen content in phyllosilicates of 0.06 wt%. Comparisons with laboratory
    spectra of carbonaceous chondrites suggest that Phaethon's surface composition
    is best matched by thermally metamorphosed samples of the CM chondrite Murchison
    (heated to 1000$^{\circ}$C), rather than CY meteorites as previous work suggested.
    We find no evidence of ongoing surface evolution due to recent perihelion passages.
    A comparison of the mid-infrared spectra of Phaethon and Bennu shows distinct
    spectral differences that are consistent with their different thermal histories.
    Our findings further refine our understanding of Phaethon's current surface composition
    and evolution and provide additional insights for the upcoming DESTINY+ mission.
