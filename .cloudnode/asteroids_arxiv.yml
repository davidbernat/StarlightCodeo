  title: Near-Earth Asteroids as the parents of the $δ$-Cancrid Meteoroid Stream
  authors:
  - name: G. I. Kokhirova
    affiliation:
    - IA-NAST
  - name: M. Zhang
    affiliation:
    - XAO-CAS
  - name: X. -G. Li
    affiliation:
    - XAO-CAS
  - name: A. I. Zhonmuhammadi
    affiliation:
    - IA-NAST
  - name: X. Liu
    affiliation:
    - XAO-CAS
  summary: The $δ$-Cancrid meteoroid stream forms four active meteor showers which
    are observable on the Earth annually during January-February and August-September.
    The stream's definite parent comet has not been established. We performed a search
    for near-Earth asteroids (NEAs) associated with this stream. We have followed
    the backward evolution of the orbital elements of a sample of NEAs and found their
    orbits at the Earth-crossing positions. Using these orbits, we alculated the theoretical
    parameters of meteor showers associated with the considered NEAs. We carried out
    our search for observable active showers that match theoretically predicted ones
    with published data, and the result turned out that the predicted meteor showers
    of 13 NEAs were identified with the active showers produced by the $δ$-Cancrid
    meteoroid stream. The comet-like orbits of NEAs and established association with
    active meteor showers indicate their common cometary origin. The NEAs considered
    are moving within the stream and likely represent the dormant remnants of a parent
    comet of the $δ$-Cancrid asteroid-meteoroid complex disintegrated more than 12
    thousand years ago.
