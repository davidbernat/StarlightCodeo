- entry_id: http://arxiv.org/abs/2411.10923v2
  short_id: 2411.10923v2
  title: Non-Gravitational Forces in Planetary Systems
  authors:
  - name: David Jewitt
    affiliation: []
  summary: Non-gravitational forces play surprising and, sometimes, centrally important
    roles in shaping the motions and properties of small planetary bodies. In the
    solar system, the morphologies of comets, the delivery of meteorites and the shapes
    and dynamics of asteroids are all affected by non-gravitational forces. In exoplanetary
    systems and debris disks, non-gravitational forces affect the lifetimes of circumstellar
    particles and feed refractory debris to the photospheres of the central stars.
    Unlike the gravitational force, which is a simple function of the well known separations
    and masses of bodies, the non-gravitational forces are frequently functions of
    poorly known or even unmeasurable physical properties. Here, we present order-of-magnitude
    descriptions of non-gravitational forces, with examples of their application.
