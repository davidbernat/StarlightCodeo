    affiliation: []
  - name: Volodymyr Reshetnyk
    affiliation: []
  summary: 'In this work, we analyzed the orbits of more than 35,000 (for 2024) near-Earth
    objects (NEOs) for the possibility of successive approaches to all pairs of planets:
    Earth, Venus, and Mars in the time range from 2020 to 2120. We have selected 120
    candidates for Earth-Mars, Earth-Venus, Mars-Earth, Mars-Venus, Venus-Earth, and
    Venus-Mars fast transfers (within 180 days); 2 candidates for double transfers
    (consecutive approaches with three planets); 10 candidates for multiple transfers,
    when an asteroid has several consecutive paired approaches to planets in a hundred
    years.'
