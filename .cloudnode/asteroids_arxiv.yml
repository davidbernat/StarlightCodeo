  summary: The Southern Hemisphere Asteroid Research Project is an active and informal
    entity comprising the University of New South Wales, the University of Tasmania,
    the University of Western Australia, and the Curtin University, which performs
    asteroid research in collaboration with federal agencies, including the Commonwealth
    Scientific and Industrial Research Organisation and the National Aeronautics and
    Space Administration (JPL). Since 2015, we have used the Australian infrastructure
    to characterize more than 50 near-Earth asteroids through bistatic radar observations.
