  summary: NASA's Double Asteroid Redirection Test (DART) spacecraft impacted Dimorphos,
    the natural satellite of (65803) Didymos, on 2022 September 26, as a first successful
    test of kinetic impactor technology for deflecting a potentially hazardous object
    in space. The experiment resulted in a small change to the dynamical state of
    the Didymos system consistent with expectations and Level 1 mission requirements.
    In the pre-encounter paper Richardson (2022), predictions were put forward regarding
    the pre- and post-impact dynamical state of the Didymos system. Here we assess
    these predictions, update preliminary findings published after the impact, report
    on new findings related to dynamics, and provide implications for ESA's Hera mission
    to Didymos, scheduled for launch in 2024 with arrival in late December 2026. Pre-encounter
    predictions tested to date are largely in line with observations, despite the
    unexpected, flattened appearance of Didymos compared to the radar model and the
    apparent pre-impact oblate shape of Dimorphos (with implications for the origin
    of the system that remain under investigation). New findings include that Dimorphos
    likely became prolate due to the impact and may have entered a tumbling rotation
    state. A possible detection of a post-impact transient secular decrease in the
    binary orbital period suggests possible dynamical coupling with persistent ejecta.
    Timescales for damping of any tumbling and clearing of any debris are uncertain.
    The largest uncertainty in the momentum transfer enhancement factor of the DART
    impact remains the mass of Dimorphos, which will be resolved by the Hera mission.
