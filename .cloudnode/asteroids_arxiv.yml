  title: 'The Arpu Kuilpu Meteorite: In-depth characterization of an H5 chondrite
    delivered from a Jupiter Family Comet orbit'
  authors:
  - name: Seamus L. Anderson
    affiliation: []
  - name: Gretchen K. Benedix
    affiliation: []
  - name: Belinda Godel
    affiliation: []
