  title: JWST Directly Images Giant Planet Candidates Around Two Metal-Polluted White
    Dwarf Stars
  authors:
  - name: Susan E. Mullally
    affiliation: []
  - name: John Debes
    affiliation: []
  - name: Misty Cracraft
    affiliation: []
  - name: Fergal Mullally
