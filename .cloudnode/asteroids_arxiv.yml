- entry_id: http://arxiv.org/abs/2602.12554v1
  short_id: 2602.12554v1
  title: Bundle adjustment of Hayabusa2's ONC images and controlled color mosaic map
    of Ryugu
  authors:
  - name: Naoyuki Hirata
    affiliation: []
  - name: Eri Tatsumi
    affiliation: []
  - name: Mayumi Ichikawa
    affiliation: []
  - name: Kazuhiro Honda
    affiliation: []
  - name: Sayuri Tanaka
    affiliation: []
  summary: JAXA's Hayabusa2 mission successfully returned samples from the asteroid
    Ryugu in December 2020. It executed two touchdowns to collect the surface and
    subsurface materials, one close to the crater created by an artificial impactor.
    The onboard camera system, Optical Navigation Camera (ONC), with two wide-angle
    cameras and one narrow-angle camera with seven color filters, was crucial for
    mapping geomorphology and composition such as hydrated minerals during navigation
    and scientific observation. More than 8,300 images revealed Ryugu's spinning-top
    shape and boulder-covered surface. However, most high-resolution images captured
    during descent/touchdown operations lacked precise location data and camera position/orientation
    information. Image geometry was refined using photogrammetric bundle adjustment.
    This method enabled the refinement of all high-resolution images captured during
    descent/touchdown operations. Furthermore, map-projected GeoTIFF images in GIS
    format containing geographic metadata were created for all ONC images, and these
    were integrated to construct global and regional mosaic maps. To facilitate scientific
    research on Ryugu, these refined image geometry information, maps, and mosaics
    are publicly available via https://doi.org/10.7910/DVN/WW3IH0
