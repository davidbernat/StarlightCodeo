- entry_id: http://arxiv.org/abs/2605.06838v1
  short_id: 2605.06838v1
  title: Taxonomy of 14042 asteroids from Gaia DR3 reflectance spectra
  authors:
  - name: Fernando Tinaut-Ruano
    affiliation: []
  - name: Benoit Carry
    affiliation: []
  - name: Marjorie Galinier
    affiliation: []
  - name: Max Mahlke
    affiliation: []
  - name: Alexey Sergeyev
    affiliation: []
  summary: 'Asteroid reflectance spectra provide key constraints on surface composition.
    Gaia DR3 enables the study of 60,518 asteroids through NUV to visible reflectance
    spectra. We aim to classify asteroids using Gaia DR3 spectra and provide a homogeneous
    framework. Owing to systematics affecting Gaia DR3 data, direct comparison with
    previous taxonomies has to be taken with caution; thus, we developed a classification
    scheme tailored to Gaia and linked the resulting taxa to established classes.
    We selected the highest-quality spectra using Gaia DR3 quality flags and applied
    uncertainty thresholds to mitigate spectral artifacts, retaining over one-third
    of the original sample at the least noisy wavelength. To improve compositional
    discrimination, we included albedo, reducing the final sample to about one-fourth
    of its initial size. We then iteratively applied dimensionality reduction and
    clustering to identify the spectral taxa. We classified 14,042 asteroids into
    13 taxonomic classes: A, B, C, D, E, F, G, K, L, M, P, S, and V, representing
    an increase of three compared to the number of objects classified in previous
    spectral classifications. The largest relative increase is found for the K class.
    The inclusion of NUV wavelengths allows the separation of B and F types within
    the C-complex and facilitates the identification of G types. The dynamical distribution
    follows expected trends, with Stypes dominating the inner and middle Main Belt,
    C-complex asteroids prevalent in the outer Main Belt, and D types beyond. We present
    a taxonomical classification of 14,042 asteroids based on Gaia DR3 reflectance
    spectra. NUV coverage is critical for disentangling primitive classes within the
    C-complex. Although artifacts in Gaia DR3 require caution when comparing median
    spectra with other datasets, this classification provides a robust reference for
    future Gaia releases, with larger observed samples.'
