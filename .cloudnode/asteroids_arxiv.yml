- entry_id: http://arxiv.org/abs/2505.14632v1
  short_id: 2505.14632v1
  title: 'OSIRIS-REx Operational Key Decision Points: A Retrospective'
  authors:
  - name: Rich Burns
    affiliation: []
  - name: Dante S. Lauretta
    affiliation: []
  summary: 'OSIRIS-REx, NASA''s first asteroid sample return mission, rendezvoused
    with the near-Earth asteroid Bennu in 2018 and delivered a 121.6-gram sample to
    Earth in 2023, the largest amount of material ever recovered from a planetary
    body beyond the Moon. The operations phase of OSIRIS-REx was considered the most
    challenging robotic mission that NASA had undertaken, owing to the tight constraints
    on spacecraft performance and the microgravity environment. In preparation for
    the sample collection and return campaign, the mission leadership defined four
    operational key decision points (OKDPs) at critical junctures: sample site selection,
    rehearsal and execution of the sample collection maneuver, sample stow, and Earth
    return. This publication examines these OKDPs in depth, inclusive of rationale,
    implementation, decision processes, and efficacy. We also review other decisions
    that enabled mission success despite the unexpectedly rugged nature of Bennu''s
    surface. This information should be beneficial for future challenging operational
    concepts where science-in-the-loop, time-critical decision making is integral
    to success.'
