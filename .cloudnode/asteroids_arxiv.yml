- entry_id: http://arxiv.org/abs/2510.00082v1
  short_id: 2510.00082v1
  title: Technosignatures of Self-Replicating Probes in the Solar System
  authors:
  - name: Alex Ellery
    affiliation: []
  summary: 'We explore a much-neglected area of SETI: solar system techno-signatures.
    As our cursory solar system exploration consolidates into commercial industrialisation,
    it is crucial that we determine what to look for and where. We first consider
    the rationale for interstellar self-replicating probes and their implications
    for the Fermi paradox. Whether for defensive or exploratory reasons, self-replicating
    probes are a rational strategy for Galactic investigation. We determine that self-replicating
    probes will systematically explore the Galaxy by tracking resources of sufficient
    metallicity. We focus on the resource requirements of a self-replicating interstellar
    probe that may have visited our solar system. After considering asteroid resources,
    we suggest that evidence of asteroidal processing will be difficult to discern
    from natural processes given the constraints imposed by self-replication. We further
    determine that the Moon is an ideal base of manufacturing operations. We suggest
    that nuclear reactors, such as the Magnox reactor model, can feasibly be constructed
    from lunar resources which will have left isotopic ratio signatures of Th-232/Nd-144
    and/or Th-232/Ba-137. We further suggest that in anticipatory economic trade for
    resources, a self-replicating probe may have left artefacts buried with asteroidal
    resources on the Moon. Such gifts would be detectable and accessible only once
    a threshold of technological sophistication has been achieved. An obvious gift
    in trade for the resources utilised would be a universal constructor.'
