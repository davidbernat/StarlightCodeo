  summary: We have created a new image analysis pipeline to reprocess images taken
    by the Near Earth Asteroid Tracking survey and have applied it to ten nights of
    observations. This work is the first large-scale reprocessing of images from an
    asteroid discovery survey in which thousands of archived images are re-calibrated,
    searched for minor planets, and resulting observations are reported to the Minor
    Planet Center. We describe the software used to extract, calibrate, and clean
    sources from the images, including specific techniques that accommodate the unique
    features of these archival images. This pipeline is able to find fainter asteroids
    than the original pipeline.
