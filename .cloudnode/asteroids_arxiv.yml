    affiliation: []
  - name: Colin O. Chandler
    affiliation: []
  - name: Carrie E. Holt
    affiliation: []
  - name: Matthew J. Hopkins
    affiliation: []
  - name: Yaeji Kim
    affiliation: []
  - name: Nicholas A. Moskovitz
    affiliation: []
  - name: William J. Oldroyd
    affiliation: []
  - name: Jack Patterson
    affiliation: []
  - name: Scott S. Sheppard
    affiliation: []
  - name: Nicole Tan
    affiliation: []
  - name: Chadwick A. Trujillo
    affiliation: []
  - name: Quanzhi Ye
    affiliation: []
  summary: We report the detection of water vapor associated with main-belt comet
    358P/PANSTARRS on UT 2024 January 8-9 using the NIRSPEC instrument aboard JWST.
    We derive a water production rate of Q(H2O)=(5.0+/-0.2)x10^25 molecules/s, marking
    only the second direct detection of sublimation products of any kind from a main-belt
    comet, after 238P/Read. Similar to 238P, we find a remarkable absence of hypervolatile
    species, finding Q(CO2)<7.6x10^22 molecules/s, corresponding to Q(CO2)/Q(H2O)<0.2%.
    Upper limits on CH3OH and CO emission are also estimated. Photometry from ground-based
    observations show that the dust coma brightened and faded slowly over ~250 days
    in 2023-2024, consistent with photometric behavior observed in 2012-2013, but
    also indicate a ~2.5x decline in the dust production rate between these two periods.
    Dynamical dust modeling shows that the coma's morphology as imaged by JWST's NIRCAM
    instrument on 2023 November 22 can be reproduced by asymmetric dust emission from
    a nucleus with a mid-range obliquity (~80 deg) with a steady-state mass loss rate
    of ~0.8 kg/s. Finally, we find similar Afrho-to-gas ratios of log10(Afrho/Q(H2O))=-24.8+/-0.2
    for 358P and log10(Afrho/QH2O)=-24.4+/-0.2 for 238P, suggesting that Afrho could
    serve as an effective proxy for estimating water production rates in other active
    main-belt comets. The confirmation of water vapor outgassing in both main-belt
    comets observed by JWST to date reinforces the use of recurrent activity near
    perihelion as an indicator of sublimation-driven activity in active asteroids.
