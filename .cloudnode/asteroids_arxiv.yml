  title: Spin Parameters and Shape Models of Near-Earth Asteroids (4660) Nereus, (21088)
    Chelyabinsk, (66146) 1998 TU3, and (297418) 2000 SP43
  authors:
  - name: Javier Rodríguez Rodríguez
    affiliation: []
  - name: Enrique Díez Alonso
    affiliation: []
  - name: Santiago Iglesias Álvarez
    affiliation: []
  - name: Saúl Pérez Fernández
    affiliation: []
  - name: Alejandro Buendia Roca
    affiliation: []
  - name: Julia Fernández Díaz
    affiliation: []
  - name: Javier Licandro
    affiliation: []
  - name: Miguel R. Alarcon
    affiliation: []
  - name: Miquel Serra-Ricart
    affiliation: []
  - name: Amadeo Aznar Macías
    affiliation: []
  - name: Francisco Javier de Cos Juez
    affiliation: []
  summary: We present our shape and rotational characterization of four near-Earth
    asteroids observed as part of the Visible NEAs Observations Survey. This work
    includes 61 new light curves obtained between 2020 June and 2024 September for
    asteroids (21088) Chelyabinsk and (66146) 1998 TU3 and the potentially hazardous
    asteroids (4660) Nereus and (297418) 2000 SP43. We combine these observations
    with archival data to derive their shape models, spin parameters, and refined
    rotation periods using a light-curve inversion method. Our derived rotational
    periods are consistent with previously published values for all the objects. We
    present constant-period models for each asteroid, while for (66146) 1998 TU3 we
    detect a possible Yarkovsky-O'Keefe-Radzievskii-Paddack (YORP) acceleration of
    $\upsilon \simeq 2.05 \times 10^{-8} \text{ rad day}^{-2}$, potentially adding
    it to the short list of asteroids known to experience the YORP effect.
