- entry_id: http://arxiv.org/abs/2505.18960v1
  short_id: 2505.18960v1
  title: Coupled shape and spin evolution of small near spherical asteroids due to
    global regolith motion
  authors:
  - name: Kumar Gaurav
    affiliation: []
  - name: Deepayan Banik
    affiliation: []
  - name: Ishan Sharma
    affiliation: []
  summary: Recent space missions have provided substantial evidence of regolith movement
    on the surfaces of near Earth asteroids. To investigate this phenomenon, we present
    a continuum-based model that describes regolith motion on nearly spherical asteroids.
    The theoretical framework employs a depth averaged approach, traditionally used
    for simulating terrestrial landslides, and is extended to include additional terms
    that account for spherical geometry, shallow topography and the asteroids rotation.
    The governing equations couple the resurfacing process with the asteroids spin
    evolution through angular momentum conservation. The axisymmetric form of these
    equations is then employed to study the transition of an initially spherical asteroid
    into a top-shaped.
