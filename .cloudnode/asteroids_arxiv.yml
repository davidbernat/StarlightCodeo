  - name: Lance Benner
    affiliation: []
  - name: Edwin Peters
    affiliation: []
  summary: We detail the use of the University of Tasmania's (UTAS) optical and radio
    telescopes to conduct observations of near-Earth asteroids from 2021 to 2024.
    The Canberra Deep Space Communication Complex transmitted a radio signal at 7159.45
    MHz, with the radar echo detected by the UTAS radio telescopes. The method of
    accounting for the Doppler shift between the stations and the near-Earth object
    is described so that others can implement a similar program. We present our results,
    with confirmed detections of 1994 PC1 and 2003 UC20 asteroids using the Hobart
    and Katherine 12-m antennas, demonstrating the feasibility of using small radio
    telescopes for these observations. Additionally, the recently upgraded Ceduna
    30 m antenna was used to detect 2024 MK. Data collected from other observatories,
    such as Tidbinbilla, as well as the UTAS radar tracking of the moon are also presented
    in the context of demonstrating the means of applying these Doppler corrections
    and the accuracy of each method. Optical observations conducted in this period
    are also detailed as they complement radar observations and aid in refining the
    orbit parameters.
