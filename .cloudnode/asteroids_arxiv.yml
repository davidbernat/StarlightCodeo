- entry_id: http://arxiv.org/abs/2407.14807v1
  short_id: 2407.14807v1
  title: Spatial distribution of isotopes and compositional mixing in the inner protoplanetary
    disk
  authors:
  - name: Kang Shuai
    affiliation: []
  - name: Hejiu Hui
    affiliation: []
  - name: Li-Yong Zhou
    affiliation: []
  - name: Weiqiang Li
    affiliation: []
  summary: The mass-independent isotopic signatures of planetary bodies have been
    widely used to trace the mixing and transport processes in planet formation. The
    observed isotopic variations among meteorites have been further linked to the
    modeled mass-weighted mean initial semimajor axes, assuming a spatial isotopic
    gradient in the inner protoplanetary disk. However, nucleosynthetic isotopic anomalies
    of nonvolatile elements and mass-independent oxygen isotopic variation ($Δ^{17}$O)
    show different relationships with distance from the Sun. Therefore, it is crucial
    to know whether isotopes were distributed systematically with heliocentric distance.
    In this study, we performed N-body simulations on compositional mixing during
    the collisional accretion and migration of planetary bodies to investigate the
    spatial distributions of Cr and O isotopes in the inner protoplanetary disk. The
    modeled mass-weighted mean initial semimajor axes of the parent bodies of noncarbonaceous
    (NC) meteorites and terrestrial planets were used to calculate the isotopic compositions
    of these bodies. Our simulations successfully reproduced the observed nucleosynthetic
    Cr isotopic anomaly among Earth, Mars, and the NC meteorite parent bodies, consistent
    with a spatial gradient of isotopic anomalies in the inner disk. Asteroids originating
    from different regions in the inner disk were transported to the main belt in
    our simulations, resulting in the Cr isotopic anomaly variation of the NC meteorite
    parent bodies. However, the $Δ^{17}$O distribution among the terrestrial planets
    and the NC meteorite parent bodies could not be reproduced assuming a $Δ^{17}$O
    gradient. The absence of a $Δ^{17}$O gradient reflects that the oxygen isotopic
    mass-independent fractionation might have altered the spatial distribution of
    the nucleosynthetic $Δ^{17}$O variation before protoplanets formed.
