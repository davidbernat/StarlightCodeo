- entry_id: http://arxiv.org/abs/2512.21903v1
  short_id: 2512.21903v1
  title: 'TITAN DR1: An Improved, Validated, and Systematically-Controlled Recalibration
    of ATLAS Photometry toward Type Ia Supernova Cosmology'
  authors:
  - name: Elijah G. Marlin
    affiliation: []
  - name: Yukei S. Murakami
    affiliation: []
  - name: Dillon Brout
    affiliation: []
  - name: Jack W. Tweddle
    affiliation: []
