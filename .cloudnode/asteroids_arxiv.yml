- entry_id: http://arxiv.org/abs/2402.04145v1
  short_id: 2402.04145v1
  title: On the fate of slow boulders ejected after DART impact on Dimorphos
  authors:
  - name: Fernando Moreno
    affiliation: []
  - name: Gonzalo Tancredi
    affiliation: []
  - name: Adriano Campo Bagatin
    affiliation: []
  summary: On 2022 September 26th, 23:14 UT the NASA/DART (Double Asteroid Redirection
    Test) spacecraft successfully impacted Dimorphos, the secondary component of the
    binary (65803) Didymos system, demonstrating asteroid orbit deflection for the
    first time. A large amount of debris, consisting on a wide size frequency distribution
    of particulates (from micron-sized dust to meter-sized boulders), was released,
    and a long-lasting tail has been observed over more than 9 months since impact.
    An important fraction of the ejecta mass has been ejected as individual meter-sized
    boulders, as have been found in images obtained by the Light Italian CubeSat for
    Imaging of Asteroid (LICIACube), as well as from the Hubble Space Telescope (HST).
    While the boulders observed by LICIACube had projected speeds of several tens
    of meter per second, those seen by the HST were about one hundred time slower.
    In this paper we analyze the long-term orbital evolution of those slow boulders
    using different dynamical codes, providing constraints on the fate of such large
    particles, and giving insight on the possibility of observing some of those boulders
    that might remain in orbit at the time of the ESA/Hera mission arrival to the
    binary system in late 2026.
