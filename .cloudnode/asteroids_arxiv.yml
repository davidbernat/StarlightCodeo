- entry_id: http://arxiv.org/abs/2604.00332v1
  short_id: 2604.00332v1
  title: Planetary Radar at the Arecibo Observatory
  authors:
  - name: Michael C Nolan
    affiliation: []
  - name: Lynn M. Carter
    affiliation: []
  - name: Edgard G. Rivera-Valentín
    affiliation: []
  summary: In the late 1990s, the Arecibo Observatory and its planetary radar system
    were upgraded to increase sensitivity by a factor of 20. This upgrade substantially
    improved the quality of the data and the ability to observe terrestrial planets,
    outer planet satellites, planetary rings, and near-Earth objects until the telescope's
    collapse in 2020. The higher sensitivity allowed radar observations of 889 near-Earth
    asteroids and comets from 1997 to 2020, compared to the 40 achieved in the previous
    30 years, and showed that the population of near-Earth asteroids is heterogeneous,
    suggesting a wide variety of formation and evolution mechanisms. The planetary
    radar's ability to see through the atmospheres of Venus and Titan, into the shadows
    of Mercury and the Moon, and under the surface of the Moon and Mars provided a
    unique perspective on those bodies that has driven in-situ exploration. No other
    existing or planned facility matches the sensitivity that Arecibo had.
