- entry_id: http://arxiv.org/abs/2508.18287v1
  short_id: 2508.18287v1
  title: The Adaptive Communication Framework (ACF) for Extraterrestrial Intelligence
    Discovery
  authors:
  - name: Omer Eldadi
    affiliation: []
  - name: Gershon Tenenbaum
    affiliation: []
  - name: Abraham Loeb
    affiliation: []
  summary: The Vera C. Rubin Observatory's Legacy Survey of Space and Time will increase
    interstellar object detection rates to one every few months, substantially elevating
    the probability of identifying objects with characteristics suggesting artificial
    origin. Despite this imminent capability, no evidence-based crisis communication
    framework exists for managing potential technosignature discoveries. We present
    the Adaptive Communication Framework (ACF), a theoretically grounded protocol
    that integrates crisis communication theories with the SPECtrum of Rhetoric Intelligences
    model to address diverse cognitive, social and emotional processing styles. Through
    analysis of communication failures during COVID-19, Fukushima, and asteroid 99942
    Apophis (2004 MN4), we identify critical gaps in managing scientific uncertainty
    under public scrutiny. The ACF provides graduated protocols calibrated to the
    Loeb Scale for Interstellar Object Significance, offering specific messaging strategies
    across four rhetoric intelligence channels (Systematic, Practical, Emotional,
    Creative) for each evidential level group. Recognizing that Artificial Intelligence
    (AI) systems will mediate public understanding, the framework incorporates safeguards
    against synthetic media manipulation and algorithmic misinformation through pre-positioned
    content seeding and deepfake detection protocols. Our theoretical framework reveals
    that successful communication of paradigm-shifting discoveries requires simultaneous
    activation of multiple cognitive channels, with messages adapted to cultural contexts
    and uncertainty levels. This framework provides essential theoretical groundwork
    for ensuring humanity's potentially most transformative discovery unfolds through
    understanding rather than chaos.
