  title: 'Aperture photometry on asteroid trails: detection of the fastest rotating
    near-Earth object'
  authors:
  - name: Maxime Devogèle
    affiliation: []
  - name: Luca Buzzi
    affiliation: []
  - name: Marco Micheli
    affiliation: []
  - name: Juan Luis Cano
