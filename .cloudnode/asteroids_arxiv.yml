  title: 'Spectro-photometry of Phobos simulants: I. Detectability of hydrated minerals
    and organic bands'
  authors:
  - name: Antonin Wargnier
    affiliation: []
  - name: Thomas Gautier
    affiliation: []
  - name: Alain Doressoundiram
    affiliation: []
  - name: Giovanni Poggiali
    affiliation: []
  - name: Pierre Beck
    affiliation: []
  - name: Olivier Poch
    affiliation: []
  - name: Eric Quirico
    affiliation: []
  - name: Tomoki Nakamura
    affiliation: []
  - name: Hideaki Miyamoto
    affiliation: []
  - name: Shingo Kameda
    affiliation: []
  - name: Pedro H. Hasselmann
    affiliation: []
  - name: Nathalie Ruscassier
    affiliation: []
  - name: Arnaud Buch
    affiliation: []
  - name: Sonia Fornasier
    affiliation: []
  - name: Maria Antonietta Barucci
    affiliation: []
  summary: Previous observations of Phobos and Deimos, the moons of Mars, have improved
    our understanding of these small bodies. However, their formation and composition
    remain poorly constrained. Physical and spectral properties suggest that Phobos
    may be a weakly thermal-altered captured asteroid but the dynamical properties
    of the martian system suggest a formation by giant collision similar to the Earth
    moon. In 2027, the JAXA's MMX mission aims to address these outstanding questions.
    We undertook measurements with a new simulant called OPPS (Observatory of Paris
    Phobos Simulant) which closely matches Phobos spectra in the visible to the mid-infrared
    range. The simulant was synthesized using a mixture of olivine, saponite, anthracite,
    and coal. Since observation geometry is a crucial aspect of planetary surface
    remote sensing exploration, we evaluated the parameters obtained by modeling the
    phase curves -- obtained through laboratory measurements -- of two different Phobos
    simulants (UTPS-TB and OPPS) using Hapke IMSA model. Our results show that the
    photometric properties of Phobos simulants are not fully consistent with those
    of Tagish Lake, Allende, or the NWA 4766 shergottite. We also investigated the
    detection of volatiles/organic compounds and hydrated minerals, as the presence
    of such components is expected on Phobos in the hypothesis of a captured primitive
    asteroid. The results indicate that a significant amount of organic compounds
    is required for the detection of C-H bands at 3.4 $μ$m. In contrast, the 2.7 $μ$m
    absorption band, due to hydrated minerals, is much deeper and easier to detect
    than C-H organic features at the same concentration levels. Posing limits on detectability
    of some possible key components of Phobos surface will be pivotal to prepare and
    interpret future observations of the MIRS spectrometer onboard MMX mission.
