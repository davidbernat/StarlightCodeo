- entry_id: http://arxiv.org/abs/2309.06609v2
  short_id: 2309.06609v2
  title: Jupiter's Metastable Companions
  authors:
  - name: Sarah Greenstreet
    affiliation: []
  - name: Brett Gladman
    affiliation: []
  - name: Mario Juric
    affiliation: []
  summary: Jovian co-orbitals share Jupiter's orbit in 1:1 mean motion resonance.
    This includes $>$10,000 so-called Trojan asteroids surrounding the leading (L4)
    and trailing (L5) Lagrange points, viewed as stable groups dating back to planet
    formation. Via a massive numerical study we identify for the first time some Trojans
    which are certainly only `metastable'; instead of being primordial, they are recent
    captures from heliocentric orbits into moderately long-lived (10 kyr - 100 Myr)
    metastable states that will escape back to the scattering regime. We have also
    identified (1) the first two jovian horseshoe co-orbitals that exist for many
    resonant libration periods, and (2) eight jovian quasi-satellites with metastable
    lifetimes of 4-130 kyr. Our perspective on the Trojan population is thus now more
    complex as Jupiter joins the other giant planets in having known metastable co-orbitals
    which are in steady-state equilibrium with the planet-crossing Centaur and asteroid
    populations, in agreement with theoretical estimates.
