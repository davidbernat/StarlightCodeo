- entry_id: http://arxiv.org/abs/2506.14041v2
  short_id: 2506.14041v2
  title: 'Hawking Radiation Signatures from Primordial Black Holes Transiting the
    Inner Solar System: Prospects for Detection'
  authors:
  - name: Alexandra P. Klipfel
    affiliation: []
  - name: Peter Fisher
    affiliation: []
  - name: David I. Kaiser
    affiliation: []
  summary: Primordial black holes (PBHs) arise from the collapse of density perturbations
    in the early universe and serve as a dark matter (DM) candidate and a probe of
    fundamental physics. There remains an unconstrained ``asteroid-mass'' window where
    PBHs of masses $10^{17} {\rm g} \lesssim M \lesssim 10^{23} {\rm g}$ could comprise
    up to $100\%$ of the dark matter. Current $e^{\pm}$ Hawking radiation constraints
    on the DM fraction of PBHs are set by comparing observed spatial- and time-integrated
    cosmic ray flux measurements with predicted Hawking emission fluxes from the galactic
    DM halo. These constraints depend on cosmic ray production and propagation models,
    the galactic DM density distribution, and the PBH mass function. We propose to
    mitigate these model dependencies by developing a new local, time-dependent Hawking
    radiation signature to detect low-mass PBHs transiting through the inner Solar
    System. We calculate transit rates for PBHs that form with initial masses $M \lesssim
    5\times10^{17}\text{g}$. We then simulate time-dependent positron signals from
    individual PBH flybys as measured by the Alpha Magnetic Spectrometer (AMS) experiment
    in low-Earth orbit. We find that AMS is sensitive to PBHs with masses $M\lesssim
    2\times10^{14} \, {\rm g}$ due to its lower energy threshold of $500 \, {\rm MeV}$.
    We demonstrate that a dataset of daily positron fluxes over the energy range $5-500
    \, {\rm MeV}$, with similar levels of precision to the existing AMS data, would
    enable detection of PBHs drawn from present-day distributions that peak within
    the asteroid-mass window. Our simulations yield ${\cal O} (1)$ detectable PBH
    transits per year across wide regions of parameter space, which may be used to
    constrain PBH mass functions. This technique could be extended to detect $γ$-ray
    and X-ray Hawking emission to probe further into the asteroid-mass window.
