  title: UV to near-IR observations of the DART-Dimorphos collision
  authors:
  - name: E. O. Ofek
    affiliation: []
  - name: D. Kushnir
    affiliation: []
  - name: D. Polishook
    affiliation: []
  - name: E. Waxman
