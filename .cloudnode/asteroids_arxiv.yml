    affiliation: []
  summary: ESA's Hera space mission is on its way to the mission target, the binary
    asteroid (65803) Didymos. HyperScout-H, one of the instruments onboard Hera, is
    a hyperspectral imager operating in the visible and near-infrared regions between
    0.65 and 0.95 microns. HyperScout-H will enable a detailed assessment of the composition
    of both objects, Didymos and its satellite Dimorphos, the characterization of
    space weathering effects, and the possible presence of exogenous material on their
    surfaces. To monitor instrument functionality, calibration exposures are acquired
    regularly. This article describes the in-flight calibrations carried out for HyperScout-H
    during the commissioning and cruise phases. Bias and dark exposures, as well as
    stellar field observations, were acquired several times after launch. We update
    the calibration data and monitor instrument performance in the space environment.
    In five images, the surface of Mars fills the entire field of view, enabling cross-validation
    of HyperScout-H results with those reported by other Mars missions. The calibration
    data indicate that the bias pattern is stable, the dark current remains negligible
    for short exposures, and the detector response is highly linear. We quantify the
    field-of-view alignment and geometric distortion, and evaluate the point spread
    function based on the stellar field observations. Stellar observations and Mars
    swing-by data provide updated radiometric calibration constants, suggesting that
    in-flight conditions have slightly modified the detector's spectral response.
    In-flight calibrations are essential to ensure data quality and reliability. The
    results obtained for HyperScout-H demonstrate that the instrument can achieve
    its scientific goals in observations of the Didymos-Dimorphos system.
