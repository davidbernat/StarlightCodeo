  title: Anomalous flux event in the TESS Sector 43 light curve of the white dwarf
    photometric standard HZ 4 was caused by a passing asteroid
  authors:
  - name: Keaton J. Bell
    affiliation: []
  - name: David Ardila
    affiliation: []
  - name: Alexandra Frymire
    affiliation: []
  summary: Frymire & Ardila (2023) reported an anomalous flux variation in the Transiting
    Exoplanet Survey Satellite (TESS) Sector 43 light curve of the white dwarf HZ
    4. We show that this flux variation was caused by the main-belt asteroid 4382
    Stravinsky traversing the nearby TESS pixels, and it is therefore not a cause
    for concern regarding the continued use of HZ 4 as a photometric standard star.
