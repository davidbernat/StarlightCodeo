- entry_id: http://arxiv.org/abs/2411.14705v3
  short_id: 2411.14705v3
  title: 'Starkiller: subtracting stars and other sources from IFU spectroscopic data
    through forward modeling'
  authors:
  - name: Ryan Ridden-Harper
    affiliation: []
  - name: Michele T. Bannister
    affiliation: []
  - name: Sophie E. Deam
    affiliation: []
  - name: Thomas Nordlander
    affiliation: []
  summary: We present starkiller, an open-source Python package for forward-modeling
    flux retrieval from integral field unit spectrograph (IFU) datacubes. Starkiller
    simultaneously provides stellar spectral classification, relative velocity, and
    line-of-sight extinction for all sources in a catalog, alongside a source-subtracted
    datacube. It performs synthetic difference imaging by simulating all catalog sources
    in the field of view, using the catalog for positions and fluxes to scale stellar
    models, independent of the datacube. This differencing method is particularly
    powerful for subtracting both point-sources and trailed or even streaked sources
    from extended astronomical objects. We demonstrate starkiller's effectiveness
    in improving observations of extended sources in dense stellar fields for VLT/MUSE
    observations of comets, asteroids and nebulae. We also show that starkiller can
    treat satellite-impacted VLT/MUSE observations. The package could be applied to
    tasks as varied as dust extinction in clusters and stellar variability; the stellar
    modeling using Gaia fluxes is provided as a standalone function. The techniques
    can be expanded to imagers and to other IFUs.
