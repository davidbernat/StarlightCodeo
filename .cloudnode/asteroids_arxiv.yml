  title: A Machine Learning Approach to Meteor Classification
  authors:
  - name: Samantha Hemmelgarn
    affiliation: []
  - name: Nicholas Moskovitz
    affiliation: []
  - name: Denis Vida
    affiliation: []
  summary: 'We use machine learning to develop a framework for classifying meteoroids
    based on 13 directly observed parameters from the Global Meteor Network. This
    method adds depth to the $K_{b}$ parameter, which uses only three parameters.
    We employ a semi-qualitative approach using 28,177 meteor events observed in 2023
    by the Lowell Observatory Cameras for All-Sky Meteor Surveillance (LO-CAMS) network
    to evaluate multiple normalization, dimensionality-reduction, and clustering algorithms.
    We find that a combination of Factor Analysis (FA) and a Gaussian Mixture Model
    (GMM) results in clusters most consistent with traditional models. Three FA-derived
    factors corresponding to meteoroid kinematics, activation thresholds, and size/geometry
    effects describe the underlying structure of meteoroid behavior. The activation
    factor emerged as the most discriminating factor distinguishing whether a meteor
    is of asteroidal or cometary origin. Resulting 3, 6, and 11 cluster models reveal
    progressively finer compositional structure, from broad physical regimes to detailed
    subdivisions within cometary and asteroidal populations. From these results, we
    introduce a physically motivated hardness classification scheme: $H_{\mathrm{class}}$.
    $H_{\mathrm{class}}$ is a data-driven extension of $K_{b}$ which physically interprets
    clusters in terms of the densest iron meteoroids down to the softest cometary
    material. Application to nine well-studied meteor showers and analysis of clusters
    in orbital space aids in the physical interpretation of $H_{\mathrm{class}}$ groups.
    The $H_{\mathrm{class}}$ model is supported by an analytical FA-GMM formulation
    that enables application to future datasets. Our results demonstrate that machine
    learning methods can extract compositional information from modern optical meteor
    datasets at scale and offers a new framework for interpreting meteoroid populations.'
