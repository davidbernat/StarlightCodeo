- entry_id: http://arxiv.org/abs/2512.11959v1
  short_id: 2512.11959v1
  title: The automation of optical transient discovery and classification in Rubin-era
    time-domain astronomy
  authors:
  - name: Nabeel Rehemtulla
    affiliation: []
  - name: Michael W. Coughlin
    affiliation: []
  - name: Adam A. Miller
    affiliation: []
  - name: Theophile Jegou du Laz
    affiliation: []
  summary: Robotic wide-field time-domain surveys, such as the Zwicky Transient Facility
    and the Asteroid Terrestrial-impact Last Alert System, capture dozens of transients
    each night. The workflows for discovering and classifying transients in survey
    data streams have become increasingly automated over decades of development. The
    recent integration of machine learning and artificial intelligence tools has produced
    major milestones, including the fully automated end-to-end discovery and classification
    of an optical transient, and has enabled automated rapid-response space-based
    follow-up. The now-operational Vera C. Rubin Observatory and its Legacy Survey
    of Space and Time are accelerating the rate of transient discovery and producing
    large volumes of data at incredible rates. Given the expected order-of-magnitude
    increase in transient discoveries, one promising path forwards for optical time-domain
    astronomy is heavily investing in accelerating the automation of our workflows.
    Here we review the current paradigm of real-time transient workflows, project
    their evolution during the Rubin era and present recommendations for accelerating
    transient astronomy with automation.
