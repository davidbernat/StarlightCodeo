- entry_id: http://arxiv.org/abs/2603.16485v1
  short_id: 2603.16485v1
  title: Color and Size Distributions of Small Jupiter Trojans
  authors:
  - name: Fumi Yoshida
    affiliation: []
  - name: Tsuyoshi Terai
    affiliation: []
  - name: Keiji Ohtsuki
    affiliation: []
  summary: We conducted a two-band imaging survey observation using the Subaru Telescope
    and its wide-field camera, Suprime-Cam, to study the visible colors and size distribution
    of Jupiter's Trojan asteroids. The survey covered an area around Jupiter's L4
    Lagrange point totaling 9.2 square degrees. We detected 120 Trojan asteroids in
    this survey. From these Trojan asteroids, we extracted 44 unbiased samples with
    absolute magnitudes in the $g^\prime$ band ranging from 12.9 to 16.9 mag (corresponding
    to diameter ranges of approximately $\sim$3 - 16 km assuming an albedo of 0.05)
    and analyzed their $g^\prime - i^\prime$ color and size distributions. Large Jupiter
    Trojan asteroids are known to be classified into two color groups, ''red'' and
    ''less red''. We found that such bimodality in the color distribution is absent
    for small Jupiter Trojan asteroids, which is consistent with previous studies.
    Previous studies have also shown that these two groups have different slopes in
    the magnitude distributions from each other, which was explained by conversion
    of red objects to less-red fragments through catastrophic disruptions. In contrast,
    we found that the size frequency distributions of our two sample groups divided
    by the color of $g^\prime - i^\prime$ = 0.7 (in AB magnitude) are quite similar.
    Our results can provide new insights into collisional evolution of color and size
    distribution of small Jupiter Trojans.
