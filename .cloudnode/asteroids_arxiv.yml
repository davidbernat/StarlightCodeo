- entry_id: http://arxiv.org/abs/2603.00626v1
  short_id: 2603.00626v1
  title: A generalized dipole-segment model for the gravitational field of elongated
    bodies
  authors:
  - name: A. K. de Almeida
    affiliation: []
  - name: A. F. S. Ferreira
    affiliation: []
  - name: L. B. T. Santos
    affiliation: []
  - name: F. Monteiro
    affiliation: []
  - name: A. Amarante
    affiliation: []
  - name: E. Tresaco
    affiliation: []
  - name: D. M. Sanchez
    affiliation: []
  - name: C. Gomes
    affiliation: []
  - name: A. F. B. A. Prado
    affiliation: []
  summary: "Context. Various simplified models have been investigated to understand\
    \ the complex dynamical environment near irregular asteroids. We propose a generalized\
    \ dipole-segment model (GDSM) to describe the gravitational fields of elongated\
    \ bodies. The proposed model extends the dipole-segment model (DSM) by including\
    \ variable pole masses and a connecting rod while also accounting for the spheroidal\
    \ shape of the poles instead of assuming point masses.\n  Methods. A nonlinear\
    \ optimization method was employed to determine the model parameters, which minimizes\
    \ the errors between the equilibrium points predicted by the GDSM and those obtained\
    \ using a more realistic approach, such as the polyhedron model, which is assumed\
    \ to provide the accurate values of the system. The model was applied to three\
    \ real irregular bodies: the Kuiper belt objects Arrokoth, Kleopatra, and comet\
    \ 103P/Hartley.\n  Results. The results show that the GDSM represents the gravitational\
    \ field more accurately than the DSM and significantly reduces computational time\
    \ and effort when compared with the polyhedron model. This reduction in computational\
    \ complexity does not come at the cost of efficiency. This makes the GDSM a valuable\
    \ tool for practical applications. The model was further employed to compute heteroclinic\
    \ orbits that connect the unstable triangular equilibrium points of the system.\
    \ These trajectories, obtained from the intersections of the stable and unstable\
    \ manifolds, represent natural pathways that enable transfers between equilibrium\
    \ regions without continuous propulsion. The results for Arrokoth, Kleopatra,\
    \ and 103P/Hartley are consistent and validate the GDSM as an accurate and computationally\
    \ efficient framework for studying the dynamical environment and transfer mechanisms\
    \ around irregular small bodies."
