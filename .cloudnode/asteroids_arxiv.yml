- entry_id: http://arxiv.org/abs/2506.02721v1
  short_id: 2506.02721v1
  title: Clues for Solar System Formation from Meteorites and their Parent Bodies
  authors:
  - name: Bernard Marty
    affiliation: []
  - name: Katherine R. Bermingham
    affiliation: []
  - name: Larry R. Nittler
    affiliation: []
  - name: Sean N. Raymond
    affiliation: []
  summary: Understanding the origin of comets requires knowledge of how the Solar
    System formed from a cloud of dust and gas 4.567 Gyr ago. Here, a review is presented
    of how the remnants of this formation process, meteorites and to a lesser extent
    comets, shed light on Solar System evolution. The planets formed by a process
    of collisional agglomeration during the first hundred million years of Solar System
    history. The vast majority of the original population of planetary building blocks
    (~100 km-scale planetesimals) was either incorporated into the planets or removed
    from the system, via dynamical ejection or through a collision with the Sun. Only
    a small fraction of the original rocky planetesimals survive to this day in the
    form of asteroids (which represent a total of ~0.05% of Earth's mass) and comets.
    Meteorites are fragments of asteroids that have fallen to Earth, thereby providing
    scientists with samples of Solar System-scale processes for laboratory-based analysis.
    Meteorite datasets complement cometary datasets, which are predominantly obtained
    via remote observation as there are few cometary samples currently available for
    laboratory-based measurements. This chapter discusses how analysis of the mineralogical,
    elemental, and isotopic characteristics of meteorites provides insight into (i)
    the origin of matter that formed planets, (ii) the pressure, temperature, and
    chemical conditions that prevailed during planet formation, and (iii) a precise
    chronological framework of planetary accretion. Also examined is the use of stable
    isotope variations and nucleosynthetic isotope anomalies as constraints on the
    dynamics of the disk and planet formation, and how these data are integrated into
    new models of Solar System formation. It concludes with a discussion of Earth's
    accretion and its source of volatile elements, including water and organic species.
  comment: Chapter published in Comets III (pp. 681-730), edited by Karen J. Meech,
