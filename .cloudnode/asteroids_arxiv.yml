  summary: Sugars are essential biomolecules, serving as metabolic fuels, nucleic
    acid backbone components, and structural or energy-storage polymers. A central
    question in origin-of-life research is how monosaccharides formed on the primitive
    Earth, as laboratory experiments under prebiotic conditions yield insufficient
    concentrations. The detection of ribose, glucose and other monosaccharides in
    asteroids and meteorites suggests an exogenous origin, possibly in the interstellar
    medium (ISM) prior to meteoritic parent-body formation. However, no sugar has
    been observed in the ISM so far. We report the discovery of erythrulose, a chiral
    four-carbon ketose, in the ISM. The detection has been achieved thanks to ultrasensitive,
    broadband spectral surveys toward the Galactic Center molecular cloud G+0.693-0.027
    obtained using the Yebes 40m and IRAM 30m telescopes. Erythrulose appears to be
    at least eight times more abundant than analogous three-carbon sugars, which remain
    undetected in our ultrasensitive observations. Quantum chemical and astrochemical
    models indicate that erythrulose forms efficiently on interstellar dust grains
    from simpler two-carbon aldehydes and alcohols. As ketoses readily isomerize into
    aldoses in aqueous conditions, interstellar erythrulose could have contributed
    to the sugar inventory available for early metabolic and replication processes.
