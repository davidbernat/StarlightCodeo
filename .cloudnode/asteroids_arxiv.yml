  summary: Earth Trojan asteroids (ETAs) are a mysterious population, and dynamically
    stable ETAs, if primordial, could be "living fossils" of the early solar system.
    To date, there are only two known ETAs, but both are temporary ETAs. The aim of
    our survey is to discover new temporary or stable ETAs; in the absence of detections,
    we derive upper limits on the population of stable ETAs. We conducted the largest
    wide-area survey of the Earth's L4 Lagrange point region so far using the Wide
    Field Survey Telescope, covering about 236.74 deg^2, corresponding to 33.24% of
    the probability coverage for sky regions where dynamically stable L4 ETAs are
    likely to reside. No new ETAs were detected in our survey. We place a cumulative
    upper limit of N(H < 19.1) < 19 on the stable population of objects larger than
    ~520 m (for an assumed albedo of 0.15). This represents the most stringent constraint
    on the ETA population to date.
