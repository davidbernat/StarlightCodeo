- entry_id: http://arxiv.org/abs/2411.14240v1
  short_id: 2411.14240v1
  title: Modeling and dynamics near irregular elongated asteroids
  authors:
  - name: E. Martínez
    affiliation: []
  - name: J. Vidarte
    affiliation: []
  - name: J. L. Zapata
    affiliation: []
  summary: We investigate the qualitative characteristics of a test particle attracted
    to an irregular elongated body, modeled as a non-homogeneous straight segment
    with a variable linear density. By deriving the potential function in closed form,
    we formulate the Hamiltonian equations of motion for this system. Our analysis
    reveals a family of periodic circular orbits parameterized by angular momentum.
    Additionally, we utilize the axial symmetry resulting from rotations around the
    segment's axis to consider the corresponding reduced system. This approach identifies
    several reduced-periodic orbits by analyzing appropriate Poincaré sections. These
    periodic orbits are then reconstructed into quasi-periodic orbits within the full
    dynamical system.
