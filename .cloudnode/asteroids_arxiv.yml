    affiliation: []
  - name: A. K. de Almeida
    affiliation: []
  - name: N. B. Lima
    affiliation: []
  - name: N. B. D Lima
    affiliation: []
  summary: In this work, we performed a dynamical analysis of a spacecraft around
    a nearly equal-mass binary near-Earth asteroid with application to the asteroid
    2017 YE5, which is also a possible dormant Jupiter-family comet. Thus, we investigated
    the motion of a particle around this binary system using the circular restricted
    three-body problem. We calculated the locations of the Lagrangian points of the
    system and their Jacobi constant. Through numerical simulations, using the Poincaré
    Surface of Sections, it was possible to find several prograde and retrograde periodic
    orbits around each binary system's primary, some exhibiting significantly-sized
    higher-order behavior. We also calculated the stability of these orbits. After
    finding the periodic orbits, we investigated the influence of solar radiation
    pressure on these orbits. For this analysis, we considered that the area-to-mass
    ratio equals 0.01 and 0.1. We also performed a spacecraft lifetime analysis considering
    the physical and orbital characteristics of the 2017YE5 system and investigated
    the behavior of a spacecraft in the vicinity of this system. We analyzed direct
    and retrograde orbits for different values of Jacobi's constant. This study investigated
    orbits that survive for at least six months, not colliding or escaping the system
    during that time. We also analyze the initial conditions that cause the spacecraft
    to collide with $M_1$ or $M_2$, or escape from the system. In this work, we take
    into account the gravitational forces of the binary asteroid system and the solar
    radiation pressure (SRP). Finally, we calculated optimal bi-impulsive orbital
    maneuvers between the collinear Lagrangian points. We found a family of possible
    orbital transfers considering times of flight between 0.1 and 1 day.
