- entry_id: http://arxiv.org/abs/2309.08293v1
  short_id: 2309.08293v1
  title: A theoretical approach to the complex chemical evolution of phosphorus in
    the interstellar medium
  authors:
  - name: Marina Fernaández-Ruz
    affiliation: []
  - name: Izaskun Jimeénez-Serra
    affiliation: []
  - name: Jacobo Aguirre
    affiliation: []
  summary: The study of phosphorus chemistry in the interstellar medium has become
    a topic of growing interest in astrobiology, because it is plausible that a wide
    range of P-bearing molecules were introduced in the early Earth by the impact
    of asteroids and comets on its surface, enriching prebiotic chemistry. Thanks
    to extensive searches in recent years, it has become clear that P mainly appears
    in the form of PO and PN in molecular clouds and star-forming regions. Interestingly,
    PO is systematically more abundant than PN by factors typically of $\sim1.4-3$,
    independently of the physical properties of the observed source. In order to unveil
    the formation routes of PO and PN, in this work we introduce a mathematical model
    for the time evolution of the chemistry of P in an interstellar molecular cloud
    and analyze its associated chemical network as a complex dynamical system. By
    making reasonable assumptions, we reduce the network to obtain explicit mathematical
    expressions that describe the abundance evolution of P-bearing species and study
    the dependences of the abundance of PO and PN on the system's kinetic parameters
    with much faster computation times than available numerical methods. As a result,
    our model reveals that the formation of PO and PN is governed by just a few critical
    reactions, and fully explains the relationship between PO and PN abundances throughout
    the evolution of molecular clouds. Finally, the application of Bayesian methods
    constrains the real values of the most influential reaction rate coefficients
    making use of available observational data.
