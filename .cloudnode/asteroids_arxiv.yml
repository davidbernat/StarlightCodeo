  title: Minor planets, asteroids, comets and interplanetary dust within 30 au
  authors:
  - name: Quanzhi Ye
    affiliation: []
  summary: Our Solar System includes the Sun, eight major planets and their moons,
    along with numerous asteroids, comets, and dust particles, collectively known
    as the small Solar System bodies. Small bodies are relics from the birth of the
    Solar System and offer valuable insights into planetary formation and the origins
    of life. This chapter explores this important component of our Solar System, discussing
    the formation and evolution of key small body populations and their interrelations.
