- entry_id: http://arxiv.org/abs/2509.24976v2
  short_id: 2509.24976v2
  title: JWST/MIRI Imaging of the Warm Dust Component of the Epsilon Eridani Debris
    Disk
  authors:
  - name: Schuyler G. Wolff
    affiliation: []
  - name: András Gáspár
    affiliation: []
  - name: George Rieke
    affiliation: []
  - name: Jarron M. Leisenring
    affiliation: []
  - name: Antranik A. Sefilian
    affiliation: []
  - name: Marie Ygouf
    affiliation: []
  - name: Jorge Llop-Sayson
    affiliation: []
  summary: We present JWST/MIRI observations of the debris disk surrounding the nearby,
    solar analog Epsilon Eridani obtained as part of the Archetypal Debris Disk GTO
    program. Multi-wavelength images from 15, 18, 21, and 25.5 $μm$ show a smooth
    dust distribution with no evidence of sculpting by massive planets outside of
    5 au. Maps of the color temperature and opacity constrain the dust properties
    while radiative transfer modeling of a warm dust component traces the interaction
    between the debris disk and Epsilon Eri b ($\sim$3.5 au). Dynamical and collisional
    modeling further shows that the disk morphology is dominated by dust produced
    in the outer planetesimal belt ($\sim 70 \, au$) moving inward via stellar wind
    drag. We confirm the presence of a disk interior to the Epsilon Eri b orbit first
    detected from mid-IR interferometry. Drag dominated inner disk regions have also
    been observed around Vega and Fomalhaut hinting at the diversity of asteroid belt
    analogs.
