  - name: Jessica N. Sunshine
    affiliation: []
  - name: Josep M. Trigo-Rodríguez
    affiliation: []
  summary: The Didymos binary asteroid was the target of the Double Asteroid Redirection
    Test (DART) mission, which intentionally impacted Dimorphos, the smaller member
    of the binary system. We used the Near-Infrared Spectrograph (NIRSpec) and Mid-Infrared
    Instrument (MIRI) instruments on JWST to measure the 0.6-5 $μ$m and 5-20 $μ$m
    spectra of Didymos approximately two months after the DART impact. These observations
    confirm that Didymos belongs to the S asteroid class and is most consistent with
    LL chondrite composition as was previously determined from its 0.6-2.5-$μ$m reflectance
    spectrum. Measurements at wavelengths $>$ 2.5 $μ$m show Didymos to have thermal
    properties typical for an S-complex asteroid of its size and to be lacking absorptions
    deeper than $\sim$2\% due to OH or H2O. Didymos' mid-infrared emissivity spectrum
    is within the range of what has been observed on S-complex asteroids observed
    with Spitzer Space Telescope and is most consistent with emission from small ($<$
    25 $μ$m) surface particles. We conclude that the observed reflectance and physical
    properties make the Didymos system a good proxy for the type of ordinary chondrite
    asteroids that cross near-Earth space, and a good representative of likely future
    impactors.
