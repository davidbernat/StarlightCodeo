- entry_id: http://arxiv.org/abs/2408.06886v1
  short_id: 2408.06886v1
  title: Definition of multispectral camera system parameters to model the asteroid
    2001 SN263
  authors:
  - name: Gabriela de Carvalho Assis Goulart
    affiliation: []
  - name: Thiago Statella
    affiliation: []
  - name: Rafael Sfair
    affiliation: []
  summary: In 2012, Brazil began the studies to send its first deep space exploration
    mission, ASTER, which would be the first mission to orbit a triple asteroid system,
    2001 SN263. We aim to contribute to the ASTER mission by defining the parameters
    of a multispectral camera system that will be used to study the asteroid system
    2001 SN263, through software simulations that should help planning the data collection.
    We inserted the shape model of the objects in the software POV-Ray and modeled
    two cameras, a Wide Angle (WAC) and a Narrow Angle (NAC). We inserted the asteroid's
    parameters and simulated the satellite position. We created various scenes so
    we could obtain a good view of the asteroid. Alpha is entirely visible only in
    the WAC images, while the NAC is expected to reveal surface details. Beta seems
    relatively small in the WAC images, whereas we obtain a broad view from the NAC
    at 100 km distance. Gamma, smaller than Beta, should provide more detailed images
    through the NAC, whereas the WAC images should be able to show its inclined orbit
    around Alpha. To see Gamma behind Alpha in its revolution movement, we would have
    to elevate the camera's orbit. The method employed to simulate images generated
    by satellite cameras can be applied to other scenarios where the target requires
    imaging, extending beyond the field of planetary geology.
