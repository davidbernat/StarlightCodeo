- entry_id: http://arxiv.org/abs/2310.03998v2
  short_id: 2310.03998v2
  title: 'From Colors to Spectra and Back Again: First Near-IR Spectroscopic Survey
    of Neptunian Trojans'
  authors:
  - name: Larissa Markwardt
    affiliation: []
  - name: Hsing Wen Lin
    affiliation: []
  - name: Bryan J. Holler
    affiliation: []
  - name: David W. Gerdes
    affiliation: []
  - name: Fred C. Adams
    affiliation: []
  - name: Renu Malhotra
    affiliation: []
  - name: Kevin J. Napier
    affiliation: []
  summary: In this work, we present 0.7-5.0 μm spectra of eight Neptunian Trojans
    (NTs) as observed by the JWST's NIRSpec instrument. The reddest NT, 2013 VX30,
    exhibits a unique spectrum with strong absorption features between 3 - 4 μm, while
    the bluest NT, 2006 RJ103, shows negligible water absorption. A principal component
    analysis comparing these spectra with those of trans-Neptunian objects (TNOs)
    and Centaurs reveals that most NTs belong to the "Bowl-type" spectral group, while
    2013 VX30 is categorized as "Cliff-type" in the Pinilla-Alonso et al. (2025) taxonomy.
    For the bluest NT in our sample, 2006 RJ103 shows some evidence that it may be
    related to carbonaceous asteroids. For the red object 2011 SO277, we find no close
    TNO spectral counterpart. Except for the true outlier 2011 SO277, NTs have better
    spectral analogs among Plutinos and distant Centaurs, suggesting that spectral
    variation within major groups may arise from current temperature and location,
    rather than solely from formation regions. Finally, we highlight optical slope
    (S') and near-IR slope (SIR1) as effective indicators for distinguishing spectral
    groups and identifying outliers. These findings enable the use of broad-band photometry
    to explore NT and TNO surface compositions, especially for faint objects, which
    will be directly applicable to large photometric surveys like the Dark Energy
    Survey and the Vera C. Rubin Observatory's LSST.
