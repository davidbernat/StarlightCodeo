- entry_id: http://arxiv.org/abs/2403.03839v2
  short_id: 2403.03839v2
  title: How open is the asteroid-mass primordial black hole window?
  authors:
  - name: Matthew Gorton
    affiliation: []
  - name: Anne M. Green
    affiliation: []
  summary: Primordial black holes (PBHs) can make up all of the dark matter (DM) if
    their mass, $m$, is in the so-called 'asteroid-mass window', $10^{17} \, {\rm
    g} \lesssim m \lesssim 10^{22} \, {\rm g}$. Observational constraints on the abundance
    of PBHs are usually calculated assuming they all have the same mass, however this
    is unlikely to be a good approximation. PBHs formed from the collapse of large
    density perturbations during radiation domination are expected to have an extended
    mass function (MF), due to the effects of critical collapse. The PBH MF is often
    assumed to be lognormal, however it has recently been shown that other functions
    are a better fit to numerically calculated MFs. We recalculate both current and
    potential future constraints for these improved fitting functions. We find that
    for current constraints the asteroid-mass window narrows, but remains open (i.e.
    all of the DM can be in the form of PBHs) unless the PBH MF is wider than expected.
    Future evaporation and microlensing constraints may together exclude all of the
    DM being in PBHs, depending on the width of the PBH MF and also the shape of its
    low and high mass tails.
