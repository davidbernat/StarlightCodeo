- entry_id: http://arxiv.org/abs/2508.08409v2
  short_id: 2508.08409v2
  title: Statistical significance of meteorite-asteroid pairs using geocentric parameters
  authors:
  - name: P. M. Shober
    affiliation: []
  summary: "Aims. We will test the statistical significance of meteorite-dropping\
    \ fireballs and NEA clustering using the DN similarity function based on four\
    \ geocentric quantities (U, theta, phi, and lambda).\n  Methods. We calculated\
    \ the cumulative similarity found between 46 meteorite falls, 535 potential meteorite-dropping\
    \ fireballs, 20,516 NEAs maintained by NEODyS-2, along with 34,836 NEAs maintained\
    \ by NASA/JPL HORIZONS. Statistical significance was estimated by either: (1)\
    \ Kernel Density Estimation-based method to estimate the sporadic background distribution\
    \ to draw random samples, or (2) applying a uniform random solar longitude (lambda).\
    \ Each comparison to the synthetic sporadic population is repeated to estimate\
    \ the 3-sigma region for which the cumulative similarity distribution is consistent\
    \ with random association levels.\n  Results. The observed DN cumulative similarity\
    \ distribution between 46 instrumentally observed meteorite falls, 535 potential\
    \ meteorite-dropping fireballs, and over 30k NEAs radiants (estimated using 6\
    \ different radiant methods) reveals no statistically significant excess of similarity\
    \ between the populations consistent with streams.\n  Conclusions. Based on nearly\
    \ 600 fireball observations, there is no statistically significant clustering\
    \ between meteorite falls and NEAs using geocentric impact parameters. If some\
    \ meteorites arrive in streams, they make up less than ~0.1% of all falls. Recent\
    \ asteroid or meteoroid physical processes could still explain features found\
    \ in meteorites, but this activity is not producing distinguishable orbital streams\
    \ or pairs."
