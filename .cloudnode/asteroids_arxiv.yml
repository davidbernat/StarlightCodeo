- entry_id: http://arxiv.org/abs/2310.12919v1
  short_id: 2310.12919v1
  title: Validation of the Survey Simulator tool for the NEO Surveyor mission using
    NEOWISE data
  authors:
  - name: Joseph R. Masiero
    affiliation: []
  - name: Dar W. Dahlen
    affiliation: []
  - name: Amy K. Mainzer
    affiliation: []
  - name: William F. Bottke
    affiliation: []
  - name: Jennifer C. Bragg
    affiliation: []
  - name: James. M. Bauer
    affiliation: []
  - name: Tommy Grav
    affiliation: []
  summary: The Near Earth Object Surveyor mission has a requirement to find two-thirds
    of the potentially hazardous asteroids larger than 140 meters in size. In order
    to determine the mission's expected progress toward this goal during design and
    testing, as well as the actual progress during the survey, a simulation tool has
    been developed to act as a consistent and quantifiable yardstick. We test that
    the survey simulation software is correctly predicting on-sky positions and thermal
    infrared fluxes by using it to reproduce the published measurements of asteroids
    from the NEOWISE mission. We then extended this work to find previously unreported
    detections of known near Earth asteroids in the NEOWISE data archive, a search
    that resulted in 21,661 recovery detections, including 1,166 objects that had
    no previously reported NEOWISE observations. These efforts demonstrate the reliability
    of the NEOS Survey Simulator tool, and the perennial value of searchable image
    and source catalog archives for extending our knowledge of the small bodies of
    the Solar System.
