- entry_id: http://arxiv.org/abs/2605.15197v1
  short_id: 2605.15197v1
  title: 'Primordial Black Hole from Tensor-induced Density Fluctuation: First-order
    Phase Transitions and Domain Walls'
  authors:
  - name: Utkarsh Kumar
    affiliation: []
  - name: Anish Ghoshal
    affiliation: []
  summary: We present a novel \textit{gauge-invariant and minimal} formation mechanism
    of primordial black holes (PBHs) in first-order phase transition (FOPT) and domain
    walls (DW) separately. This is based on the first-order tensor perturbations,
    generated during FOPT from bubble collisions \& sound waves, and from DW annihilation,
    sourcing curvature, at second-order in perturbation theory. We show that the PBH
    formation implies \textit{model-independent constraints} on FOPT parameters ($β/H,
    α, T_{\star}$ ) and on DW parameters, ($α_{\rm ann}, V_{\rm bias}, σ$), from existing
    PBH constraints. We find that asteroid mass PBHs can become the entire dark matter
    (DM) of the Universe, for $T_{\star} \in (4 \times 10^{2}, 10^{4})$ GeV, for $β/H
    \simeq 6$, involving $α>\mathcal{O}(1)$ values. The corresponding FOPT Gravitational
    Waves (GW) amplitude will have its characteristic peak at $Ω_{\rm GW}^{\rm p}
    h^2$ $\sim \mathcal{O}(10^{-8})$ between frequencies $f_{\rm p} \in ({10^{-5},10^{-2}})$
    Hz which is within the reach in LISA and SKA detectors. PBH as entire DM is possible
    for $σ^{1/3} \in [10^{6}, 10^{8}]$ TeV, for $V_{\rm bias}^{1/4} \in [10^7, 10^{10}]$
    MeV with the corresponding GW amplitude peak from DW annihilation $Ω_{\rm GW}^{\rm
    p} h^2$ $\sim \mathcal{O}(10^{-9})$ (for $α_{\rm ann} \sim 10^{-2}$) and peak
    frequencies between $f_{\rm p} \in (4 \times {10^{-4},10^{-1}})$ Hz with ($T_{\rm
    ann} \in 4.5 \times [10^3, 10^6] $) GeV within the reach in LISA and ET detectors.
    We also provide semi-analytical formulae for the tensor-induced density spectrum,
    $P_{δ^{(2)}}$, $M_{\rm PBH}$ and $f_{\rm PBH}$, relating them in terms of FOPT
    and DW parameters which in turn, are related to viable particle physics origin
    of such FOPT and DW, and therefore, constrain such microphysics, either in the
    visible, or in dark sector models.
