- entry_id: http://arxiv.org/abs/2407.13212v1
  short_id: 2407.13212v1
  title: 'Probe the regolith characteristics of asteroids from 9-years infrared observations
    of WISE/NEOWISE: A case study of the Main-Belt Object (656) Beagle'
  authors:
  - name: Liang-Liang Yu
    affiliation: []
  summary: This work presents data processing, fitting procedure, modelling and analyzing
    of 9-years infrared light curves provided by the WISE/NEOWISE telescope, by which
    the regolith characteristics of Main-Belt Object (656) Beagle is studied. We determine
    Beagle's effective diameter $D_{\rm eff}=57.3^{+4.5}_{-2.2}$ km, geometric albedo
    $p_{\rm v}=0.05^{+0.004}_{-0.007}$, mean roughness $θ_{\rm RMS}=44\pm4^\circ$,
    mean grain size $b=100^{+350}_{-90}~μ$m, mean specific heat capacity $c_{\rm p}=173\sim516\rm~JKg^{-1}K^{-1}$,
    mean thermal conductivity $κ=0.7\sim1.3\times10^{-3}\rm~Wm^{-1}K^{-1}$ and mean
    thermal inertia $Γ=14\sim32\rm~Jm^{-2}s^{-0.5}K^{-1}$. The albedo of Beagle is
    a little anomalous that the albedos of Beagle's neighbouring asteroids are more
    close to Themis, rather than Beagle itself. The W1-band near-infrared light curves
    don't reveal significant heterogeneous NIR features on the surface of Beagle,
    being inconsistent with the expectation of a family parent that has members with
    diverse NIR spectral types. These results add new clues of Beagle probably being
    an interloper or a sister, rather than the parent of its neighbouring asteroids
    including the first main-belt comet (MBC) 133P, hence may lead to new scenarios
    about the origin of famous MBC 133P. Besides, we found that asteroidal shape models
    from inversion of optical light curves are imperfect for modeling infrared lightcurves,
    thus could mislead evaluations of both the heterogeneity of regolith reflectivity
    at near infrared and thermophysical characteristics at thermal infrared.
