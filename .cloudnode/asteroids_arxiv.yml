- entry_id: http://arxiv.org/abs/2605.12391v1
  short_id: 2605.12391v1
  title: Trajectory-Agnostic Asteroid Detection in TESS with Deep Learning
  authors:
  - name: Brian P. Powell
    affiliation: []
  - name: Jorge Martinez-Palomera
    affiliation: []
  - name: Amy Tuson
    affiliation: []
  - name: Christina Hedges
    affiliation: []
  - name: Jessie Dotson
    affiliation: []
  - name: Jordan Caraballo-Vega
    affiliation: []
  summary: We present a novel method for extracting moving objects from TESS data
    using machine learning. Our approach uses two stacked 3D U-Nets with skip connections,
    which we call a W-Net, to filter background and identify pixels containing moving
    objects in TESS image time-series data. By augmenting the training data through
    rotation of the image cubes, our method is robust to differences in speed and
    direction of asteroids, requiring no assumptions for either parameter range which
    are typically required in "shift-and-stack" type algorithms. We also developed
    a novel method for learned data scaling that we call Adaptive Normalization, which
    allows the neural network to learn the ideal range and scaling distribution required
    for optimal data processing. We built a code for creating TESS training data with
    asteroid masks that served as the foundation of our effort (tess-asteroid-ml),
    which we publicly released for the benefit of the community. Our method is not
    limited to TESS, but applicable for implementation in other similar time-domain
    surveys, making it of particular interest for use with data from upcoming missions
    such as the Nancy Grace Roman Space Telescope and NEOSurveyor.
