  summary: 'Near-sun sky twilight observations allow for the detection of asteroid
    interior to the orbit of Venus (Aylos), the Earth (Atiras), and comets. We present
    the results of observations with the Palomar 48-inch telescope (P48)/Zwicky Transient
    Facility (ZTF) camera in 30 s r-band exposures taken during evening astronomical
    twilight from 2019 Sep 20 to 2022 March 7 and during morning astronomical twilight
    sky from 2019 Sep 21 to 2022 Sep 29. More than 46,000 exposures were taken in
    evening and morning astronomical twilight within 31 to 66 degrees from the Sun
    with an r-band limiting magnitude between 18.1 and 20.9. The twilight pointings
    show a slight seasonal dependence in limiting magnitude and ability to point closer
    towards the Sun, with limiting magnitude slightly improving during summer. In
    total, the one Aylo, (594913) ''Ayló''chaxnim, and 4 Atiras, 2020 OV1, 2021 BS1,
    2021 PB2, and 2021 VR3, were discovered in evening and morning twilight observations.
    Additional twilight survey discoveries also include 6 long-period comets: C/2020
    T2, C/2020 V2, C/2021 D2, C/2021 E3, C/2022 E3, and C/2022 P3, and two short-period
    comets: P/2021 N1 and P/2022 P2 using deep learning comet detection pipelines.
    The P48/ZTF twilight survey also recovered 11 known Atiras, one Aylo, three short-period
    comes, two long-period comets, and one interstellar object. Lastly, the Vera Rubin
    Observatory will conduct a twilight survey starting in its first year of operations
    and will cover the sky within 45 degrees of the Sun. Twilight surveys such as
    those by ZTF and future surveys will provide opportunities for discovering asteroids
    inside the orbits of Earth and Venus.'
