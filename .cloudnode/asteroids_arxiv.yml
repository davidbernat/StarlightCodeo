- entry_id: http://arxiv.org/abs/2503.13375v1
  short_id: 2503.13375v1
  title: 'Asteroid (4337) Arecibo: Two ice-rich bodies forming a binary -- Based on
    Gaia astrometric data'
  authors:
  - name: Ziyu Liu
    affiliation: []
  - name: Daniel Hestroffer
    affiliation: []
  - name: Josselin Desmars
    affiliation: []
  - name: Pedro David
    affiliation: []
  summary: Context. Binary asteroids are present in all populations of the Solar System,
    from near-Earth to trans-Neptunian regions. As is true for the small Solar System
    bodies (SSSBs), binary asteroids generally offer valuable insights into the formation
    of the Solar System, as well as its collisions and dynamic evolution. In particular,
    the binaries provide fundamental quantities and properties of these SSSBs, such
    as mass, angular momentum, and density, all of which are often hidden. The direct
    measurement of densities and porosities is of great value in revealing the gravitational
    aggregates and icy bodies that form the asteroid-comet continuum. Aims. Several
    observation techniques from space and ground-based platforms have provided many
    results in this regard. Here we show the value of the Gaia mission and its high-precision
    astrometry for analysing asteroid binaries and for individually deriving the masses
    of the components. Methods. We focus on the binary asteroid (4337) Arecibo, a
    member of the Themis family. We analysed the astrometry obtained in the Gaia FPR
    catalogue release, and performed orbital fitting for both the heliocentric orbit
    of the system and the relative orbit of the binary components. Results. We obtain
    an estimation of the component masses and their flux ratio, and derive bulk densities
    rho1 = 1.2 and rho2 = 1.6 for the primary and the secondary, respectively. The
    results are consistent with an ice-rich body in the outer main belt. They also
    show a significantly denser secondary or a less closely packed primary. Constraints
    on these densities and on macroscopic porosities are nevertheless limited by our
    poor knowledge of the sizes of the components. Observations of future mutual events,
    and of stellar occultations predicted in 2024 - 2025, will be essential for improving
    our knowledge of this system and its formation.
