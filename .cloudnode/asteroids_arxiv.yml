- entry_id: http://arxiv.org/abs/2504.18605v1
  short_id: 2504.18605v1
  title: Explainable Deep-Learning Based Potentially Hazardous Asteroids Classification
    Using Graph Neural Networks
  authors:
  - name: Baimam Boukar Jean Jacques
    affiliation: []
  summary: Classifying potentially hazardous asteroids (PHAs) is crucial for planetary
    defense and deep space navigation, yet traditional methods often overlook the
    dynamical relationships among asteroids. We introduce a Graph Neural Network (GNN)
    approach that models asteroids as nodes with orbital and physical features, connected
    by edges representing their similarities, using a NASA dataset of 958,524 records.
    Despite an extreme class imbalance with only 0.22% of the dataset with the hazardous
    label, our model achieves an overall accuracy of 99% and an AUC of 0.99, with
    a recall of 78% and an F1-score of 37% for hazardous asteroids after applying
    the Synthetic Minority Oversampling Technique. Feature importance analysis highlights
    albedo, perihelion distance, and semi-major axis as main predictors. This framework
    supports planetary defense missions and confirms AI's potential in enabling autonomous
    navigation for future missions such as NASA's NEO Surveyor and ESA's Ramses, offering
    an interpretable and scalable solution for asteroid hazard assessment.
