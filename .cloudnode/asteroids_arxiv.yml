- entry_id: http://arxiv.org/abs/2512.22375v1
  short_id: 2512.22375v1
  title: Formation of the Moon and Binary Asteroids
  authors:
  - name: Nick Gorkavyi
    affiliation: []
  summary: 'The proposed multi-impact model explains the formation of the Moon, Charon,
    and binary asteroids without invoking catastrophic cosmic events. The main elements
    of the new model are as follows: a. A primordial, low-mass proto-satellite disk
    with prograde rotation existed around the proto-Earth. b. Most of the lunar material
    was ejected from Earth mantle by numerous impacts of large asteroids. This naturally
    explains the lunar iron deficiency. c. Collisions between ejecta and particles
    of the prograde proto-satellite disk stabilize the fragments on satellite orbits.
    We demonstrate the high efficiency of the multi-impact mechanism: ejecta on prograde
    orbits readily merges with the prograde proto-satellite disk, whereas retrograde
    ejecta falls back onto Earth.'
