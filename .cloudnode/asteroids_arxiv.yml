- entry_id: http://arxiv.org/abs/2404.19390v1
  short_id: 2404.19390v1
  title: EL meteorites do date the giant planet instability
  authors:
  - name: Chrysa Avdellidou
    affiliation: []
  - name: Marco Delbo
    affiliation: []
  - name: David Nesvorny
    affiliation: []
  - name: Kevin J. Walsh
    affiliation: []
  - name: Alessandro Morbidelli
    affiliation: []
  summary: In our recent work, we combined dynamical simulations, meteoritic data
    and thermal models as well as asteroid observations to argue that the current
    parent body of the EL meteorites was implanted into the asteroid belt not earlier
    than 60 Myr after the beginning of the Solar System and that the most likely capture
    mechanism was the giant planet orbital instability. In the study "The link between
    Athor and EL meteorites does not constrain the timing of the giant planet instability"
    that appeared in arXiv, Izidoro and collaborators argue that the implantation
    of Athor into the asteroid belt does not necessarily require that the giant planet
    orbital instability occurred at the implantation time. Here we provide further
    arguments that, in the end, the giant planet instability is still the most likely
    dynamical process to implant asteroid Athor into the asteroid main belt between
    60 and 100 Myr after the beginning of the Solar System.
