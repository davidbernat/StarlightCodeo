  - name: Ph. Bendjoya
    affiliation: []
  - name: J. -P. Rivet
    affiliation: []
  - name: L. Abe
    affiliation: []
  - name: D. Vernet
    affiliation: []
  - name: A. Cellino
    affiliation: []
  summary: Near Earth Asteroids are of great interest to the scientific community
    due to their proximity to Earth, making them both potential hazards and possible
    targets for future missions, as they are relatively easy to reach by spacecraft.
    A number of techniques and models can be used to constrain their physical parameters
    and build a comprehensive assessment of these objects. In this work, we compare
    physical property results obtained from improved $H_V$ absolute magnitude values,
    thermophysical modeling, and polarimetry data for the well-known Amor-class NEO
    1627 Ivar. We show that our fits for albedo are consistent with each other, thus
    demonstrating the validity of this cross-referencing approach, and propose a value
    for Ivar's albedo of $0.24^{+0.04}_{-0.02}$ . Future observations will extend
    this work to a larger sample size, increasing the reliability of polarimetry for
    rapid asteroid property characterization, as a technique independent of previously
    established methods and requiring significantly fewer observations.
