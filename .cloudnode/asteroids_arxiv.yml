- entry_id: http://arxiv.org/abs/2308.03749v1
  short_id: 2308.03749v1
  title: Rearrangement of Granular Surfaces on Asteroids due to Thermal Cycling
  authors:
  - name: Danielle Bovie
    affiliation: []
  - name: A. C. Quillen
    affiliation: []
  - name: Rachel Glade
    affiliation: []
  summary: In granular systems, thermal cycling causes compaction, creep, penetration
    of dense objects, and ratcheting of grains against each other. On asteroid surfaces,
    thermal cycling is high amplitude and can happen billions of times in a few million
    years. We use a 1-dimensional thermophysical conductivity model to estimate the
    relative displacement of grains in proximity to one another, caused by variations
    in thermal conductivity or shadows. We find that grains would experience relative
    displacements of order a few microns during each thermal cycle. If thermal cycling
    causes diffusive transport, then the asteroid's few centimeters deep thermal skin
    depth could flow a few centimeters in a million years. Thermal cycling could cause
    long-distance flows on sloped surfaces, allowing fine materials to collect in
    depressions.
