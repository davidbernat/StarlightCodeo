- entry_id: http://arxiv.org/abs/2604.18664v1
  short_id: 2604.18664v1
  title: 'Asteroid Mining to Sustain a Mars Colony: A Logistics Point of View'
  authors:
  - name: Serena Suriano
    affiliation: []
  - name: Shamil Biktimirov
    affiliation: []
  - name: Dmitry Pritykin
    affiliation: []
  - name: Anton Ivanov
    affiliation: []
  summary: Asteroid mining can become an enabling technology to establish a sustainable
    manned colony on Mars, which requires metallic materials more often than they
    are readily available in shipments from Earth. This paper describes a feasibility
    study of a supply chain that delivers metals extracted from metallic asteroids
    to Mars. The asteroids are selected to respect the $ΔV$ limits imposed by up-to-date
    spacecraft. The study is conducted with reference to the state of the art in space
    transportation technologies and in-situ resource utilization. A possibility for
    mining on carbonaceous asteroids to produce the propellant required for return
    trips is also taken into account. Different supply chains are computed through
    a multi-objective optimization routine that considers the mission $ΔV$, the mass
    of extracted metals and the mass of propellant produced on the asteroids. Schedules
    to visit the asteroids within reach are obtained and the total mass of the delivered
    material is evaluated for various mining rates. Finally, the use of the metallic
    material to build habitats and rovers on the Martian soil through additive manufacturing
    is discussed.
