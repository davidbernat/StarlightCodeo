  title: $\textit{In situ}$ time-resolved X-ray absorption spectroscopy of shock-loaded
    magnesiosiderite
  authors:
  - name: Anand Prashant Dwivedi
    affiliation: []
  - name: Jean-Alexis Hernandez
    affiliation: []
  - name: Sofia Balugani
    affiliation: []
