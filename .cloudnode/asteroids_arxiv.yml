  title: Physical Characteristics of the Asteroid (469219) Kamo'oalewa as a target
    of the Chinese Tianwen-2 mission
  authors:
  - name: Xiaobin Wang
    affiliation: []
  - name: Karri Muinonen
    affiliation: []
  - name: Shenghong Gu
    affiliation: []
  - name: Xin Liu
    affiliation: []
  - name: Xiyun Hou
    affiliation: []
  - name: Jing Huang
    affiliation: []
  summary: The Near-earth asteroid (469219) Kamo'oalewa, a quasi-satellite of the
    Earth, is going to be observed in site and sampled by the Chinese space mission
    Tianwen-2 in near future. Here. we analyze its photometric and spectroscopic data
    to figure out its basic physical properties, which are very important for the
    sample return task of the Tianwen-2 mission. With photometry inversion methods,
    we derived a pole $(276^{o}.79, -21^{o}.43)$ with a spin period of 28.4517 minutes
    and a slightly flat convex shape. The estimated photometry slope of $0.998 mag/rad$
    implies a large albedo of the Kamo'oalewa, i.e. S-type. Using the estimated absolute
    magnitude of $24.98$ mag, its size could be 27.4m assuming a typical albedo of
    S-type asteroids. The taxonomy analysis with a constructed ANN tool also supports
    that the Kamo'oalewa should belong to S-type asreroids, it may be a strong weathering
    fragment of an A-type or Q-type asteroid. Using derived pole, size and shape information
    of the target, we estimated its thermal inertia as $163.0 Jm^{-2}K^{-1}s^{-1/2}$
    based on the new derived Yarkovski draft $A_2=-13.29349563\times10^{-14}au/day^2$,
    which means the target has a surface of mixture of grains and small bounds, like
    the surface of asteroid Bennu.
