- entry_id: http://arxiv.org/abs/2512.10002v1
  short_id: 2512.10002v1
  title: The Space-Based Time-Domain Revolution in Astrophysics
  authors:
  - name: Daniel Huber
    affiliation: []
  summary: 'Space-based time-domain telescopes such as CoRoT, Kepler/K2 and TESS have
    profoundly impacted astrophysics over the past two decades. Continuous light curves
    with high cadence and high photometric precision are now available for millions
    of sources within our galaxy and beyond. In addition to revolutionizing exoplanet
    science, the data have enabled breakthroughs ranging from the solar system to
    stellar interiors, the transient universe, and active galaxies. The key summary
    points of this review are: (1) Stellar astrophysics has been transformed by the
    ability to probe the internal structures of stars, test the physics of stellar
    convection, connect stellar rotation and magnetic activity, and reveal complex
    variability in young stars. (2) Ages of stellar populations probe the formation
    history of our Milky Way, and binary star variability enables the detection of
    "dark" galactic populations such as solar-mass black holes and neutron stars.
    (3) Early-time observations of explosive transients provide new insights into
    the progenitors of supernovae, while the quasi-periodic variability of galaxies
    probes the physics of accretion processes onto supermassive black holes and the
    tidal disruption of stars. (4) Observations of solar system objects reveal asteroid
    compositions through their rotation periods and amplitudes, constrain the cloud
    structure of ice giants, and allow the discovery of new objects in the outer solar
    system. (5) Open data policies and software have contributed to remarkable scientific
    productivity and enabled discoveries by citizen scientists, including new exoplanets
    and exotic variability in mature Sun-like stars.'
