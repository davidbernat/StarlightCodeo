  title: Irradiation induced mineral changes of NWA10580 meteorite determined by infrared
    analysis
  authors:
  - name: I. Gyollai
    affiliation: []
  - name: S. Biri
    affiliation: []
  - name: Z. Juhász
    affiliation: []
  - name: Cs. Király
    affiliation: []
  - name: B. D. Pál
    affiliation: []
  - name: R. Rácz
    affiliation: []
  - name: D. Rezes
    affiliation: []
  - name: B. Sulik
    affiliation: []
  - name: M. Szabó
    affiliation: []
  - name: Z. Szalai
    affiliation: []
  - name: P. Szávai
    affiliation: []
  - name: T. Szklenár
    affiliation: []
  - name: Á. Kereszturi
    affiliation: []
  summary: "Context. Identifying minerals on asteroid surfaces is difficult as space\
    \ weathering modifies the minerals infrared spectra. This shouldbe better understood\
    \ for proper interpretation.\n  Aims. We simulated the space weathering effects\
    \ on a meteorite and recorded the alterations of the crystalline structure, such\
    \ as the change in peak positions and full width at half maximum values.\n  Methods.\
    \ We used proton irradiation to simulate the effects of solar wind on a sample\
    \ of NWA 10580 CO3 chondrite meteorites. After irradiation in three gradually\
    \ increased steps with 1 keV ion energy, we used infrared microscopic reflectance\
    \ and diffuse reflectance infrared Fourier transform spectroscopy (DRIFTS) to\
    \ identify and understand the consequences of irradiation.\n  Results. We find\
    \ negative peak shifts after the first and second irradiations at pyroxene and\
    \ feldspar minerals, similarly to the literature, and this shift was attributed\
    \ to Mg loss. However, after the third irradiation a positive change in values\
    \ in wavenumber emerged for silicates, which could come from the distortion of\
    \ SiO4 tetrahedra, resembling shock deformation. The full width at half maximum\
    \ values of major bands show a positive (increasing) trend after irradiations\
    \ in the case of feldspars, using IR reflection measurements. Comparing DRIFTS\
    \ and reflection infrared data, the peak positions of major mineral bands were\
    \ at similar wavenumbers, but differences can be observed in minor bands.\n  Conclusions.\
    \ We measured the spectral changes of meteorite minerals after high doses of proton\
    \ irradiation for several minerals. We show the first of these measurements for\
    \ feldspars; previous works only presented pyroxene, olivine, and phyllosilicates."
