- entry_id: http://arxiv.org/abs/2410.21585v1
  short_id: 2410.21585v1
  title: 'Near Earth stream decoherence revisited: the limits of orbital similarity'
  authors:
  - name: Patrick M. Shober
    affiliation: []
  - name: Ariane Courtot
    affiliation: []
  - name: Jeremie Vaubaillon
    affiliation: []
  summary: "Context. Orbital similarity measures, such as the D-values, have been\
    \ extensively used in meteor science to identify meteoroid streams and associate\
    \ meteorite falls with near-Earth objects (NEOs). However, the chaotic nature\
    \ of near-Earth space challenges the long-term reliability of these measures for\
    \ stream identification, and the increasing size of our fireball, meteorite fall,\
    \ and NEO databases make random associations more common. Despite this, many researchers\
    \ erroneously continue to use orbital similarity beyond its inherent limits.\n\
    \  Aims. We aim to assess the statistical significance of using orbital similarity\
    \ measures for identifying streams of meteoroids or asteroids and explore the\
    \ implications of chaotic dynamics on the long-term coherence of these streams.\n\
    \  Conclusions. The rapid decoherence of meteoroid streams and the chaotic dynamics\
    \ of near-Earth orbits suggest that no reported stream or NEO associations of\
    \ meteorites or fireballs are statistically significant according to orbital discriminates.\
    \ Many are likely coincidental rather than indicative of a true physical link.\
    \ However, several statistically significant clusters found within the NEO population\
    \ are consistent with a tidal disruption formation. This contrast and lack of\
    \ statistically significant associations amongst the impact datasets is likely\
    \ due to the fireball databases being 2 orders of magnitude smaller than the NEO\
    \ database and the higher intrinsic uncertainties of fireball observation derived\
    \ orbits."
