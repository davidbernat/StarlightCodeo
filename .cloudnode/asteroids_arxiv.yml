- entry_id: http://arxiv.org/abs/2503.08854v2
  short_id: 2503.08854v2
  title: Survey-Wide Asteroid Discovery with a High-Performance Computing Enabled
    Non-Linear Digital Tracking Framework
  authors:
  - name: Nathan Golovich
    affiliation: []
  - name: Trevor Steil
    affiliation: []
  - name: Alex Geringer-Sameth
    affiliation: []
  - name: Keita Iwabuchi
    affiliation: []
  - name: Ryan Dozier
    affiliation: []
  - name: Roger Pearce
    affiliation: []
  summary: Modern astronomical surveys detect asteroids by linking together their
    appearances across multiple images taken over time. This approach faces limitations
    in detecting faint asteroids and handling the computational complexity of trajectory
    linking. We present a novel method that adapts ``digital tracking" - traditionally
    used for short-term linear asteroid motion across images - to work with large-scale
    synoptic surveys such as the Vera Rubin Observatory Legacy Survey of Space and
    Time (Rubin/LSST). Our approach combines hundreds of sparse observations of individual
    asteroids across their non-linear orbital paths to enhance detection sensitivity
    by several magnitudes. To address the computational challenges of processing massive
    data sets and dense orbital phase spaces, we developed a specialized high-performance
    computing architecture. We demonstrate the effectiveness of our method through
    experiments that take advantage of the extensive computational resources at Lawrence
    Livermore National Laboratory. This work enables the detection of significantly
    fainter asteroids in existing and future survey data, potentially increasing the
    observable asteroid population by orders of magnitude across different orbital
    families, from near-Earth objects (NEOs) to Kuiper belt objects (KBOs).
