- entry_id: http://arxiv.org/abs/2401.01210v1
  short_id: 2401.01210v1
  title: Numerical behavior of the Keplerian Integral methods for initial orbit determination
  authors:
  - name: Óscar Rodríguez
    affiliation: []
  - name: Giovanni F. Gronchi
    affiliation: []
  - name: Giulio Baù
    affiliation: []
  - name: Robert Jedicke
    affiliation: []
  summary: 'We investigate the behaviour of two recent methods for the computation
    of preliminary orbits. These methods are based on the conservation laws of Kepler''s
    problem, and enable the linkage of very short arcs of optical observations even
    when they are separated in time by a few years. Our analysis is performed using
    both synthetic and real data of 822 main belt asteroids. The differences between
    computed and true orbital elements have been analysed for the true linkages, as
    well as the occurrence of alternative solutions. Some metrics have been introduced
    to quantify the results, with the aim of discarding as many of the false linkages
    as possible and keeping the vast majority of true ones. These numerical experiments
    provide thresholds for the metrics which take advantage of the knowledge of the
    \emph{ground truth}: the values of these thresholds can be used in normal operation
    mode, when we do not know the correct values of the orbital elements and whether
    the linkages are true or false.'
