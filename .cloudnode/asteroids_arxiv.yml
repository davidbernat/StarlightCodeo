- entry_id: http://arxiv.org/abs/2505.04618v3
  short_id: 2505.04618v3
  title: Linear Thermal Instability of a Condensing Gas-Particle Mixture, with Possible
    Application to Chondrites and Planetesimals
  authors:
  - name: Kecheng Stephon Qian
    affiliation:
    - Berkeley
  - name: Eugene Chiang
    affiliation:
    - Berkeley
  summary: We study the stability of a hot saturated gas coexisting with condensed
    particles in an optically thin medium. Such a situation may obtain downstream
    of a shock, at condensation fronts, or in vaporizing impacts. We show that the
    gas-particle mixture is subject to a thermal instability whereby a region of lower
    temperature and higher condensate density cools faster to condense faster. If
    the region of runaway condensation has a sound-crossing time shorter than its
    cooling time, then it accretes more mass, in gas and particles, from its higher
    pressure surroundings. Numerical integration of the linearized perturbation equations
    demonstrates that this radiation-condensation instability can create particle
    clumps and voids out of a secularly cooling gas. Provided radiation can escape
    to cool particle overdensities, thermal instability can help assemble chondrite
    parent bodies out of the vaporized debris of asteroid collisions, and form planetesimals
    generally.
