- entry_id: http://arxiv.org/abs/2401.04021v1
  short_id: 2401.04021v1
  title: Resident space object detection method based on the connection between Fourier
    spectrum of the video data difference frame and the linear velocity projection
  authors:
  - name: V. S. Baranova
    affiliation: []
  - name: A. A. Spiridonov
    affiliation: []
  - name: V. A. Cherny
    affiliation: []
  - name: D. V. Ushakov
    affiliation: []
  - name: V. A. Saetchnikov
    affiliation: []
  summary: 'A method for resident space object (RSO) detection in video stream processing
    using a set of matched filters has been proposed. Matched filters are constructed
    based on the connection between the Fourier spectrum shape of the difference frame
    and the magnitude of the linear velocity projection onto the observation plane.
    Experimental data were obtained using the mobile optical surveillance system for
    low-orbit space objects. The detection problem in testing mode was solved for
    raw video data with intensity signals from three different satellites: KORONAS-FOTON,
    CUSAT 2/FALCON 9, GENESIS 1. Difference frames of video data with the AQUA satellite
    pass to construct matched filters were used. The satellites were automatically
    detected at points where the difference in the value of their linear velocity
    projection and the reference satellite was close in value. It has been established
    that the difference in the inclination angle between the detected satellite intensity
    signal Fourier image and the reference satellite mask corresponds to the difference
    in the inclinations of these objects. The proposed method allows not only to detect
    but also to study the motion parameters of both artificial and natural space objects,
    such as satellites, debris and asteroids.'
