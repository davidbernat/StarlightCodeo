  title: Cross validation of albedo determination for 1627 Ivar from three different
    techniques
  authors:
  - name: Elena Selmi
    affiliation: []
  - name: M. Devogèle
    affiliation: []
  - name: J. R. Masiero
    affiliation: []
  - name: N. Vega Santiago
