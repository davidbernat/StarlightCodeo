- entry_id: http://arxiv.org/abs/2310.13112v4
  short_id: 2310.13112v4
  title: 'Asteroid 2023 NT1: A Cautionary Tale'
  authors:
  - name: Brin K. Bailey
    affiliation: []
  - name: Alexander N. Cohen
    affiliation: []
  - name: Sasha Egan
    affiliation: []
  - name: Philip Lubin
    affiliation: []
  - name: Ruitao Xu
    affiliation: []
  - name: Mark Boslough
    affiliation: []
  - name: Darrel Robertson
    affiliation: []
  - name: Elizabeth Silber
    affiliation: []
  - name: Irina Sagert
    affiliation: []
  - name: Oleg Korobkin
    affiliation: []
  - name: Glenn Sjoden
    affiliation: []
  summary: We investigate various short-warning mitigation scenarios via fragmentation
    for a hypothetical impact of asteroid 2023 NT1, a Near-Earth Object (NEO) that
    was discovered on July 15, 2023, two days after its closest approach to Earth
    on July 13. The asteroid passed by Earth within ~0.25 lunar distances, with a
    closest approach of ~1$\times10^5$ km and velocity of 11.27 km/s. Its size remains
    largely uncertain, with an estimated diameter range of 26-58 m and a most probable
    estimate of 34 m [JPL Sentry, September 15, 2023] (weighted by the NEO size frequency
    distribution). If 2023 NT1 had collided with Earth, it could have caused significant
    local damage. Assuming a spherical asteroid with a diameter of 34 m, uniform density
    of 2.6 g/cm$^3$, and impact velocity of 15.59 km/s, a collision would have yielded
    an estimated impact energy of ~1.5 Mt, approximately three times the energy of
    the Chelyabinsk airburst in 2013. We analyze the effectiveness of mitigation via
    intentional robust disruption (IRD) for objects similar to 2023 NT1. We utilize
    Pulverize It (PI), a NASA Innovative Advanced Concepts (NIAC) study of planetary
    defense via fragmentation, to model potential mitigation scenarios through simulations
    of hypervelocity asteroid disruption and atmospheric ground effects in the case
    of a terminal defense mode. Simulations suggest that PI is an effective multi-modal
    approach for planetary defense that can operate in extremely short interdiction
    modes, in addition to long interdiction time scales with extended warning. Our
    simulations support the proposition that threats like 2023 NT1 can be effectively
    mitigated with intercepts of one day (or less) prior to impact, yielding minimal
    to no ground damage.
