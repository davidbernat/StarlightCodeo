- entry_id: http://arxiv.org/abs/2603.28837v1
  short_id: 2603.28837v1
  title: 'Mercury Craters Named after Tajik-Persian Poets: Planetary Nomenclature
    as a Form of Preserving Cultural Heritage'
  authors:
  - name: Rizoi Bakhromzod
    affiliation: []
  summary: 'Nine impact craters on Mercury bear the names of Persian-Tajik poets:
    Rudaki, Saadi, Nizami, Rumi, Navoi, Firdousi, Hafiz, Sanai, and Mahsati. We compile
    IAU-approved coordinates, diameters, quadrant designations, approval dates (1976--2025),
    and MESSENGER-derived geological characteristics for each crater, and place these
    data in the broader context of Solar System objects associated with Tajik-Persian
    civilisation, including lunar craters (Al-Biruni, Avicenna, Omar Khayyam, Abul
    Wafa, Nasireddin, Alfraganus, Azophi, Al-Khwarizmi), main-belt asteroids, and
    Enceladus surface features named from the One Thousand and One Nights. The approval
    timeline mirrors the successive stages of Mercury mapping: two craters were designated
    after Mariner 10 (1976), three more following Mariner 10 data analysis (1979,
    1985), two after the first MESSENGER flybys (2008, 2010), two after MESSENGER
    orbital operations (2014), and one in 2025. Geological diversity is notable: the
    Sanai basin (490 km, ~3.8--3.9 Ga) is among the oldest large structures on Mercury;
    Firdousi shows lava-flooded floor morphology; Rumi hosts an explosive pyroclastic
    vent intersected by Palmer Rupes; Hafiz contains low-reflectance material and
    hollows; Navoi is a pit-floor crater; and Nizami exhibits polygonal wall geometry.
    These results illustrate how planetary nomenclature serves as a stable, internationally
    maintained record of cultural heritage.'
