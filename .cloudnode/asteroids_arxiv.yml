  title: 'Mixing model of Phobos'' bulk elemental composition for the determination
    of its origin: Multivariate analysis of MMX/MEGANE data'
  authors:
  - name: Kaori Hirata
    affiliation:
    - Institute of Space and Astronautical Science
    - Department of Earth and Planetary Science, The University of Tokyo, Japan
  - name: Tomohiro Usui
    affiliation:
    - Institute of Space and Astronautical Science
  - name: Ryuki Hyodo
    affiliation:
    - Institute of Space and Astronautical Science
  - name: Hidenori Genda
    affiliation:
    - Earth-Life Science Institute
  - name: Ryota Fukai
    affiliation:
    - Institute of Space and Astronautical Science
  - name: David J. Lawrence
    affiliation:
    - The Johns Hopkins University Applied Physics Laboratory, USA
  - name: Nancy L. Chabot
    affiliation:
    - The Johns Hopkins University Applied Physics Laboratory, USA
  - name: Patrick N. Peplowski
    affiliation:
    - The Johns Hopkins University Applied Physics Laboratory, USA
  - name: Hiroki Kusano
    affiliation:
    - National Institutes for Quantum Science and Technology, Japan
  summary: 'The formation process of the two Martian moons, Phobos and Deimos, is
    still debated with two main competing hypotheses: the capture of an asteroid or
    a giant impact onto Mars. In order to reveal their origin, the Martian Moons eXploration
    (MMX) mission by Japan Aerospace Exploration Agency (JAXA) plans to measure Phobos''
    elemental composition by a gamma-ray and neutron spectrometer called MEGANE. This
    study provides a model of Phobos'' bulk elemental composition, assuming the two
    formation hypotheses. Using the mixing model, we established a MEGANE data analysis
    flow to discriminate between the formation hypotheses by multivariate analysis.
    The mixing model expresses the composition of Phobos in 6 key lithophile elements
    that will be measured by MEGANE (Fe, Si, O, Ca, Mg, and Th) as a linear mixing
    of two mixing components: material from Mars and material from an asteroid as
    represented by primitive meteorite compositions. The inversion calculation includes
    consideration of MEGANE''s measurement errors ($E_P$) and derives the mixing ratio
    for a given Phobos composition, based on which the formation hypotheses are judged.
    For at least 65\% of the modeled compositions, MEGANE measurements will determine
    the origin uniquely ($E_P$ = 30\%), and this increases from 74 to 87\% as $E_P$
    decreases from 20 to 10\%. Although the discrimination performance depends on
    $E_P$, the current operation plan for MEGANE predicts an instrument performance
    for $E_P$ of 20--30\%, resulting in ~70\% discrimination between the original
    hypotheses. MEGANE observations can also enable the determination of the asteroid
    type of the captured body or the impactor. The addition of other measurements,
    such as MEGANE''s measurements of the volatile element K, as well as observations
    by other MMX remote sensing instruments, will also contribute to the MMX mission''s
    goal to constrain the origin of Phobos.'
