- entry_id: http://arxiv.org/abs/2310.17985v1
  short_id: 2310.17985v1
  title: Debiased population of very young asteroid families
  authors:
  - name: David Vokrouhlický
    affiliation: []
  - name: David Nesvorný
    affiliation: []
  - name: Miroslav Brož
    affiliation: []
  - name: William F. Bottke
    affiliation: []
  summary: We use observations from the Catalina Sky Survey (CSS) to determine the
    bias-corrected population of small members in four very young families down to
    sizes equivalent to several hundred meters. Using the most recent catalog of known
    asteroids, we identified members from four young families for which the population
    has grown appreciably over recent times. A large fraction of these bodies have
    also been detected by CSS. We used synthetic populations of asteroids, with their
    magnitude distribution controlled by a small number of parameters, as a template
    for the bias-corrected model of these families. Applying the known detection probability
    of the CSS observations, we could adjust these model parameters to match the observed
    (biased) populations in the young families. In the case of three families, Datura,
    Adelaide, and Rampo, we find evidence that the magnitude distribution transitions
    from steep to shallow slopes near $300$ to $400$ meters. Conversely, the Hobson
    family population may be represented by a single power-law model. The Lucascavin
    family has a limited population; no new members have been discovered over the
    past two decades. We consider a model of parent body rotational fission with the
    escaping secondary tidally split into two components (thereby providing three
    members within this family). In support of this idea, we find that no other asteroid
    with absolute magnitude $H\leq 18.3$ accompanies the known three members in the
    Lucascavin family. A similar result is found for the archetypal asteroid pair
    Rheinland--Kurpfalz.
