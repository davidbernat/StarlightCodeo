  title: The Dust Mineralogy of Interstellar Comet 3I/ATLAS from JWST/MIRI Observations
  authors:
  - name: Matthew Belyakov
    affiliation: []
  - name: Ian Wong
    affiliation: []
  - name: Carey M. Lisse
    affiliation: []
  - name: M. Ryleigh Davis
    affiliation: []
  - name: Bryce T. Bolin
    affiliation: []
  - name: Audrey Martin
    affiliation: []
  - name: Klaus M. Pontoppidan
    affiliation: []
  - name: Geoffrey A. Blake
    affiliation: []
  - name: Christine Chen
    affiliation: []
  - name: Michael E. Brown
    affiliation: []
  summary: We present the first spectroscopic mineralogical analysis of the dust coma
    of an interstellar object (ISO) from JWST mid-infrared spectroscopy of 3I/ATLAS
    (3I). 3I exhibits a strong 10-micron emissivity feature commonly seen on asteroids,
    comets, disks, and the interstellar medium. Characterization of this 10-micron
    emissivity maximum reveals that 3I's dust composition is dominated by amorphous
    silicates, and that 3I is unlike Solar System comets, which show significant crystalline
    silicate dust. Instead, 3I's dust composition is more similar to circumstellar
    transition disks and the interstellar medium. We suggest 3I may have formed in
    a distant part of its home system out of interstellar medium-like material, without
    substantial incorporation of silicates condensed near its host star, unlike the
    mixing scenarios commonly hypothesized for Solar System comets. Alternatively,
    3I's original crystalline silicates may have been amorphized during its Gyr-long
    journey, although we find this alternative less likely due to 3I's mass loss rate
    and distinct 10 micron feature as opposed to observed Solar System comets.
