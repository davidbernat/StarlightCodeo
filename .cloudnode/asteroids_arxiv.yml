  summary: One of the main bottleneck in assessing the accuracy of Mars orbit is the
    unknown value of the asteroids in the Main Asteroid Belt. Nowadays a modeling
    with 343 asteroids as point masses is used, with the relative masses fitted to
    observational data. In the current work we propose an innovative methodology to
    reduce the number of asteroids implemented as point masses, thus reducing the
    number of parameters to be fitted, without a significant degradation of the postfit
    residuals.
