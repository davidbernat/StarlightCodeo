  title: The Volatile Composition and Activity Evolution of Main-Belt Comet 358P/PANSTARRS
  authors:
  - name: Henry H. Hsieh
    affiliation: []
  - name: John W. Noonan
    affiliation: []
  - name: Michael S. P. Kelley
    affiliation: []
  - name: Dennis Bodewits
