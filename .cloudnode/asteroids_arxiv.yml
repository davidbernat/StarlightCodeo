- entry_id: http://arxiv.org/abs/2604.27496v1
  short_id: 2604.27496v1
  title: Primordial black hole dark matter from axion inflation
  authors:
  - name: Gabriele Franciolini
    affiliation: []
  - name: Nadir Ijaz
    affiliation: []
  - name: Marco Peloso
    affiliation: []
  summary: We revisit the production of primordial black holes (PBHs) by a U(1) gauge
    field with a pseudo-scalar coupling to the inflaton. We improve upon the existing
    literature by working in the homogeneous backreaction regime with numerically
    computed gauge mode functions, adopting state-of-the-art PBH abundance calculations,
    and incorporating the uncertainty in the statistics of $δρ$. We find that PBHs
    can account for all of the dark matter in the asteroidal mass range, even when
    the inflaton gradient energy density is highly subdominant ($10^{-4}$--$10^{-3}$
    of the kinetic energy), supporting the validity of the backreaction scheme. This
    mechanism also unavoidably generates a stochastic gravitational wave background
    with an amplitude that will be measured at LISA and that will allow to indirectly
    discriminate between different statistics of $δρ$.
