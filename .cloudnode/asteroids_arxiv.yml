  summary: Binary asteroids provide key access to fundamental parameters of Solar
    System remnants and planetary formations. However, the current knowledge of binary
    asteroids remains strongly biased by observational limitations, and main belt
    binary systems are still poorly characterised since current techniques preferentially
    detect either widely separated binaries close and bright systems. In this context,
    the high-precision astrometry of the Gaia mission has revealed a new population
    of candidate binaries exhibiting dynamical signatures consistent with unresolved
    companions. This work is part of the GaiaMoons program, and our aim with it was
    to characterise a sample of 357 potential binary asteroid targets and confirm
    or refute their binary nature. The properties of these candidates were derived
    from the high-precision photometric and astrometric observations provided by Gaia.
    We adopted stellar occultation as the observational method to study these targets.
    Between October 2023 and February 2026, we successfully carried out 165 observations
    for 101 targets. We subsequently analysed these events in the context of the available
    literature and previously reported observations. Thirty three observation led
    at least two positives for 24 objects that have undergone unprecedented occultation
    observation campaigns, with four objects showing indications of binary or contact
    binary features, namely 1127 Mimi, 35420 1998 AG6, 206 Hersilia, and 36882 2000
    SW155. For the vast majority of these objects, the resulting dataset from all
    reduced observations provides unique physical and astrometric constraints, as
    they had never been observed through stellar occultations before. GaiaMoons illustrates
    how stellar occultation campaigns associated with Gaia observations generate a
    self-improving cycle to find new binary, thereby probing size and shape to constrain
    future observations.
