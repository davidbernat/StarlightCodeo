  title: Ionic Liquid Biospheres
  authors:
  - name: Sara Seager
    affiliation: []
  - name: William Bains
    affiliation: []
  - name: Iaroslav Iakubivskyi
    affiliation: []
  - name: Rachana Agrawal
    affiliation: []
  - name: John Jenkins
    affiliation: []
  - name: Pranav Shinde
    affiliation: []
  - name: Janusz J. Petkowski
    affiliation: []
  summary: Liquid is a fundamental requirement for life as we understand it, but whether
    that liquid has to be water is not known. We propose the hypothesis that ionic
    liquids (ILs) and deep eutectic solvents (DES) constitute a class of non-aqueous
    planetary liquids capable of persisting on a wide range of bodies where stable
    liquid water cannot exist. This hypothesis is motivated by key physical properties
    of ILs and DES. Many exhibit vapor pressures orders of magnitude lower than that
    of water and remain liquid across exceptionally wide temperature ranges, from
    cryogenic to well above terrestrial temperatures. These properties permit stable
    liquids to exist where liquid water would rapidly evaporate or freeze and outside
    of bulk phases as persistent microscale reservoirs-such as thin films and pore-filling
    droplets. In other words, ILs and DES can persist in environments without requiring
    oceans, thick atmospheres, or narrowly regulated climate conditions. We further
    hypothesize that ILs and DES could act as solvents for non-Earth-like life. Our
    hypothesis ex-tends to the idea that ILs and DES could enable prebiotic chemistry
    by providing long-lived, protective liquid environments for complex organic molecules
    on bodies such as comets and asteroids, where liquid water is absent. Based on
    the occurrence of DES-like mixtures as protective intracellular liquids in desiccation-tolerant
    plants, we propose that ILs and DES might be solvents that life elsewhere purposefully
    evolves. We review protein and other biomolecule studies in ILs and DES and outline
    planetary environments in which ILs and DES might occur by discussing available
    anions and cations. We present strategies to advance the IL/DES solvent hypothesis
    using laboratory studies, computational chemistry, planetary missions, analysis
    of existing spectroscopic datasets, and modeling of liquid microniches and chemical
    survival on small bodies.
