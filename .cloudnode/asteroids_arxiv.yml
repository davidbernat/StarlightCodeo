  summary: Context. The origin of the petrologic diversity observed in ordinary chondrites
    (OCs), the most common meteorites on Earth, remains debated. Competing models
    invoke either depth-dependent sampling of a single thermally stratified ("onion-shell")
    parent body or contributions from multiple distinct parent bodies. Aims. We aim
    to determine which of the two models is preferred for LL chondrites. These are
    unique among OCs in exhibiting a bimodal petrologic distribution, with most meteorites
    being LL3 or LL6. Methods. We compare the spectral and mineralogical properties
    of LL chondrites and corresponding LL-chondrite-like near-Earth objects (NEOs)
    with their possible sources in the main asteroid belt. We also model the thermal
    histories of the proposed parent bodies, based on revised estimates of parent-body
    sizes. Results. The spectral and mineralogical diversity of LL chondrites is consistent
    with contributions from the bright, S-type component of the Nysa family (NysaS)
    and the Flora family, with NysaS supplying mainly low-petrologic-type material
    and Flora higher-grade material. Unequilibrated, LL3 chondrites appear to originate
    exclusively from NysaS. Similarly, LL-chondrite-like NEOs form two distinct subpopulations
    consistent with origins in these same families. Conclusions. Our results favour
    multiple parent bodies for LL chondrites. The petrologic differences between the
    NysaS and Flora parent bodies can be explained by differences in their sizes,
    without requiring different formation times.
