  title: Multi-epoch spectro-photometric characterization of the minimoon 2024 PT$_5$
    in the visible and near-infrared
  authors:
  - name: Jin Beniyama
    affiliation: []
  - name: Bryce T. Bolin
    affiliation: []
  - name: Alexey V. Sergeyev
    affiliation: []
  - name: Marco Delbo
