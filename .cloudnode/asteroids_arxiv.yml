- entry_id: http://arxiv.org/abs/2507.12747v1
  short_id: 2507.12747v1
  title: Physical properties of newly active asteroid 2010 LH15
  authors:
  - name: Bin Liu
    affiliation: []
  - name: Cunhui Li
    affiliation: []
  - name: Zhongcheng Mu
    affiliation: []
  - name: Xiaodong Liu
    affiliation: []
  summary: Main-belt asteroid 2010 LH$_{15}$ has been classified as an active asteroid,
    based on the recent discovery of dust activity from the archival images observed
    in 2010 and 2019. In this study, we perform measurements and dynamical modeling
    of the dust tail of the active asteroid 2010 LH$_{15}$ using ZTF archival data
    from July 26 to August 31, 2019, with the derived physical properties from these
    relatively independent methods being compatible. The photometric results show
    that the radius of the nucleus is $1.11\pm0.02$ km with assumed geometric albedo
    of $p_r = 0.05$, and the color index of the nucleus is relatively close to that
    of the ejecta around the nucleus, with a value of $H_g - H_r = 0.44\pm0.07$. The
    effective scattering cross-section increases at an average rate of $0.28\pm0.02$
    km$^2$ day$^{-1}$ throughout the observation period, indicating that the activity
    of LH$_{15}$ is likely driven by mechanisms capable of causing a sustained process
    like sublimation. Further dust dynamics modeling indicates that the dust activity
    initiates as early as about 26 June 2019, with the ejected dust particles having
    a radius ranging from 0.03 mm to 3 mm. The dependence of the terminal velocity
    on dust size is consistent with a sublimation-driven mechanism. If the orbit of
    LH$_{15}$ is stable, its sublimation origin will extend the inner boundary of
    the water-ice-bearing region in the main asteroid belt inward by approximately
    0.1 AU.
