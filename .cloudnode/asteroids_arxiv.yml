  title: Young asteroid pair candidates in the Jovian Trojan population
  authors:
  - name: Jindřich Žižka
    affiliation: []
  summary: The number of asteroid pairs, unbound asteroids with a common origin and
    similar heliocentric orbits, has increased rapidly since their discovery. However,
    to date, only a small number of asteroid pairs have been identified in the outer
    main belt and especially within the Hilda and Jupiter Trojan populations. Except
    for a few binaries and collisional families, only one 360 Myr-old pair (258656)
    2002 ES76 - (635224) 2013 CC41 is known among the Jupiter Trojans. During our
    survey, using GPU-accelerated integrations of the Jovian swarms, we identified
    two new promising pair candidates younger than 2.5 Myr. Pair (264119) Georgeorton
    - 2024 CN most likely formed either 427-500 kyr or 527-536 kyr ago, whereas pair
    (8060) Anius - (542262) 2013 BL has an estimated age of 2367-2421 kyr. Our results
    show that young asteroid pairs can arise even within the sparse population of
    Jupiter Trojans, opening new questions about their formation.
