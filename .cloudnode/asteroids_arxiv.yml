- entry_id: http://arxiv.org/abs/2309.00435v1
  short_id: 2309.00435v1
  title: Initial Trajectory Assessment of the RAMSES Mission to (99942) Apophis
  authors:
  - name: Andrea C. Morelli
    affiliation: []
  - name: Alessandra Mannocchi
    affiliation: []
  - name: Carmine Giordano
    affiliation: []
  - name: Fabio Ferrari
    affiliation: []
  - name: Francesco Topputo
    affiliation: []
  summary: (99942) Apophis is a potentially hazardous asteroid that will closely approach
    the Earth on April 13, 2029. Although the likelihood of an impact has been ruled
    out, this close encounter represents a unique opportunity for planetary science
    and defense. By investigating the physical and dynamical changes induced by this
    interaction, valuable insights into asteroid cohesion, strength, and internal
    structure can be obtained. In light of these circumstances, a fast mission to
    Apophis holds great scientific importance and potential for understanding potentially
    hazardous asteroids. To this aim, ESA proposed the mission RAMSES (Rapid Apophis
    Mission for SEcurity and Safety) to reach Apophis before its close encounter.
    In this context, the paper focuses on the reachability analysis of (99942) Apophis,
    examining thousands of trajectories departing from Earth and reaching the asteroid
    before the fly-by, using a low-thrust spacecraft. A two-layer approach combining
    direct sequential convex programming and an indirect method is employed for fast
    and reliable trajectory optimization. The results reveal multiple feasible launch
    windows and provide essential information for mission planning and system design.
