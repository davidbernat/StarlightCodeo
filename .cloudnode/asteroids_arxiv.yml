- entry_id: http://arxiv.org/abs/2602.19466v2
  short_id: 2602.19466v2
  title: Surface Properties, Orbital Dynamics, and Thermophysical Modeling of the
    Primitive Asteroid (269) Justitia
  authors:
  - name: Leonardo Braga
    affiliation: []
  - name: Andre Amarante
    affiliation: []
  - name: Alessandra Ferreira
    affiliation: []
  - name: Filipe Monteiro
    affiliation: []
  - name: Maria Martins
    affiliation: []
  summary: The Emirates Mission to the Asteroid Belt (EMA) will study the ultra-red
    asteroid (269)~Justitia. In this work, we present the first detailed investigation
    of Justitia's surface dynamics using the newly developed 3-D polyhedral shape
    model with 574 vertices and 1,144 faces. We analyze its geopotential, surface
    acceleration, escape speeds, slopes, and equilibrium points, and we also search
    for planar symmetric periodic orbits using an equivalent ellipsoidal approximation.
    Our results indicate that the lowest geopotential values occur at the poles, which
    also correspond to regions of maximum surface acceleration. The global slope distribution
    suggests preferred zones of material accumulation or migration, offering clues
    to Justitia's long-term morphological evolution. Most slopes remain below $40^\circ$,
    implying that loose particles may settle stably across large portions of the surface.
    We identify five equilibrium points consistent with Justitia's estimated density
    and slow rotational period. Two external points (E$_2$ and E$_4$) exhibit linear
    stability, and all equilibrium locations lie relatively far from the surface due
    to the body's slow spin. Additionally, we discover 28 new families of planar symmetric
    periodic orbits, then classify their topologies and determine their linear stability,
    providing a dynamical framework relevant to future spacecraft operations near
    Justitia. Finally, thermal modeling reveals how thermal inertia and heliocentric
    distance shape Justitia's temperature distribution. The south pole receives more
    insolation than the north pole, reaching minimum temperatures of about 102~K and
    87~K, respectively. These combined dynamical and thermal results offer valuable
    insights for the EMA mission and for understanding slowly rotating small bodies.
