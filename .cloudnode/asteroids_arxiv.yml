  summary: Type IIb supernovae (SNe IIb) often exhibit an early light curve excess
    (EE) preceding the main peak powered by radioactive nickel decay. The physical
    origin of this early emission remains an open question. Among the proposed scenarios,
    shock cooling emission-resulting from the interaction between the shockwave and
    extended envelopes-is considered the most plausible mechanism. The frequency of
    these events remains unconstrained. This study aims to quantify the frequency
    of EE in SNe IIb and investigate its physical origin by analyzing optical light
    curves from the Asteroid Terrestrial-impact Last Alert System (ATLAS) survey.
    We selected 74 SNe IIb from 153 spectroscopically classified events in the Transient
    Name Server (TNS) database, observed by ATLAS, with peak fluxes exceeding 150
    μJy and explosion epoch uncertainties lower than six days. Using light curve model
    fitting and outlier analysis, we identified SNe IIb exhibiting EE and analyzed
    their photometric properties. We found 21 SNe IIb with EE, corresponding to a
    frequency of approximately 28-40%, with the higher value obtained under the most
    stringent data cuts. The EE's duration and color evolution are consistent with
    shock cooling in extended hydrogen-rich envelopes. We also found that EE SNe IIb
    have longer rise times and faster post-peak decline rates than non-EE SNe IIb,
    while both groups share similar peak absolute magnitudes. Our findings suggest
    that EE and non-EE SNe IIb likely share similar initial progenitor masses but
    differ in ejecta mass properties, potentially due to varying degrees of binary
    interaction. This study provides constraints on the evolutionary pathways of SNe
    IIb progenitors as compact stars with and without extended hydrogen envelopes.
