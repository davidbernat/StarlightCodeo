- entry_id: http://arxiv.org/abs/2510.07588v1
  short_id: 2510.07588v1
  title: An automated probabilistic asteroid prediscovery pipeline
  authors:
  - name: Sage Li
    affiliation: []
  - name: Alex Geringer-Sameth
    affiliation: []
  - name: Nathan Golovich
    affiliation: []
  summary: We present an automated and probabilistic method to make prediscovery detections
    of near-Earth asteroids (NEAs) in archival survey images, with the goal of reducing
    orbital uncertainty immediately after discovery. We refit Minor Planet Center
    astrometry and propagate the full six-parameter covariance to survey epochs to
    define search regions. We build low-threshold source catalogs for viable images
    and evaluate every detected source in a search region as a candidate prediscovery.
    We eliminate false positives by refitting a new orbit to each candidate and probabilistically
    linking detections across images using a likelihood ratio. Applied to Zwicky Transient
    Facility (ZTF) imaging, we identify approximately 3000 recently discovered NEAs
    with prediscovery potential, including a doubling of the observational arc for
    about 500. We use archival ZTF imaging to make prediscovery detections of the
    potentially hazardous asteroid 2021 DG1, extending its arc by 2.5 years and reducing
    future apparition sky-plane uncertainty from many degrees to arcseconds. We also
    recover 2025 FU24 nearly 7 years before its first known observation, when its
    sky-plane uncertainty covers hundreds of square degrees across thousands of ZTF
    images. The method is survey-agnostic and scalable, enabling rapid orbit refinement
    for new discoveries from Rubin, NEO Surveyor, and NEOMIR.
