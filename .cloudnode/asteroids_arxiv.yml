- entry_id: http://arxiv.org/abs/2510.05843v1
  short_id: 2510.05843v1
  title: Physical Characterization of Asteroid (16583) Oersted Combining Stellar Occultation
    and Photometric Data
  authors:
  - name: Josef Hanuš
    affiliation: []
  - name: Marco Delbo
    affiliation: []
  - name: Petr Pokorný
    affiliation: []
  - name: Franck Marchis
    affiliation: []
  - name: Thomas M. Esposito
    affiliation: []
  summary: We report a successful observation of a stellar occultation by asteroid
    (16583) Oersted, enabling a detailed physical characterization of its shape, spin
    state, and surface properties. Our goal is to determine the physical parameters
    of Oersted by combining multi-chord occultation timing, sparse optical photometry,
    and thermal infrared observations. Such asteroids (size$\sim$20 km) are rarely
    modeled in this detail due to observational limitations, making Oersted a valuable
    case study. We applied convex lightcurve inversion to sparse photometric data
    to derive an initial shape and spin state. This model was then refined and scaled
    using non-convex shape modeling with the ADAM algorithm, incorporating constraints
    from the occultation chord profile. Thermophysical modeling based on WISE thermal
    infrared fluxes was used to determine the asteroid's effective diameter, geometric
    albedo, and thermal inertia. The non-convex shape model reveals localized surface
    concavities and provides a size estimate consistent with radiometric measurements.
    The derived thermal inertia is typical for asteroids of comparable size. This
    work demonstrates the effectiveness of combining stellar occultations, photometry,
    and thermal infrared data for asteroid modeling and highlights the valuable contributions
    of citizen scientists, who played a key role in capturing the occultation and
    constraining the asteroid's profile.
