- entry_id: http://arxiv.org/abs/2410.19518v1
  short_id: 2410.19518v1
  title: 'Nutation-orbit resonances: The origin of the chaotic rotation of Hyperion
    and the barrel instability'
  authors:
  - name: Max Goldberg
    affiliation: []
  - name: Konstantin Batygin
    affiliation: []
  summary: While numerous planetary and asteroid satellites show evidence for non-trivial
    rotation states, none are as emblematic as Hyperion, which has long been held
    as the most striking example of chaotic spin-orbit evolution in the Solar System.
    Nevertheless, an analytically tractable theory of the full 3D spin-orbit dynamics
    of Hyperion has not been developed. We derive the Hamiltonian for a spinning axisymmetric
    satellite in the gravitational potential of a planet without assuming planar or
    principal axis rotation and without averaging over the spin period. Using this
    model, we demonstrate the emergence of resonances between the nutation and orbital
    frequencies that act as the primary drivers of the spin dynamics. This analysis
    reveals that, contrary to long-held belief, Hyperion is not tumbling chaotically.
    Instead, it lies near or in a nutation-orbit resonance that is first-order in
    eccentricity, allowing it to rotate quasi-regularly. The most reliable observations
    are consistent with either nonchaotic motion or chaos that is orders of magnitude
    smaller than originally claimed. A separate phenomenon, the so-called barrel instability,
    is shown to be related to a different set of nutation-orbit resonances that generalize
    the planar spin-orbit resonances. Finally, we show that changes in spin states
    over long timescales are best understood by considering chaotic diffusion of quasi-conserved
    quantities.
