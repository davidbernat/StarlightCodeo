    affiliation: []
  - name: E. Segre
    affiliation: []
  - name: A. Blumenzweig
    affiliation: []
  - name: Y. Sofer-Rimalt
    affiliation: []
  - name: O. Yaron
    affiliation: []
  - name: A. Gal-Yam
    affiliation: []
  - name: Y. Shvartzvald
    affiliation: []
  - name: M. Engel
    affiliation: []
  - name: S. B. Cenko
    affiliation: []
  - name: O. Hershko
    affiliation: []
  summary: 'The impact of the Double Asteroid Redirection Test (DART) spacecraft with
    Dimorphos allows us to study asteroid collision physics, including momentum transfer,
    the ejecta properties, and the visibility of such events in the Solar System.
    We report observations of the DART impact in the ultraviolet (UV), visible light,
    and near-infrared (IR) wavelengths. The observations support the existence of
    at least two separate components of the ejecta: a fast and a slow component. The
    fast-ejecta component is composed of a gaseous phase, moving at about 1.6 km/s
    with a mass of <10^4 kg. The fast ejecta is detected in the UV and visible light,
    but not in the near-IR $z$-band observations. Fitting a simplified optical thickness
    model to these observations allows us to constrain some of the properties of the
    fast ejecta, including its scattering efficiency and the opacity of the gas. The
    slow ejecta component is moving at typical velocities of up to about 10 m/s. It
    is composed of micrometer-size particles, that have a scattering efficiency, at
    the direction of the observer, of the order of 10^-3 and a total mass of about
    10^6 kg. The larger particles in the slow ejecta, whose size is bound to be in
    the range between ~1 mm to ~1 m, likely have a scattering efficiency larger than
    that of the pre-impact Didymos system.'
