- entry_id: http://arxiv.org/abs/2505.03325v1
  short_id: 2505.03325v1
  title: Satellite formation around the largest asteroids
  authors:
  - name: Kevin J. Walsh
    affiliation: []
  - name: Ronald-Louis Ballouz
    affiliation: []
  - name: Harrison F. Agrusa
    affiliation: []
  - name: Josef Hanus
    affiliation: []
  - name: Martin Jutzi
    affiliation: []
  - name: Patrick Michel
    affiliation: []
  summary: Satellites around large asteroids are preferentially found among those
    with the most rapid rotation and elongated shape. The taxonomic statistics are
    similarly skewed; in total, 13 asteroids larger than 100 km are known to have
    satellites, but none have been discovered among S-type asteroids. Previous modeling
    suggests that satellites could be generated by impacts, but spin and shape have
    never been tracked in models to relate collisional circumstances with those two
    observed properties concerning the primary. Here we show, by combining simulations
    of impacts into porous low-density asteroids, their subsequent disruption, reaccumulation
    and long-term satellite stability, a direct pathway for the formation of satellites.
    The immediate distortion and elongation of a rotating target body provides a launching
    point for some debris distinct from simple ballistic ejecta trajectories. The
    debris that are found to originate from the distorted long-axis is sourced primarily
    from 10-20 km below the surface and can be placed directly onto eccentric orbits
    with sufficiently large pericenter distances that avoid rapid re-impact. The specific
    energy and resultant total mass loss in satellite-forming collisions are not constraining,
    which explains the observed lack of correlation between asteroids with satellites
    and those that are part of large asteroid families.
