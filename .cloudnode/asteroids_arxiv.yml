  title: qCMOS detectors and the case of hypothetical primordial black holes in the
    solar system, near earth objects, transients, and other high cadence observations
  authors:
  - name: Martin M. Roth
    affiliation: []
  summary: Recent progress with CMOS detector development has opened new parameter
    space for high cadence time resolved imaging of transients and fast proper motion
    solar system objects. Using computer simulations for a ground-based 1.23 m telescope,
    this research note illustrates the gain of a new generation of fast readout low
    noise qCMOS sensors over CCDs and makes the case for high precision monitoring
    of asteroid orbits that can potentially shed light on the hypothetical existence
    of low mass primordial black holes, as well as for other applications requiring
    high speed imaging.
