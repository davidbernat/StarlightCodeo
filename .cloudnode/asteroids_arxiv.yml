  title: White dwarf planetary systems in the ultraviolet
  authors:
  - name: Jamie Williams
    affiliation: []
  - name: Amy Bonsor
    affiliation: []
  - name: Boris Gänsicke
    affiliation: []
  - name: Joseph Guidry
    affiliation: []
  - name: JJ Hermes
    affiliation: []
  - name: Lou Baya Ould Rouis
    affiliation: []
  - name: Laura Rogers
    affiliation: []
  - name: Pier-Emmanuel Tremblay
    affiliation: []
  - name: Snehalata Sahu
    affiliation: []
  - name: Andrew Swan
    affiliation: []
  - name: David Wilson
    affiliation: []
  - name: Siyi Xu
    affiliation: []
  summary: Almost every known planet host will evolve into a white dwarf, and the
    surviving planetary material will continue to orbit this stellar remnant. Asteroids
    perturbed onto star-grazing orbits will become disrupted, forming an accretion
    disk which causes "enrichment" of the otherwise pure hydrogen or helium atmosphere.
    Measurements of these photospheric abundances give detailed insights into the
    interior compositions of exo-planetesimals with an accuracy not possible for intact
    exoplanets around main sequence stars. This method has revealed the diversity
    of rocky material in our solar neighborhood, including primitive, chondritic planetesimals,
    fragments of planetary cores, and even analogues of Kuiper belt objects. The planetesimal
    abundances can be used as an input to interior structure models. The far-ultraviolet
    is a key wavelength range for this field because it contains strong transitions
    for almost every element of interest, many of which are undetectable using ground-based
    optical spectroscopy. Without the FUV, we will no longer have access to the C,
    N, P, S content of exoplanetary bodies and thus will no longer be able to probe
    how volatiles interact with refractories, which is crucial to understanding planet
    formation-and even the origin of life. The medium resolution and high sensitivity
    of COS on HST has been indispensable in determining the compositions of dozens
    of exo-planetesimals. However, the only two medium resolution FUV-capable spectrographs
    are currently onboard HST, with no plans for replacements until the 2040s. An
    extension to the HST mission is critical for the field of white dwarf planetary
    systems, because the loss of FUV capability would leave us blind to volatiles.
    Boosting the orbit of HST would allow us to measure volatile abundances, determine
    the rocky planetary occurrence rate, investigate differentiation, and probe for
    photospheric abundance variability.
