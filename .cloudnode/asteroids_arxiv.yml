  title: Polarimetry and albedo of the Near-Earth Asteroid 2025 FA22
  authors:
  - name: J. -P. Rivet
    affiliation: []
  - name: S. Bagnulo
    affiliation: []
  - name: P. Bendjoya
    affiliation: []
  - name: G. Borisov
    affiliation: []
  - name: A. Cellino
