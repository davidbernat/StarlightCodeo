  summary: The NSF/DOE Vera C. Rubin Observatory is a discovery machine, with unprecedented
    survey speed, which can be used to identify exotic astrophysical transients. In
    its prime mission, the ten year Legacy Survey of Space and Time will use 3% of
    its total time for Target of Opportunity observations, which includes response
    to gravitational wave events, high energy neutrinos, potentially-hazardous asteroids,
    and other astrophysical phenomena. Target of Opportunity observations exist outside
    of the usual LSST operational mode, requiring special attention to maximize performance.
    We review the Rubin Target of Opportunity system during its first year of Rubin
    Observatory operations, the Targets of Opportunity pursued since LSST first light,
    and the overall efficiency of the system.
