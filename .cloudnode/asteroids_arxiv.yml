  title: 'Sputter Yields of the Lunar Surface: Experimental Validation and Numerical
    Modelling of Solar Wind Sputtering of Apollo 16 Soils'
  authors:
  - name: Johannes Brötzner
    affiliation: []
  - name: Herbert Biber
    affiliation: []
  - name: Paul Stefan Szabo
