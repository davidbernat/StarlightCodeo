  title: 'PyLMT: A transient detection pipeline for the 4-m International Liquid Mirror
    Telescope'
  authors:
  - name: Kumar Pranshu
    affiliation: []
  - name: Kuntal Misra
    affiliation: []
  - name: Bhavya Ailawadhi
    affiliation: []
  - name: Monalisa Dubey
    affiliation: []
