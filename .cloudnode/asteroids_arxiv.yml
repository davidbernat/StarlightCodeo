    affiliation: []
  - name: Hadrien A. R. Devillepoix
    affiliation: []
  - name: Eleanor K. Sansom
    affiliation: []
  - name: Martin C. Towner
    affiliation: []
  - name: Martin Cupák
    affiliation: []
  - name: Philip A. Bland
    affiliation: []
  - name: Lucy V. Forman
    affiliation: []
  - name: John H. Fairweather
    affiliation: []
  - name: Ashley F. Rogers
    affiliation: []
  - name: Nicholas E. Timms
    affiliation: []
  summary: 'Over the Nullarbor Plain in South Australia, the Desert Fireball Network
    detected a fireball on the night of 1 June 2019 (7:30 pm local time), and six
    weeks later recovered a single meteorite (42 g) named Arpu Kuilpu. This meteorite
    was then distributed to a consortium of collaborating institutions to be measured
    and analyzed by a number of methodologies including: SEM-EDS, EPMA, ICP-MS, gamma-ray
    spectrometry, ideal gas pycnometry, magnetic susceptibility measurement, μCT,
    optical microscopy, and accelerator and noble gas mass spectrometry techniques.
    These analyses revealed that Arpu Kuilpu is an unbrecciated H5 ordinary chondrite,
    with minimal weathering (W0-1) and minimal shock (S2). The olivine and pyroxene
    mineral compositions (in mol%) are Fa: 19.2 +- 0.2, and Fs: 16.8 +- 0.2, further
    supporting the H5 type and class. The measured oxygen isotopes are also consistent
    with an H chondrite (δ17O = 2.904 +- 0.177; δ18O = 4.163 +- 0.336; Δ17O = 0.740
    +- 0.002). Ideal gas pycnometry measured bulk and grain densities of 3.66 +- 0.02
    and 3.77 +- 0.02 g cm-3, respectively, yielding a porosity of 3.0 % +- 0.7. The
    magnetic susceptibility of this meteorite is log X = 5.16 +- 0.08. The most recent
    impact-related heating event experienced by Arpu Kuilpu was measured by 40Ar/39Ar
    chronology to be 4467 +- 16 Ma, while the cosmic ray exposure age is estimated
    to be between 6-8 Ma. The noble gas isotopes, radionuclides, and fireball observations
    all indicate that Arpu Kuilpu''s meteoroid was quite small (maximum radius of
    10 cm, though more likely between 1-5 cm). Although this meteorite is a rather
    ordinary ordinary chondrite, its prior orbit resembled that of a Jupiter Family
    Comet (JFC) further lending support to the assertion that many cm- to m-sized
    objects on JFC orbits are asteroidal rather than cometary in origin.'
