  - name: Maxime Devogèle
    affiliation: []
  - name: Simone Ieva
    affiliation: []
  - name: Antti Penttilä
    affiliation: []
  - name: Karri Muinonen
    affiliation: []
  summary: We present the first polarimetric observations of the third discovered
    interstellar object, 3I/ATLAS (C/2025 N1), obtained pre-perihelion with FORS2/VLT,
    ALFOSC/NOT, and FoReRo2/RCC, over a phase angle range of 7.7-22.4°. This marks
    the second ever polarimetric study of an interstellar object, the first distinguishing
    2I/Borisov from most Solar System comets by its higher positive polarisation.
    Our polarimetric measurements as a function of phase angle reveal that 3I is characterised
    by an deep and narrow negative polarisation branch, reaching a minimum value of
    -2.7% at phase angle 7°, and an inversion angle of 17° -- a combination unprecedented
    among asteroids and comets, including 2I/Borisov. At very small phase angles,
    the extrapolated slope of the polarisation phase curve is consistent with that
    of certain small trans-Neptunian objects and Centaur Pholus, consistent with independent
    spectroscopic evidence for a red, possibly water-ice-bearing object. Imaging confirms
    a diffuse coma present from our earliest observations, though no strong polarimetric
    features are spatial resolved. These findings may demonstrate that 3I represents
    a distinct type of comet, expanding the diversity of known interstellar bodies.
