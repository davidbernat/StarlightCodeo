  short_id: 2412.10140v1
  title: Ultra Low Velocity Ejecta Generated by Slow Impacts on Rubble Pile Asteroids
  authors:
  - name: Kolja Joeris
    affiliation: []
  - name: Laurent Schönau
    affiliation: []
  - name: Matthias Keulen
    affiliation: []
  - name: Jonathan E. Kollmer
    affiliation: []
  summary: We examine ejecta generated by ultra low velocity impacts under asteroid
    conditions. In an environment of precisely controlled milligravity and under vacuum,
    impacts with velocities in the range of centimeters/second are performed with
    irregularly shaped impactors onto granular beds. The resulting ejecta velocities
    are compared to existing literature values and extend the observed systematic
    trends towards lower impact energies, broadening the parameter range. Simulations
    are performed to reason the systematics and the absence thereof for measurements
    performed at earth gravity. We find, that the cutoff induced by gravity dependent
    minimal observable velocities plays a crucial role in the values obtained for
    mean ejecta velocities.
