- entry_id: http://arxiv.org/abs/2507.20193v1
  short_id: 2507.20193v1
  title: Efficient and Fault-Tolerant Memristive Neural Networks with In-Situ Training
  authors:
  - name: Santlal Prajapat
    affiliation: []
  - name: Manobendra Nath Mondal
    affiliation: []
  - name: Susmita Sur-Kolay
    affiliation: []
  summary: Neuromorphic architectures, which incorporate parallel and in-memory processing,
    are crucial for accelerating artificial neural network (ANN) computations. This
    work presents a novel memristor-based multi-layer neural network (memristive MLNN)
    architecture and an efficient in-situ training algorithm. The proposed design
    performs matrix-vector multiplications, outer products, and weight updates in
    constant time $\mathcal{O}(1)$, leveraging the inherent parallelism of memristive
    crossbars. Each synapse is realized using a single memristor, eliminating the
    need for transistors, and offering enhanced area and energy efficiency. The architecture
    is evaluated through LTspice simulations on the IRIS, NASA Asteroid, and Breast
    Cancer Wisconsin datasets, achieving classification accuracies of 98.22\%, 90.43\%,
    and 98.59\%, respectively. Robustness is assessed by introducing stuck-at-conducting-state
    faults in randomly selected memristors. The effects of nonlinearity in memristor
    conductance and a 10\% device variation are also analyzed. The simulation results
    establish that the network's performance is not affected significantly by faulty
    memristors, non-linearity, and device variation.
