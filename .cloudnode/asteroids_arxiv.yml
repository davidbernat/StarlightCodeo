  title: Hazardous Asteroids Classification
  authors:
  - name: Thai Duy Quy
    affiliation: []
  - name: Alvin Buana
    affiliation: []
  - name: Josh Lee
    affiliation: []
  - name: Rakha Asyrofi
    affiliation: []
  summary: Hazardous asteroid has been one of the concerns for humankind as fallen
    asteroid on earth could cost a huge impact on the society.Monitoring these objects
    could help predict future impact events, but such efforts are hindered by the
    large numbers of objects that pass in the Earth's vicinity. The aim of this project
    is to use machine learning and deep learning to accurately classify hazardous
    asteroids. A total of ten methods which consist of five machine learning algorithms
    and five deep learning models are trained and evaluated to find the suitable model
    that solves the issue. We experiment on two datasets, one from Kaggle and one
    we extracted from a web service called NeoWS which is a RESTful web service from
    NASA that provides information about near earth asteroids, it updates every day.
    In overall, the model is tested on two datasets with different features to find
    the most accurate model to perform the classification.
