  summary: The very wide binary asteroid (VWBA) population is a small subset of the
    population of known binary and multiple asteroids made of systems with very widely
    orbiting satellites and long orbital periods, on the order of tens to hundreds
    of days. The origin of these systems is debatable, and most members of this population
    are poorly characterized. We have compiled all available high-angular resolution
    imaging archival data of VWBA systems from large ground- and space-based telescopes.
    We measure the astrometric positions of the satellite relative to the primary
    and analyze the dynamics of the satellites using the Genoid genetic algorithm.
    Additionally, we use a NEATM thermal model to estimate the diameters of two systems,
    and we model the orbit of Litva's inner satellite using photometric lightcurve
    observations. We determine the effective diameters of binary systems Christophedumas
    and Alconrad to be 4.7 + 0.4km and 5.2 + 0.3km respectively. We determine new
    orbital solutions for five systems, Huenna, Litva, (3548) Eurybates, Pauling,
    and Alconrad. We find a significantly eccentric best-fit orbital solution for
    the outer satellite of Litva, a moderately eccentric solution for Alconrad, and
    a nearly circular solution for Pauling. We also confirm previously reported orbital
    solutions for (379) Huenna and Eurybates. It is unlikely that BYORP expansion
    could be solely responsible for the formation of VWBAs. It is possible that the
    satellites of these systems were formed through YORP spin-up and then later scattered
    onto very wide orbits. Additionally, we find that some members of the population
    are unlikely to have formed satellites through YORP spin-up, and a collisional
    formation history is favored. In particular, this applies to VWBAs within large
    dynamical families, or large VWBA systems such as Huenna and NASA's Lucy mission
    target Eurybates.
