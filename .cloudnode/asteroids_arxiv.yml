- entry_id: http://arxiv.org/abs/2407.01675v3
  short_id: 2407.01675v3
  title: 'Hawking Radiation of Nonrelativistic Scalars: Applications to Pion and Axion
    Production'
  authors:
  - name: Hao-Ran Cui
    affiliation: []
  - name: Yuhsin Tsai
    affiliation: []
  - name: Tao Xu
    affiliation: []
  summary: In studying secondary gamma-ray emissions from Primordial Black Holes (PBHs),
    the production of scalar particles like pions and axion-like particles (ALPs)
    via Hawking radiation is crucial. While previous analyses assumed relativistic
    production, asteroid-mass PBHs, relevant to upcoming experiments like AMEGO-X,
    likely produce pions and ALPs non-relativistically when their masses exceed 10
    MeV. To account for mass dependence in Hawking radiation, we revisit the greybody
    factors for massive scalars from Schwarzschild black holes, revealing significant
    mass corrections to particle production rates compared to the projected AMEGO-X
    sensitivity. We highlight the importance of considering non-relativistic $π^0$
    production in interpreting PBH gamma-ray signals, essential for determining PBH
    properties. Additionally, we comment on the potential suppression of pion production
    due to form factor effects when producing extended objects via Hawking radiation.
    We also provide an example code for calculating the Hawking radiation spectrum
    of massive scalar particles.
