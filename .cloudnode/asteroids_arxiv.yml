- entry_id: http://arxiv.org/abs/2412.01409v1
  short_id: 2412.01409v1
  title: An impact-free mechanism to deliver water to terrestrial planets and exoplanets
  authors:
  - name: Quentin Kral
    affiliation: []
  - name: Paul Huet
    affiliation: []
  - name: Camille Bergez-Casalou
    affiliation: []
  - name: Philippe Thébault
    affiliation: []
  - name: Sébastien Charnoz
    affiliation: []
  - name: Sonia Fornasier
    affiliation: []
  summary: 'To date, the most widespread scenario is that the Earth originated without
    water and was brought to the planet mainly due to impacts by wet asteroids coming
    from further out in space. However, many uncertainties remain regarding the exact
    processes that supply water to inner terrestrial planets. This article explores
    a new mechanism that would allow water to be efficiently transported to planets
    without impacts. We propose that primordial asteroids were icy and that when the
    ice sublimated, it formed a gaseous disk that could then reach planets and deliver
    water. We have developed a new model that follows the sublimation of asteroids
    and evolves the subsequent gas disk using a viscous diffusion code. We can then
    quantify the amount of water that can be accreted onto each planet in a self-consistent
    manner. We find that this new disk-delivery mechanism can explain the water content
    on Earth as well as on other planets. Our model shows most of the water being
    delivered between 20 and 30 Myr after the birth of the Sun. Our scenario implies
    the presence of a gaseous water disk with substantial mass for 100s Myr, which
    could be one of the key tracers of this mechanism. We show that such a watery
    disk could be detected in young exo-asteroid belts with ALMA. We propose that
    viscous water transport is inevitable and more generic than the impact scenario.
    We also suggest it is a universal process that may also occur in extrasolar systems.
    The conditions required for this scenario to unfold are indeed expected to be
    present in most planetary systems: an opaque proto-planetary disk that is initially
    cold enough for ice to form in the exo-asteroid belt region, followed by a natural
    outward-moving snow line that allows this initial ice to sublimate after the dissipation
    of the primordial disk, creating a viscous secondary gas disk and leading to the
    accretion of water onto the exoplanets.'
