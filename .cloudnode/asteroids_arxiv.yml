  title: Confined tumbling state as the origin of the excess of slowly rotating asteroids
  authors:
  - name: Wen-Han Zhou
    affiliation: []
  - name: Patrick Michel
    affiliation: []
  - name: Marco Delbo
    affiliation: []
  - name: Wenchao Wang
    affiliation: []
  - name: Bonny Y. Wang
    affiliation: []
  - name: Josef Ďurech
    affiliation: []
  - name: Josef Hanuš
    affiliation: []
  summary: The rotational distribution of asteroids as a function of their size is
    used {as a diagnostic of} their physical properties and evolution. Recent photometric
    surveys from the Gaia mission, allowing observation of asteroids with long spin
    periods (for example $\geq 24$h), found an excessive group of slow rotators and
    a gap separating them from faster rotators, which is unexplained by current theories.
    Here we developed an asteroid rotational evolution model capable of reproducing
    the observed distribution. {We suggest that this distribution is regulated by
    the competition between collisions and internal friction dampening of "tumblers"
    -asteroids with unstable rotation vectors, and that the slow rotator group is
    mainly populated by tumblers.} {We constrain the product of the rigidity and quality
    factor, which relates to the body's viscosity, to $μQ \sim 4 \times 10^9~$Pa.
    This number, two orders of magnitude smaller than the one assumed for monolithic
    boulders,} implies that {rubble pile} asteroids could have a porous structure
    or a thick regolith layer, and undergo stronger tidal effects.
