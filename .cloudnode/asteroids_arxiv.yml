  short_id: 2505.15968v1
  title: 'The invisible threat: assessing the collisional hazard posed by the undiscovered
    Venus co-orbital asteroids'
  authors:
  - name: V. Carruba
    affiliation: []
  - name: R. Sfair
    affiliation: []
  - name: R. A. Araujo
    affiliation: []
  - name: O. C. Winter
    affiliation: []
