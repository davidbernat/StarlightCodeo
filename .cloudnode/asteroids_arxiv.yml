- entry_id: http://arxiv.org/abs/2404.02956v2
  short_id: 2404.02956v2
  title: 'Multi-messenger Probes of Asteroid Mass Primordial Black Holes: Superradiance
    Spectroscopy, Hawking Radiation, and Microlensing'
  authors:
  - name: James B. Dent
    affiliation: []
  - name: Bhaskar Dutta
    affiliation: []
  - name: Tao Xu
    affiliation: []
  summary: Superradiance provides a unique opportunity for investigating dark sectors
    as well as primordial black holes, which themselves are candidates for dark matter
    over a wide mass range. Using axion-like particles as an example, we show that
    line signals emerging from a superradiated axion cloud combined with black hole
    Hawking radiation in extragalactic and galactic halos, along with microlensing
    observations lead to complementary constraints on parameter space combinations
    including the axion-photon coupling, axion mass, black hole mass, and its dark
    matter fraction, $f_{\rm PBH}$. For the asteroid mass range $\sim10^{16}-10^{22}~{\rm
    g}$, where primordial black holes can provide the totality of dark matter, we
    demonstrate that ongoing and upcoming observations such as SXI, JWST, and AMEGO-X
    will be sensitive to possible line and continuum signals, respectively, providing
    probes of previously inaccessible regions of $f_{\rm PBH}$ parameter space. Further
    complementarity from a stochastic gravitational-wave background emerging from
    the black hole formation mechanism is also considered.
