  title: Placing the Near-Earth Object Impact Probability in Context
  authors:
  - name: C. R. Nugent
    affiliation: []
  - name: K. P. Andersen
    affiliation: []
  - name: James M. Bauer
    affiliation: []
  - name: C. T. Jensen
    affiliation: []
  - name: L. K. Kristiansen
    affiliation: []
  - name: C. P. Hansen
    affiliation: []
  - name: M. M. Nielsen
    affiliation: []
  - name: C. F. Vestergård
    affiliation: []
  summary: Near-Earth objects (NEOs) have the potential to cause extensive damage
    and loss of life on Earth. Advancements in NEO discovery, trajectory prediction,
    and deflection technology indicate that an impact could be prevented, with sufficient
    warning time. We derive an impact frequency of NEOs 140m and larger, using the
    NEOMOD2 NEO population model and JPL Horizons. We then place that frequency in
    context with other preventable causes of death; allowing for comparison between
    a planet-wide event and individual events that cause fatalities such as car crashes
    and carbon monoxide poisoning. We find that the chance of a $>140$ m asteroid
    hitting the Earth is more likely than the chance of an individual being struck
    by lightning.
