  title: 'X-SHOOTER Spectrum of Comet 3I/ATLAS: Insights into a Distant Interstellar
    Visitor'
  authors:
  - name: A. Alvarez-Candal
    affiliation: []
  - name: J. L. Rizos
    affiliation: []
  - name: L. M. Lara
    affiliation: []
