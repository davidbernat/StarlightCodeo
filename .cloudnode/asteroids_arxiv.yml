- entry_id: http://arxiv.org/abs/2409.05299v1
  short_id: 2409.05299v1
  title: Stability analysis of spatial perturbed elliptic restricted 3-body problem
    with double-averaging
  authors:
  - name: Yan Luo
    affiliation: []
  - name: Kaicheng Sheng
    affiliation: []
  summary: This paper investigates the secular motion of a massless asteroid within
    the framework of the double-averaged elliptic restricted three-body problem. By
    employing Poincaré variables, we analyze the stability properties of asteroid
    orbits in the presence of planetary perturbations. Our study reveals that periodic
    orbits identified in the planar configuration maintain stability in the spatial
    perturbed problem across a wide range of parameter values. These findings, supported
    by numerical simulations, contribute to a deeper understanding of asteroid dynamics
    and have implications for studying exoplanetary systems with highly eccentric
    host stars.
