  summary: Trojan asteroids are found in the equilateral triangle Lagrange points
    of the Sun-Jupiter system in great number, though they also exist less prolifically
    in other parts of the Solar System. Despite up to planetary mass Trojans being
    predicted in extrasolar systems (i.e. exotrojans), they remain unconfirmed, although
    strong candidate evidence has emerged recently. For the first time, we extend
    the search for exotrojans to radio pulsars with low-mass ($\sim0.01\,\rm{M}_\odot$)
    companions using accurately measured pulse times of arrival. With techniques developed
    for detecting the reflex motion of a star due to a librating Trojan, we place
    $\sim 1\,\rm{M}_\oplus$ upper mass constraints on potential exotrojans around
    eight pulsars observed in the NANOGrav 15-year data set. We find weak evidence
    consistent with $\sim2$--4$\,\rm{M}_{\rm J}$ exotrojans in the PSR~J0023+0923
    and PSR~J1705$-$1903 binary systems, though the signals likely have a different,
    unknown source. We also place a libration-independent upper mass constraint of
    $\sim8$\,M$_{\rm J}$ on exotrojans in the PSR~J1641+8049 system by looking for
    an inconsistency between the times of superior conjunction as measured by optical
    light curves and those predicted by radio timing. These results offer initial
    observational constraints on the existence of exotrojans around pulsars, while
    their possible formation mechanisms remain unexplored.
