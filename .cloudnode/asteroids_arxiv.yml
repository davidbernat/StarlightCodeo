- entry_id: http://arxiv.org/abs/2602.20063v1
  short_id: 2602.20063v1
  title: Spherical Hermite Maps
  authors:
  - name: Mohamed Abouagour
    affiliation: []
  - name: Eleftherios Garyfallidis
    affiliation: []
  summary: 'Spherical functions appear throughout computer graphics, from spherical
    harmonic lighting and precomputed radiance transfer to neural radiance fields
    and procedural planet rendering. Efficient evaluation is critical for real-time
    applications, yet existing approaches face a quality-performance trade-off: bilinear
    LUT sampling is fast but produces faceting, while bicubic filtering requires 16
    texture samples. Most implementations use finite differences for normals, requiring
    extra samples and introducing noise. This paper presents Spherical Hermite Maps,
    a derivative-augmented LUT representation that resolves this trade-off. By storing
    function values alongside scaled partial derivatives at each texel of a padded
    cubemap, bicubic-Hermite reconstruction is enabled from only four texture samples
    (a 2x2 footprint) while providing continuous gradients from the same samples.
    The key insight is that Hermite interpolation reconstructs smooth derivatives
    as a byproduct of value reconstruction, making surface normals effectively free.
    In controlled experiments, Spherical Hermite Maps improve PSNR by 8-41 dB over
    bilinear interpolation and match 16-tap bicubic quality at one-quarter the cost.
    Analytic normals reduce mean angular error by 9-13% on complex surfaces while
    yielding stable specular highlights. Three applications demonstrate versatility:
    spherical harmonic glyph visualization, radial depth-map impostors for mesh level-of-detail,
    and procedural planet/asteroid rendering with spherical heightfields.'
