- entry_id: http://arxiv.org/abs/2311.03479v1
  short_id: 2311.03479v1
  title: ASTERIA -- Asteroid Thermal Inertia Analyzer
  authors:
  - name: Bojan Novaković
    affiliation: []
  - name: Marco Fenucci
    affiliation: []
  - name: Dušan Marčeta
    affiliation: []
  - name: Debora Pavela
    affiliation: []
  summary: "Thermal inertia estimates are available for a limited number of a few\
    \ hundred objects, and the results are practically solely based on thermophysical\
    \ modeling (TPM). We present a novel thermal inertia estimation method, Asteroid\
    \ Thermal Inertia Analyzer (ASTERIA). The core of the ASTERIA model is the Monte\
    \ Carlo approach, based on the Yarkovsky drift detection. We validate our model\
    \ on asteroid Bennu plus ten well-characterized near-Earth asteroids (NEAs) for\
    \ which a good estimation of the thermal inertia from the TPM exists. The tests\
    \ show that the ASTERIA provides reliable results consistent with the literature\
    \ values.\n  The new method is independent from the TPM, allowing an independent\
    \ verification of the results. As the Yarkovsky effect is more pronounced in small\
    \ asteroids, the noteworthy advantage of the ASTERIA compared to the TPM is the\
    \ ability to work with smaller asteroids for which TPM typically lacks the input\
    \ data. We used the ASTERIA to estimate the thermal inertia of 38 NEAs, with 31\
    \ of them being sub-km asteroids. Twenty-nine objects in our sample are characterized\
    \ as Potentially Hazardous Asteroids.\n  On the limitation side, the ASTERIA is\
    \ somewhat less accurate than the TPM. The applicability of our model is limited\
    \ to NEAs, as the Yarkovsky effect is yet to be detected in main-belt asteroids.\
    \ However, we can expect a significant increase in high-quality measurements of\
    \ the input parameters relevant to the ASTERIA with upcoming surveys. This will\
    \ surely increase the reliability of the results generated by the ASTERIA and\
    \ widen the model's applicability."
