- entry_id: http://arxiv.org/abs/2605.01190v1
  short_id: 2605.01190v1
  title: Statistically Significant Linear Alignments Among High-Confidence Transient
    Candidates on POSS-I Photographic Plates
  authors:
  - name: Brian Doherty
    affiliation: []
  summary: I report the detection of statistically significant linear alignments and
    anomalous spatial clustering among high-confidence transient candidates in the
    VASCO catalog of vanishing sources on Palomar Observatory Sky Survey (POSS-I)
    photographic plates (1949-1957). A machine learning classifier scores 107,875
    candidates by their likelihood of being genuine transients. Searching the 36,215
    candidates with probability >= 0.50 for collinear groupings narrower than 3 arcsec,
    I find 7 plates with alignments of 5-8 sources that exceed Monte Carlo expectations
    (p < 0.03, 10,000 iterations). The aligned sources are point-like, not streaks,
    which rules out any continuously luminous object crossing the field during the
    45-minute exposures. The implied angular rates (1-15 arcsec/s) overlap with the
    geosynchronous regime but are inconsistent with low or medium Earth orbits, and
    no artificial satellites existed during the POSS-I era. When I project each alignment
    onto Earth's surface assuming a high-altitude object, 6 of 7 maintain constant
    geographic longitude with sub-degree spread (combined p ~ 3e-10). Four of these
    cluster near -96 deg longitude (central United States); one falls within 0.3 deg
    of the longitude of the Hanford nuclear production site on a nuclear test window
    date. Close pairs (< 30 arcsec) occur at 16.2x the random rate, and the nights
    with alignments are the same nights with excess close pairs (Fisher exact p <
    0.0001). Plate artifacts cluster near the ecliptic plane (26%), but high-confidence
    transients are depleted there (16%; chi-square test p = 3.3e-82), which rules
    out asteroids, comets, and zodiacal debris as the dominant source. No transient
    reappears at the same sky position on a different night. All of these transients
    predate Sputnik 1.
