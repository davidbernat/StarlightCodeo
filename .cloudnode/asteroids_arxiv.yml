  title: The science from asteroid sample return missions
  authors:
  - name: Elizabeth J. Tasker
    affiliation: []
  - name: Harold C. Connolly
    affiliation: []
  - name: Shogo Tachibana
    affiliation: []
  summary: To date, three samples from near-Earth asteroids have been delivered to
    Earth by Japan's Hayabusa (2010) and Hayabusa2 (2020) missions, and the United
    States OSIRIS-REx mission (2023). Free from terrestrial contamination, these pristine
    materials provide new opportunities to investigate planetary formation processes,
    the delivery of organics and water to the early Earth, and the nature of potentially
    hazardous asteroids. As analysis of the asteroid samples proceeds in laboratories
    around the world, we visit each of the missions, review the initial scientific
    findings, and explore the value of sample return in understanding our origins
    and protecting our future.
