- entry_id: http://arxiv.org/abs/2311.10323v1
  short_id: 2311.10323v1
  title: 'Solar-Energetic-Particle Track-Production Rates at 1 au: Comparing In-situ
    Particle Fluxes with Lunar Sample-Derived Track Densities'
  authors:
  - name: A. R. Poppe
    affiliation: []
  - name: P. S. Szabo
    affiliation: []
  - name: E. R. Imata
    affiliation: []
  - name: L. P. Keller
    affiliation: []
  - name: R. Christoffersen
    affiliation: []
  summary: Heavy (Z>26) solar energetic particles (SEPs) with energies ~1 MeV/nucleon
    are known to leave visible damage tracks in meteoritic materials. The density
    of such solar flare tracks in lunar and asteroidal samples has been used as a
    measure of a sample's exposure time to space, yielding critical information on
    planetary space weathering rates, the dynamics and lifetimes of interplanetary
    dust grains, and the long-term history of solar particle fluxes. Knowledge of
    the SEP track accumulation rate in planetary materials at 1 au is critical for
    properly interpreting observed track densities. Here, we use in-situ particle
    observations of the 0.50-3.0 MeV/nuc Fe-group SEP flux taken by NASA's Advanced
    Composition Explorer (ACE) to calculate a flux of track-inducing particles at
    1 au of 6.0x10^5 /cm2/yr/str. Using the observed energy spectrum of Fe-group SEPs,
    we find that the depth distribution of SEP-induced damage tracks inferred from
    ACE measurements matches closely to that recently measured in lunar sample 64455;
    however, the magnitude of the ACE-inferred rate is approximately 25x higher than
    that observed in the lunar sample. We discuss several hypotheses for the nature
    of this discrepancy, including inefficiencies in track formation, thermal annealing
    of lunar samples, erosion via space weathering processing, and variations in the
    SEP flux at the Moon, yet find no satisfactory explanation. We encourage further
    research on both the nature of SEP track formation in meteoritic materials and
    the flux of Fe-group SEPs at the lunar surface in recent and geologic times to
    resolve this discrepancy.
