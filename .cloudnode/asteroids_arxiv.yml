  title: Constraints on primordial black holes in dSphs using radio observations
  authors:
  - name: Tian-Ci Liu
    affiliation: []
  - name: Xiao-Song Hu
    affiliation: []
  - name: Yun-Feng Liang
    affiliation: []
  - name: Ben-Yang Zhu
    affiliation: []
  - name: Xing-Fu Zhang
    affiliation: []
  - name: En-Wei Liang
    affiliation: []
  summary: Primordial black holes (PBHs) are hypothetical objects formed at the early
    epoch of the universe, which could be a type of dark matter (DM) candidate without
    the need for new particles. The abundance of PBH DM has been constrained strictly
    by many observations.In this work, with the radio observations of Fornax and Segue
    I, we constrain the abundance of PBH in dwarf spheroidal galaxies through the
    synchrotron self-Compton (SSC) effect of Hawking radiation electrons. By selecting
    optimal sources, we obtain the constraints on the fraction of PBH DM down to $\sim10^{-3}$
    for Segue I and $\sim10^{-5}$ for Fornax at asteroidal mass. We also predict that,
    with 100 hours of future observation by the Square Kilometer Array, the SSC approach
    could place constraints comparable to the current strictest results for PBHs of
    $<5\times10^{15}\,{\rm g}$. Better projected constraints can be obtained by including
    the inverse Compton scattering on cosmic microwave background photons.
