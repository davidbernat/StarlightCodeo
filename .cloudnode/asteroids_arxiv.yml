  summary: On September 26, 2022, NASA's Double Asteroid Redirection Test (DART) mission
    successfully impacted Dimorphos, the natural satellite of the binary near-Earth
    asteroid (65803) Didymos. Numerical simulations of the impact provide a means
    to explore target surface material properties and structures, consistent with
    the observed momentum deflection efficiency, ejecta cone geometry, and ejected
    mass. Our simulation, which best matches observations, indicates that Dimorphos
    is weak, with a cohesive strength of less than a few pascals (Pa), similar to
    asteroids (162173) Ryugu and (101955) Bennu. We find that a bulk density of Dimorphos,
    rhoB, lower than 2400 kg/m3, and a low volume fraction of boulders (<40 vol%)
    on the surface and in the shallow subsurface, are consistent with measured data
    from the DART experiment. These findings suggest Dimorphos is a rubble pile that
    might have formed through rotational mass shedding and re-accumulation from Didymos.
    Our simulations indicate that the DART impact caused global deformation and resurfacing
    of Dimorphos. ESA's upcoming Hera mission may find a re-shaped asteroid, rather
    than a well-defined crater.
