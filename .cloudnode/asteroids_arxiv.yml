  short_id: 2409.05753v1
  title: Visual-band brightnesses of Near Earth Objects that will be discovered in
    the infrared by NEO Surveyor
  authors:
  - name: Joseph R. Masiero
    affiliation: []
  - name: Tyler Linder
    affiliation: []
  - name: Amy Mainzer
    affiliation: []
  - name: Dar W. Dahlen
    affiliation: []
  - name: Yuna G. Kwon
    affiliation: []
  summary: NEO Surveyor will detect asteroids and comets using mid-infrared thermal
    emission, however ground-based followup resources will require knowledge of the
    expected visible light brightness in order to plan characterization observations.
    Here we describe the range of visual-to-infrared colors that the NEOs detected
    by Surveyor will span, and demonstrate that for objects that have no previously
    reported Visual band observations, estimates of the Johnson Visual-band brightness
    based on infrared flux alone will have significant uncertainty. Incidental or
    targeted photometric followup of objects discovered by Surveyor enables predictions
    of the fraction of reflected light visible and near-infrared wavelengths, supporting
    additional detailed characterization.
