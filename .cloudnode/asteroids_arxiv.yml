- entry_id: http://arxiv.org/abs/2601.05935v2
  short_id: 2601.05935v2
  title: Gravitational Ionization by Schwarzschild Primordial Black Holes
  authors:
  - name: Alexandra P. Klipfel
    affiliation: []
  - name: David I. Kaiser
    affiliation: []
  summary: Primordial black holes (PBHs) are theorized to form from the collapse of
    overdensities in the very early Universe. PBHs in the asteroid-mass range $10^{17}
    \, {\rm g}\lesssim M \lesssim 10^{23} \, {\rm g}$ could serve as all or most of
    the dark matter today, but are particularly difficult to detect due to their modest
    rates of Hawking emission and sub-micron Schwarzschild radii. We consider whether
    the steep gradients of a PBH's gravitational field could generate tidal forces
    strong enough to disrupt atoms and nuclei. Such phenomena may yield new observables
    that could uniquely distinguish a PBH from a macroscopic object of the same mass.
    We first consider the gravitational ionization of ambient neutral hydrogen and
    evaluate prospects for detecting photon radiation from the recombination of ionized
    atoms. During the present epoch, this effect would be swamped by Hawking radiation
    -- which would itself be difficult to detect for PBHs at the upper end of the
    asteroid-mass window. We then consider the gravitational ionization and heating
    of neutral hydrogen immediately following recombination at $z\simeq1090$, and
    identify a broad class of PBH distributions with typical mass $5\times10^{21}\,{\rm
    g}\lesssim M \lesssim 10^{23}\, {\rm g}$ within which gravitational interactions
    would have been the dominant form of energy deposition to the medium. We also
    identify conditions under which tidal forces from a transiting PBH could overcome
    the strong nuclear force, either by dissociating deuterons, which would be relevant
    during big bang nucleosynthesis (BBN), or by inducing fission of heavy nuclei.
    We find that gravitational dissociation of deuterons dominates photodissociation
    rates due to Hawking radiation for PBHs with masses $10^{14}\,{\rm g}\lesssim
    M \lesssim 10^{16}\,{\rm g}$. We additionally identify the phenomenon of gravitationally
    induced fission of heavy nuclei via tidal deformation.
