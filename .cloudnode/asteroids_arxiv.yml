  title: Development of Radar and Optical Tracking of Near-Earth Asteroids at the
    University of Tasmania
  authors:
  - name: Oliver James White
    affiliation: []
  - name: Guifré Molera Calvés
    affiliation: []
  - name: Shinji Horiuchi
    affiliation: []
  - name: Jon Giorgini
