  summary: The present work aims to determine the source regions of carbonaceous chondrites
    (CM, CI, CO, CV, CK, CR, CH, CB, or C-ungrouped). We studied 38 individual asteroid
    families, including young and old ones, and determined their contributions to
    the NEO populations at metre and kilometre sizes using collisional and orbital
    models. Our models are in agreement with spectroscopic observations of NEOs, cosmic-ray
    exposure ages of meteorites, statistics of bolides, infrared emission from dust
    bands, composition of interplanetary dust particles (IDPs), or abundance of extraterrestrial
    helium-3. We identified the Veritas, Polana and Eos families as the primary sources
    of CM/CR, CI and CO/CV/CK chondrites, respectively. Substantial contributions
    are also expected from CM-like König and CI-like Clarissa, Misa and Hoffmeister
    families. The source regions of kilometre-sized bodies are generally different.
    The Adeona family is by far the main source of CM-like NEOs, whereas the Polana
    (low-i) and Euphrosyne (high-i) families are at the origin of most CI-like NEOs.
    The Polana family is the likely source of both Ryugu and Bennu. We were able to
    link spectroscopically and dynamically several NEOs to the Baptistina family.
    Finally, it appears that the pre-atmospheric flux of carbonaceous chondrites at
    metre sizes is about the same as that of ordinary chondrites. Given the difference
    in fall statistics between the two groups (80\% versus 4.4\%), this implies either
    substantial atmospheric fragmentation of carbonaceous bodies at the level of ${\sim}0.5\,{\rm
    MPa}$, or destruction by thermal cracking and water desorption. The source regions
    of most meteorites and kilometre-sized NEOs have now been determined; including
    some minor classes like enstatite chondrites and achondrites (Nysa, Hungaria),
    acapulcoites/lodranites (Iannini).
