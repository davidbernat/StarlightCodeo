- entry_id: http://arxiv.org/abs/2605.12420v1
  short_id: 2605.12420v1
  title: Modeling and Analysis of Main-Belt Asteroidal Dust Flux and Velocity Distribution
    at Inner Planets
  authors:
  - name: Aanchal Sahu
    affiliation: []
  - name: Jayesh Pabari
    affiliation: []
  summary: 'Interplanetary dust in the inner solar system originates from multiple
    sources, including short-period comets and main-belt asteroids. In this work,
    we focus specifically on the dynamical evolution of asteroid-derived dust using
    N-body simulations that incorporates solar gravity, planetary perturbations, radiation
    pressure, Poynting-Robertson drag and solar wind forces. We quantify dust fluxes
    for Mars, Venus and Mercury across an important mass range, which are essential
    inputs for ablation process on Mars/Venus and for contributing in the impact process
    on Mercury. We have also derived impact velocity distributions and compared with
    existing literature. In addition, we examine how close-encounter velocities depend
    on the orbital elements linking dust energetics directly to the orbital architecture
    of the dust population. Our results show that the calibrated asteroidal flux agrees
    excellently with the scaled Grün model for Mars (0.04 orders of magnitude offset)
    and Venus (0.09 orders), and with the Müller (2002) model for Mercury (0.04 orders).
    The velocity distributions reveal a decoupling between flux and impact velocity:
    low-eccentricity grains dominate the flux, while high-eccentricity grains control
    the high-velocity tail. These findings have direct implications covering: (i)
    For atmosphere-less bodies like Mercury, the high-velocity tail affects impact
    processes and exosphere generation; (ii) For Mars and Venus, the flux-dominated
    low-velocity population determines meteoroid ablation rates and metal layer formation;
    (iii) Our calibrated fluxes provide inputs for comparison with future observations
    from different missions and also, for modeling impact-driven surface modification
    across the inner solar system.'
