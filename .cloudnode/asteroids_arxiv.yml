  title: 'The Mini-SiTian Array: the mini-SiTian Realtime Image Processing pipeline
    (STRIP)'
  authors:
  - name: Hongrui Gu
    affiliation: []
  - name: Yang Huang
    affiliation: []
  - name: Yongkang Sun
    affiliation: []
  - name: Kai Xiao
    affiliation: []
