  title: Assessing interstellar comet 3I/ATLAS with the 10.4 m Gran Telescopio Canarias
    and the Two-meter Twin Telescope
  authors:
  - name: R. de la Fuente Marcos
    affiliation: []
  - name: M. R. Alarcon
    affiliation: []
  - name: J. Licandro
    affiliation: []
  - name: M Serra-Ricart
    affiliation: []
  - name: J. de Leon
    affiliation: []
  - name: C. de la Fuente Marcos
