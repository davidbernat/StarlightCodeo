- entry_id: http://arxiv.org/abs/2604.00515v1
  short_id: 2604.00515v1
  title: Quantum Oppenheimer-Snyder primordial black holes as all the dark matter
  authors:
  - name: Li-Shuai Wang
    affiliation: []
  - name: Xiangdong Zhang
    affiliation: []
  summary: Primordial black holes (PBHs) are widely considered as candidates for dark
    matter in many recent studies, and they are often modeled as Schwarzschild or
    Kerr black holes (BHs), which have curvature singularities. Nevertheless, resolving
    the classical singularity may require quantum gravity motivated corrections, thereby
    yielding an effective quantum corrected BH spacetime geometry different from the
    Schwarzschild or Kerr cases. Therefore, it is well motivated to consider BHs beyond
    the Schwarzschild or Kerr as viable PBH candidates. Based on these considerations,
    we investigate quantum Oppenheimer Snyder BHs as PBHs which could account for
    all the dark matter. Our results show that these BHs have temperatures and greybody
    factors markedly different from the Schwarzschild case, suppressing Hawking emission
    and thereby relaxing the $γ$-ray constraints from HEAO-1, COMPTEL, and EGRET,
    which, relative to the Schwarzschild case, broadens the allowed PBH mass window
    in the asteroid-mass range where PBHs can constitute all of the dark matter.
