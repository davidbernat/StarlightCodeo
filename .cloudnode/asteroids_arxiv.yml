- entry_id: http://arxiv.org/abs/2504.07232v2
  short_id: 2504.07232v2
  title: 'A dark matter hail: Detecting macroscopic dark matter with asteroids, planetary
    rings, and craters'
  authors:
  - name: Zachary S. C. Picker
    affiliation: []
  summary: Dark matter could be composed of macroscopic objects with large masses
    and geometric cross-sections spanning many decades. We investigate the potential
    interaction of such `stuff-sized' dark matter by considering its interactions
    with asteroids, planetary rings, and terrestrial bodies. This hail of dark matter
    could catastrophically destroy these Solar System objects, evaporate them from
    their orbits, or cause substantial cratering. We estimate these effects and use
    them to place competitive bounds on a wide, previously-unconstrained swathe of
    the dark matter parameter space.
