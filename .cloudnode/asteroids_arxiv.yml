  title: Potential series expansion method applied in Analytical Modeling of Gravitational
    field of Irregularly Shaped Celestial Bodies
  authors:
  - name: Marcelo Lisboa Mota
    affiliation: []
  - name: Safwan Aljbaae
    affiliation: []
  - name: Antonio F. B. A. Prado
    affiliation: []
  summary: This study aims to establish an analytical model that reproduces the gravitational
    field around non-spherical bodies with constant density. Due to the non-spherical
    geometry of such bodies, their gravitational potential is disturbed relative to
    a central field. By considering the body as a polyhedron and decomposing it into
    tetrahedral elements, we use the Series Potential Expansion Method (PSEM) to approximate
    the total potential by summing the potentials of each tetrahedron. While this
    model does not offer higher accuracy than the classical polyhedral approach, it
    achieves relative errors below 0.1\% for points outside the body when developed
    to higher orders (e.g., orders 11 and 12), and significantly reduces execution
    time. To validate this approach, we apply our model to asteroids (87) Sylvia,
    (101955) Bennu, (99942) Apophis, and (25143) Itokawa. We determine equilibrium
    points, analyze stability, investigate zero-velocity planes, and calculate the
    relative errors between the gravitational field modeled by PSEM and the results
    obtained using both the classical polyhedral method by Tsoulis and Petrovic and
    the mass concentration method. Our results highlight the computational efficiency
    of PSEM in modeling the gravitational potential of irregularly shaped bodies.
    This efficiency stems from expressing the gravitational potential through a homogeneous
    analytical function that is easy to manipulate algebraically, enabling explicit
    determination of the acceleration vector. Our model provides a robust framework
    for more complex analyses, such as studying periodic orbits around non-spherical
    celestial bodies, assessing their stability, and planning the smooth landing trajectories
    of spacecraft.
