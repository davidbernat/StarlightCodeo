  title: NEOWISE Data Processing and Color Corrections for Near-Earth Asteroid Observations
  authors:
  - name: Samuel A. Myers
    affiliation: []
  - name: Ellen S. Howell
    affiliation: []
  - name: Yanga R. Fernández
    affiliation: []
  - name: Sean E. Marshall
    affiliation: []
  - name: Christopher Magri
    affiliation: []
  - name: Ronald J. Vervack
    affiliation: []
  - name: Mary L. Hinkle
    affiliation: []
  summary: The Wide-field Infrared Survey Explorer and NEOWISE missions are a key
    source of thermal data for near-Earth asteroids (NEAs). These missions, which
    utilized a space-based platform in Earth orbit, produced thermal images across
    four different wavelength bands, W1 - W4, with effective wavelengths of 3.4, 4.6,
    12, and 22 μm respectively. Despite its use for NEA observations though, the mission
    architecture was originally designed to observe stars. Thus, careful data analysis
    methods are crucial when working with NEA data to account for the differences
    between these objects. However, detailed information on how to work with these
    data can be difficult to find for users unfamiliar with the mission. The required
    information is well documented, but locating it can be challenging, and many details,
    such as specifics about color corrections, are not fully explained. Therefore,
    in this work, we provide a set of "lessons learned" for working with NEOWISE data,
    outline the basics of how to retrieve and process NEOWISE data for NEA investigations,
    and present an empirical method for color correction determination. We highlight
    the importance of this process by processing data for three NEAs, finding that
    nearly half of all available observations should be discarded. Finally, we present
    simple thermal model results based on different levels of data analysis to highlight
    how data processing can affect model results.
