- entry_id: http://arxiv.org/abs/2606.12642v1
  short_id: 2606.12642v1
  title: Quantifying Surface Heterogeneity Across Asteroid (101955) Bennu using Candidate
    Site Remote Sensing Data
  authors:
  - name: Emma-Catherine Belhadfa
    affiliation: []
  - name: Neil E. Bowles
    affiliation: []
  - name: Katherine A. Shirley
    affiliation: []
  - name: Amy A. Simon
    affiliation: []
  - name: Victoria E. Hamilton
    affiliation: []
  - name: Hannah H. Kaplan
    affiliation: []
  summary: 'The OSIRIS-REx mission acquired spatially resolved (2-10 m spot sizes)
    visible-near infrared (VNIR) and thermal infrared (TIR) spectra across four candidate
    sampling sites on asteroid (101955) Bennu: Nightingale, Osprey, Sandpiper, and
    Kingfisher. To quantify heterogeneity across a small body (about 500 m radius)
    like Bennu, we explore remotely observed spectral data to draw conclusions about
    the mineralogical composition and key physical processes that drive surface variability.
    We derive diagnostic band parameters from the OSIRIS-REx Visible and Infrared
    Spectrometer and the OSIRIS-REx Thermal Emission Spectrometer datasets to quantify
    compositional and physical variability across sites and assess their mineralogical
    context. The VNIR spectra exhibit similar overall reflectance shapes but systematic
    differences in spectral slopes and the 2.74 micron OH absorption. TIR emissivity
    spectra reveal modest but statistically significant shifts in the Christiansen
    Feature, silicate stretching, and bending band positions, indicating differences
    in silicate composition, hydration state, and Mg/Fe relative abundance. Principal
    component analysis separates each site into distinct clusters in multivariate
    band-parameter space, whereas K-means clustering identifies intra-site spectral
    sub-populations. Welch''s Analysis of Variance and Hotelling''s tests confirm
    that band-parameter variations between sites are significant. These results reveal
    that Bennu''s surface preserves measurable spectral heterogeneity at 2-10 m scales,
    with site-to-site variations in hydration indicators and silicate band positions.
    The spectral properties of Nightingale encompass the full range observed across
    all four sites, establishing a remote sensing baseline for contextualizing laboratory
    analyses of the returned sample within Bennu''s broader composition diversity
    and alteration history.'
