- entry_id: http://arxiv.org/abs/2405.12281v1
  short_id: 2405.12281v1
  title: Detection of a 2.85 micrometer Feature on 5 Spinel-rich Asteroids from JWST
  authors:
  - name: Jonathan Gomez Barrientos
    affiliation: []
  - name: Katherine de Kleer
    affiliation: []
  - name: Bethany L. Ehlmann
    affiliation: []
  - name: Francois L. H. Tissot
    affiliation: []
  - name: Jessica Mueller
    affiliation: []
  summary: Ground-based observations of `Barbarian' L-type asteroids at 1 to 2.5-$μ$m
    indicate that their near-infrared spectra are dominated by the mineral spinel,
    which has been attributed to a high abundance of calcium-aluminum inclusions (CAIs)
    -- the first solids to condense out of the protoplanetary disk during the formation
    of the Solar System. However, the spectral properties of these asteroids from
    2.5 to 5-$μ$m, a wavelength region that covers signatures of hydrated minerals,
    water, and organics, have not yet been explored. Here, we present 2 to 5-$μ$m
    reflectance spectra of five spinel-rich asteroids obtained with the NIRSpec instrument
    on the James Webb Space Telescope. All five targets exhibit a $\sim$ 2.85-$μ$m
    absorption feature with a band depth of 3-6$\%$ that appears correlated in strength
    with that of the 2-$μ$m spinel absorption feature. The shape and position of the
    2.85-$μ$m feature are not a good match to the 2.7-$μ$m feature commonly seen in
    carbonaceous CM meteorites or C-type asteroids. The closest spectral matches are
    to the Moon and Vesta, suggesting commonalities in aqueous alteration across silicate
    bodies, infall of hydrated material, and/or space weathering by solar wind H implantation.
    Lab spectra of CO/CV chondrites, CAIs, as well as the minerals cronstedtite and
    spinel, also show a similar feature, providing clues into the origin of the 2.85-$μ$m
    feature.
