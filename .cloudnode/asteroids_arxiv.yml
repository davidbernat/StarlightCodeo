  title: Astrometric Parallax Measurements with JWST for Localization of Near-Earth
    Objects
  authors:
  - name: Sriram Elango
    affiliation: []
  - name: Abraham Loeb
    affiliation: []
  summary: We propose the use of the James Webb Space Telescope (JWST) in simultaneous
    observations with an Earth-based telescope for parallax measurements to tightly
    constrain the orbital trajectory of hazardous near-Earth objects (NEOs). We demonstrate
    the significant reduction in localization error with varying epochs of observation
    at the potential time-of-impact via a Monte Carlo simulated case study of 2024
    YR4, an Apollo-type near-Earth asteroid. By leveraging the L2-Earth baseline and
    the considerable parallax angles formed, we highlight the unexplored potential
    for improved localization of NEOs through parallax observations with JWST.
