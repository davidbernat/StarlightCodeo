- entry_id: http://arxiv.org/abs/2408.07474v2
  short_id: 2408.07474v2
  title: Debiasing astro-Photometric Observations with Corrections Using Statistics
    (DePhOCUS)
  authors:
  - name: Tobias Hoffmann
    affiliation: []
  - name: Marco Micheli
    affiliation: []
  - name: Juan Luis Cano
    affiliation: []
  - name: Maxime Devogèle
    affiliation: []
  - name: Davide Farnocchia
    affiliation: []
  - name: Petr Pravec
    affiliation: []
  - name: Peter Vereš
    affiliation: []
  - name: Björn Poppe
    affiliation: []
  summary: Photometric measurements allow the determination of an asteroid's absolute
    magnitude, which often represents the sole means to infer its size. Photometric
    observations can be obtained in a variety of filters that can be unique to a specific
    observatory. Those observations are then calibrated into specific bands with respect
    to reference star catalogs. In order to combine all the different measurements
    for evaluation, photometric observations need to be converted to a common band,
    typically V-band. Current band-correction schemes in use by IAU's Minor Planet
    Center, JPL's Center for Near Earth Object Studies and ESA's NEO Coordination
    Centre use average correction values for the apparent magnitude derived from photometry
    of asteroids as the corrections are dependent on the typically unknown spectrum
    of the object to be corrected. By statistically analyzing the photometric residuals
    of asteroids, we develop a new photometric correction scheme that does not only
    consider the band, but also accounts for reference catalog and observatory. We
    describe a new statistical photometry correction scheme for asteroid observations
    with debiased corrections. Testing this scheme on a reference group of asteroids,
    we see a 36% reduction in the photometric residuals. Moreover, the new scheme
    leads to a more accurate and debiased determination of the H-G magnitude system
    and, in turn, to more reliable inferred sizes. We discuss the significant shift
    in the corrections with this "DePhOCUS" debiasing system, its limitations, and
    the impact for photometric and physical properties of all asteroids, especially
    Near-Earth Objects.
