- entry_id: http://arxiv.org/abs/2603.10670v1
  short_id: 2603.10670v1
  title: Dynamic Modeling and Attitude Control of a Reaction-Wheel-Based Low-Gravity
    Bipedal Hopper
  authors:
  - name: Shriram Hari
    affiliation: []
  - name: M Venkata Sai Nikhil
    affiliation: []
  - name: R Prasanth Kumar
    affiliation: []
  summary: 'Planetary bodies characterized by low gravitational acceleration, such
    as the Moon and near-Earth asteroids, impose unique locomotion constraints due
    to diminished contact forces and extended airborne intervals. Among traversal
    strategies, hopping locomotion offers high energy efficiency but is prone to mid-flight
    attitude instability caused by asymmetric thrust generation and uneven terrain
    interactions. This paper presents an underactuated bipedal hopping robot that
    employs an internal reaction wheel to regulate body posture during the ballistic
    flight phase. The system is modeled as a gyrostat, enabling analysis of the dynamic
    coupling between torso rotation and reaction wheel momentum. The locomotion cycle
    comprises three phases: a leg-driven propulsive jump, mid-air attitude stabilization
    via an active momentum exchange controller, and a shock-absorbing landing. A reduced-order
    model is developed to capture the critical coupling between torso rotation and
    reaction wheel dynamics. The proposed framework is evaluated in MuJoCo-based simulations
    under lunar gravity conditions (g = 1.625 m/s^2). Results demonstrate that activation
    of the reaction wheel controller reduces peak mid-air angular deviation by more
    than 65% and constrains landing attitude error to within 3.5 degrees at touchdown.
    Additionally, actuator saturation per hop cycle is reduced, ensuring sufficient
    control authority. Overall, the approach significantly mitigates in-flight attitude
    excursions and enables consistent upright landings, providing a practical and
    control-efficient solution for locomotion on irregular extraterrestrial terrains.'
