  title: 'Beyond Exascale: Dataflow Domain Translation on a Cerebras Cluster'
  authors:
  - name: Tomas Oppelstrup
    affiliation: []
  - name: Nicholas Giamblanco
    affiliation: []
  - name: Delyan Z. Kalchev
    affiliation: []
  - name: Ilya Sharapov
    affiliation: []
  - name: Mark Taylor
    affiliation: []
  - name: Dirk Van Essendelft
    affiliation: []
  - name: Sivasankaran Rajamanickam
    affiliation: []
  - name: Michael James
    affiliation: []
  summary: 'Simulation of physical systems is essential across scientific and engineering
    domains. Commonly used domain decomposition methods are unable to simultaneously
    deliver both high simulation rate and high utilization in network computing environments.
    In particular, Exascale systems deliver only a small fraction their peak performance
    for these workloads. This paper introduces the novel Domain Translation algorithm,
    designed to overcome these limitations. On a cluster of 64 Cerebras CS-3 systems,
    we use this method to demonstrate unprecedented cluster performance across a range
    of metrics: we show simulations running in excess of 1.6 million time steps per
    second; we also demonstrate perfect weak scaling at 88% of peak performance. At
    this cluster scale, our implementation provides 112 PFLOP/s in a power-unconstrained
    environment, and 57 GFLOP/J in a power-limited environment. We illustrate the
    method by applying the shallow-water equations to model a tsunami following an
    asteroid impact at 460m-resolution on a planetary scale.'
