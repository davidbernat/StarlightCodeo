  title: Abundance analysis of stars hosting gas-rich debris disks
  authors:
  - name: Sandipan P. D. Borthakur
    affiliation:
    - Tartu Observatory, Estonia
    - Space Research Institute, Austria
    - Graz University of Technology, Austria
  - name: Mihkel Kama
    affiliation:
    - University College London, UK
    - Tartu Observatory, Estonia
  - name: Luca Fossati
    affiliation:
    - Space Research Institute, Austria
  - name: Quentin Kral
    affiliation:
    - LESIA, Observatoire de Paris, France
  - name: Colin P. Folsom
    affiliation:
    - Tartu Observatory, Estonia
  - name: Johanna Teske
    affiliation:
    - Carnegie Institution for Science, USA
  - name: Anna Aret
    affiliation:
    - Tartu Observatory, Estonia
  summary: Accretion from protoplanetary or debris disks can contaminate the stellar
    photosphere, which is detectable in stars with radiative envelopes due to relatively
    slower photospheric mixing. The contaminated photosphere reflects ongoing disk
    processes, detectable through stellar spectroscopy. We investigate the composition
    of six gas-rich debris disk-hosting A-type stars to understand possible links
    with their debris disk or earlier accretion stages. We used archival spectra to
    estimate the stellar parameters and abundances of our sample. We also estimated
    the stellar photospheric accretion contamination parameter, fph which indicates
    the fraction of accreting material on the stellar photosphere. The oxygen abundance
    in intermediate-mass stars decreases with age until the debris disk stage (< 20
    Myr). The downward trend could result from H2O ice accumulating in dust traps
    or the formation of hydrated asteroids in the protoplanetary disk, locking oxygen
    in solids and reducing its accretion onto the star. All stars have similar volatile
    abundances (C, O), but HD 110058 and HD 32297 show refractory depleted abundances.
    The near-zero fph values in the six stars suggest that any currently accreted
    gas would not overwhelm mixing in the photosphere and would not impact the observed
    composition. The refractory depleted abundances in HD 110058 and HD 32297 suggest
    residual, or even chronic, accretion contamination from their earlier protoplanetary
    stages when the accretion rates were about five orders of magnitude higher. For
    HD 110058, with the highest refractory depletion, we estimated a lower limit on
    its earlier protoplanetary accretion rate of 9 x 10^(-8) Msun/yr, similar to other
    Herbig stars and equal to the Herbig star - HD 100546. This supports our hypothesis
    that refractory depletion in HD 110058 originates from a prior phase of higher
    accretion of dust-poor material.
