  title: 'Enabling tomorrow''s planetary defence and space resource economy: Autonomous
    fleet-based asteroid rendezvous missions'
  authors:
  - name: Stefania Soldini
    affiliation: []
  - name: Paul A. Abell
    affiliation: []
  - name: Daniel J. Scheeres
    affiliation: []
  - name: Yuichi Tsuda
