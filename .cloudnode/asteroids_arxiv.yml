  title: Close-to-fission dumbbell Jupiter-Trojan (17365) Thymbraeus
  authors:
  - name: B. Carry
    affiliation: []
  - name: P. Descamps
    affiliation: []
  - name: M. Ferrais
    affiliation: []
  - name: J. -P. Rivet
    affiliation: []
  - name: J. Berthier
    affiliation: []
  - name: E. Jehin
    affiliation: []
  - name: D. Vernet
    affiliation: []
  - name: L. Abe
    affiliation: []
  - name: P. Bendjoya
    affiliation: []
  - name: F. Vachier
    affiliation: []
  - name: M. Pajuelo
    affiliation: []
  - name: M. Birlan
    affiliation: []
  - name: F. Colas
    affiliation: []
  - name: Z. Benkhaldoun
    affiliation: []
  summary: 'Every population of small bodies in the Solar system contains a sizable
    fraction of multiple systems. Among these, the Jupiter Trojans have the lowest
    number of known binary systems and the least characterized. We aim at characterizing
    the reported binary system (17365) Thymbraeus, one of the only seven multiple
    systems known among Jupiter Trojans. We conducted light curves observing campaigns
    in 2013, 2015, and 2021 with ground-based telescopes. We model these lightcurves
    using dumbbell equilibrium figures. We show that Thymbraeus is unlikely a binary
    system. Its light curves are fully consistent with a bilobated shape: a dumbbell
    equilibrium figure. We determine a low density of 830 +/- 50 kg.m-3 , consistent
    with the reported density of other Jupiter Trojan asteroids and small Kuiper-belt
    objects. The angular velocity of Thymbraeus is close to fission. If separated,
    its components would become a similarly-sized double asteroid such as the other
    Jupiter Trojan (617) Patroclus.'
