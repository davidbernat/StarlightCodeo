  summary: We present A databaSe of millimeTeR ObservatioNs of Asteroids Using acT
    (ASTRONAUT) hosted on Amazon Web Services, Inc. (AWS) in the form of a public
    Amazon Simple Storage Service (S3) bucket. This bucket is an Amazon cloud storage
    database containing flux measurements for a group of asteroids at millimeter (mm)
    wavelengths. These measurements were collected by the Atacama Cosmology Telescope
    (ACT) from 2017 to 2021 in frequency bands centered near 90, 150, and 220 GHz.
    The ASTRONAUT database contains observation times, normalized flux values, and
    associated error bars for 170 asteroids above a signal-to-noise ratio of 5 for
    a single frequency band over the stacked co-added maps. We provide an example
    in generating light curves with this database. We also present a Jupyter notebook
    to serve as a reference guide when using the S3 bucket. The container and notebook
    are publicly available in a GitHub repository.
