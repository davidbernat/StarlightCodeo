  title: 'AstroSkyFlow: an astronomical sky image flow simulator for time domain survey
    validation and machine learning'
  authors:
  - name: Kexin Li
    affiliation: []
  - name: Yicheng Rui
    affiliation: []
  - name: Fabo Feng
    affiliation: []
  - name: Shuyue Zheng
    affiliation: []
  - name: Anton Pomazan
    affiliation: []
  - name: Yiyang Guo
    affiliation: []
  - name: Jie Zheng
    affiliation: []
  - name: Lin-Qiao Jiang
    affiliation: []
  summary: Modern time-domain optical surveys produce massive data volumes that require
    robust, high-fidelity simulated datasets for developing and validating automated
    pipelines and machine-learning models. We present AstroSkyFlow, a modular sky-image
    simulator that generates on-demand, time-dependent flux variations and models
    the full observing stack, from celestial sources and atmospheric effects to sensor
    response. Given a simulated observing schedule, AstroSkyFlow produces multi-epoch,
    time-series images with realistic noise and variability. Compared to real observational
    data, AstroSkyFlow reproduces noise characteristics and point spread function
    properties more accurately than the widely used SkyMaker simulator. In addition,
    AstroSkyFlow successfully recovers injected photometric and motion signals, such
    as exoplanet transits and asteroid trails. AstroSkyFlow enables the generation
    of labeled, high-fidelity datasets essential for training machine-learning pipelines
    and conducting rigorous injection-recovery tests for analysis pipelines for next-generation
    time-domain surveys.
