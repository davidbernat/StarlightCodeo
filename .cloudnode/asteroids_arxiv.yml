- entry_id: http://arxiv.org/abs/2411.11571v1
  short_id: 2411.11571v1
  title: Measuring Regolith Strength in Reduced Gravity Environments in the Laboratory
  authors:
  - name: Christopher Duffey
    affiliation: []
  - name: Michael Lea
    affiliation: []
  - name: Julie Brisset
    affiliation: []
  summary: This paper presents the design and development of a Shear and Compression
    Cell (SCC) for measuring the mechanical properties of granular materials in low-gravity
    environments. This research is motivated by the increasing interest in planetary
    exploration missions that involve surface interactions, such as those to asteroids
    and moons. The SCC is designed to measure key mechanical properties, including
    Young's modulus, angle of internal friction, bulk cohesion, and tensile strength,
    under both reduced gravity and microgravity conditions. By utilizing a drop tower
    with interchangeable configurations, we can simulate the gravitational environments
    of celestial bodies like the Moon and Titan. The SCC, coupled with the drop tower,
    provides a valuable tool for understanding the behavior of regolith materials
    and their implications for future space exploration missions.
