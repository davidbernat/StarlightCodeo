  title: Infrared Colors of Small Serendipitously-Found Asteroids in the UKIRT Hemisphere
    Survey
  authors:
  - name: Samantha G. Morrison
    affiliation:
    - Grinnell College
    - Northern Arizona University
  - name: Ryder H. Strauss
    affiliation:
    - Northern Arizona University
  - name: David E. Trilling
