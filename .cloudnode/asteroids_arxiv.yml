- entry_id: http://arxiv.org/abs/2510.06044v1
  short_id: 2510.06044v1
  title: The Influence of Central Body Tides on Catastrophic Disruptions of Close-in
    Planetary Satellites
  authors:
  - name: Harrison Agrusa
    affiliation: []
  - name: Patrick Michel
    affiliation: []
  summary: We model the outcomes of catastrophic disruptions on small, gravity-dominated
    natural satellites, accounting for the tidal potential of the central body, which
    is neglected in classical disruption scaling laws. We introduce the concept of
    $Q^\star_\text{TD}$, the specific energy required to disperse half of the total
    mass involved in a collision, accounting for the tidal potential of a central
    body. We derive a simple scaling relation for $Q^\star_\text{TD}$ and demonstrate
    that for close-in planetary or asteroidal satellites, the tides from the central
    body can significantly reduce their catastrophic disruption threshold. We show
    that many satellites in the Solar System are in such a regime, where their disruption
    threshold should be much lower than that predicted by classical scaling laws which
    neglect tidal effects. Some notable examples include Mars' Phobos, Jupiter's Metis
    and Adrastea, Saturn's ring moons, Uranus' Ophelia, and Neptune's Naiad and Thalassa,
    among others. We argue that traditional impact scaling laws should be modified
    to account for tides when modeling the formation and evolution of these close-in
    satellites. Our derivation for $Q^\star_\text{TD}$ can easily be used in existing
    $N$-body and collisional evolution codes.
