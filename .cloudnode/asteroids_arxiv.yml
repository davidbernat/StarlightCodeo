- entry_id: http://arxiv.org/abs/2511.13030v1
  short_id: 2511.13030v1
  title: 'Thermal infrared characterization of spatially unresolved resident space
    objects: Prospects from analytical two-component modeling'
  authors:
  - name: Stephen Catsamas
    affiliation: []
  - name: Sarah Caddy
    affiliation: []
  - name: Michele Trenti
    affiliation: []
  - name: Benjamin Metha
    affiliation: []
  - name: Simon Barraclough
    affiliation: []
  - name: Robert Mearns
    affiliation: []
  - name: Airlie Chapman
    affiliation: []
  - name: Rachel Webster
    affiliation: []
  summary: In this work we investigate the potential of a thermal infrared (IR) space
    telescope to remotely characterize the component temperatures of a satellite.
    With the rapid increase in the number of objects launched in recent years, the
    ability to detect, track, identify and determine the intent of satellites has
    become of increasing importance. Spectral modeling of satellites from multi-wavelength
    photometry in the thermal IR is a technique that has the potential to derive information
    about the temperature and operational status of a satellite in orbit, without
    the requirement to spatially resolve the target. Previous work has focused on
    determination of a single/effective temperature for a Resident Space Objects (RSOs)
    - such as satellites, asteroids, debris and rocket bodies - from remote observations,
    obtaining mixed results in terms of ability to classify objects. To progress,
    we explore a two-greybody component spectral model. Using this analytical model,
    we investigate which temperature characteristics may be identified from unresolved
    multi-wavelength photometric observations as a function of the signal-to-noise
    ratio, under the assumption of Poisson noise-dominated data. With this instrument-agnostic
    framework, we then quantify the potential of this model to discriminate between
    RSOs with a single temperature (e.g. natural rocks) versus human-made satellites
    with a chassis and deployed solar panels where significant component temperature
    differences exist under typical orbital configurations. Last, we comment on promising
    prospects of this model for applications to existing and future space telescope
    observations to characterize RSOs from spatially unresolved photometry
