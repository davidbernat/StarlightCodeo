- entry_id: http://arxiv.org/abs/2604.16223v1
  short_id: 2604.16223v1
  title: Degradation mechanisms and efficiency of heavily cratered regions on Ceres
  authors:
  - name: Reem Vitale
    affiliation: []
  - name: Masatoshi Hirabayashi
    affiliation: []
  summary: Ceres, the dwarf planet in the main asteroid belt, hosts heavily cratered
    surfaces where craters are continuously eroded mainly due to impact bombardment
    with a limited influence by non-impact processes. Over continuous bombardment,
    such regions experience both crater production and erasure, eventually ceasing
    the crater population growth. This end-state, known as crater equilibrium, provides
    key information to constrain the mechanisms of crater degradation. The present
    study applies a recently extended crater equilibrium model to the crater equilibrium
    features and constrains the conditions for crater degradation on Ceres. We select
    eight heavily cratered sites as our test locations across four quadrangles (two
    sites per quadrangle) and collect crater counts using Dawn Framing Camera imagery.
    All sites exhibit cumulative size-frequency distributions (CSFD) with slopes slightly
    shallower than a power law of -2 at diameters below a few kilometers, strongly
    suggesting that the tested sites are at crater equilibrium. Our results show that
    the crater equilibrium state on Ceres resembles that on the Moon but is denser.
    Performing model fitting with crater counting data under negligible ejecta blanketing
    for crater erasure, we further show that crater degradation per single crater
    production on Ceres is comparable to or higher than that on the Moon. Combining
    this finding and the impact flux on Ceres, which is orders of magnitude higher
    than that on the Moon, suggests that crater degradation is much more elevated
    on Ceres than on the Moon, despite its denser crater population.
