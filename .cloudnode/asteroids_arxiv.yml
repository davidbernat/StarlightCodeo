- entry_id: http://arxiv.org/abs/2508.19872v1
  short_id: 2508.19872v1
  title: Jupiter Trojans spectrophotometry using Gaia DR3 catalog
  authors:
  - name: Sonia Fornasier
    affiliation: []
  - name: Noemie El-Bez-Sebastien
    affiliation: []
  summary: "We present the spectral characterization of Jupiter Trojans using data\
    \ from the Gaia mission DR3 spectral catalog (320 spectra of good quality) and\
    \ from the literature. Gaia spectrophotometry is available in 16 spectrophotometric\
    \ points covering the 0.33-1.08 $μ$m range. The final dataset includes 519 Trojans,\
    \ 291 in the leading swarm (L4) and 228 in the trailing swarm (L5), which we classified\
    \ using the Bus-Demeo and Mahlke classification schemes.\n  The Trojan population\
    \ is dominated by featureless asteroids with red spectral slopes belonging to\
    \ the D-type, and an important fraction ($\\sim$ 40\\%) belong to the Z-class\
    \ (in Mahlke taxonomy), characterized by very red slopes. The L4 swarm shows a\
    \ higher spectral variability and a higher amount, by a factor of 2, of less spectrally\
    \ red asteroids belonging to the C, P, and X classes, mainly associated with families\
    \ members.\n  Once excluding peculiar families members the two swarms have very\
    \ similar average slope and albedo values (7.86 $\\pm$ 0.15\\% and 7.35 $\\pm$0.15\\\
    % for the L4 and L5 swarms, respectively). This points toward a common origin\
    \ of the bodies of the two swarms, likely from the Transneptunian region. We do\
    \ not observe a spectral color bi-modality distribution, conversely to the results\
    \ previously reported in the literature. The spectral slope distribution, peaked\
    \ at 9-11 \\%/1000 Å, it is very narrow compared to that of Transneptunian objects\
    \ (TNOs) or cometary nuclei. Trojans visible spectral slopes match those of the\
    \ less red TNOs, and lack of extremely red and organic rich bodies. We suggest\
    \ that the Jupiter Trojans might have been captured by Jupiter from the Centaurs\
    \ and scattered disk population, and that the lack of extremely red objects among\
    \ Trojans is due to removal of the organic-rich crust through the sublimation\
    \ of volatiles and collisions as TNOs migrated inward in the Solar System."
