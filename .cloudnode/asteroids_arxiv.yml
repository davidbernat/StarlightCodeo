- entry_id: http://arxiv.org/abs/2503.08158v1
  short_id: 2503.08158v1
  title: 'Secondary impact debris in the Didymos system: what could be observed by
    Hera?'
  authors:
  - name: Krzysztof Langner
    affiliation: []
  - name: Elena Martellato
    affiliation: []
  - name: Robert Luther
    affiliation: []
  - name: Francesco Marzari
    affiliation: []
  - name: Alessandro Rossi
    affiliation: []
  summary: We investigate the effects of low--velocity impacts of rocks and boulders,
    originally released after the DART impact, on the surface of Didymos and the dynamics
    of dust particles released by those impacts. We determine if any of those effects
    can be observed by the Hera mission. The iSALE-2D shock physics code was used
    to simulate the re-impacts of boulders on the surface of the asteroid. To model
    the dynamics of the boulders, we used a numerical model that includes the gravity
    of non-spherical Didymos and Dimorphos, the solar gravity, and the radiation pressure.
    The sesquinary impacts can result in small, shallow craters on the surface of
    Didymos. For the given low impact speeds, the ejected mass depends mostly on the
    boulder mass. Ejection speeds range from 10 \% to 80 \% of the impact speed. The
    majority of the ejected dust falls back covering a large area of the surface,
    mostly at low/medium latitudes. Less than 20 \% of the ejected dust is escaping
    the system after a few days. The space surrounding the asteroids becomes free
    from dust after 15-30 days following each sesquinary impact. Results. The sesquinary
    impacts can result in small, shallow craters on the surface of Didymos. For the
    given low impact speeds, the ejected mass depends mostly on the boulder mass.
    Ejection speeds range from 10 \% to 80 \% of the impact speed. The majority of
    the ejected dust falls back covering a large area of the surface, mostly at low
    and medium latitudes. Less than 20 \% of the ejected dust is escaping the system
    after a few days. The space surrounding the asteroids becomes free from dust after
    15-30 days following each sesquinary impact.
