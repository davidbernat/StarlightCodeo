- entry_id: http://arxiv.org/abs/2508.03025v1
  short_id: 2508.03025v1
  title: On ore-bearing asteroid remnants in lunar craters
  authors:
  - name: Jayanth Chennamangalam
    affiliation: []
  - name: Paul Brook
    affiliation: []
  - name: Martin Elvis
    affiliation: []
  - name: Samuel Peterson
    affiliation: []
  summary: We modify the probabilistic formalism developed by Elvis (2014) to estimate
    the number of lunar craters that contain ore-bearing asteroid remnants. When we
    consider craters at or above a threshold diameter of 1 km, we estimate an upper
    limit of ${\sim}6,500$ craters with asteroid remnants containing significant amounts
    of platinum group metals and an upper limit of ${\sim}3,400$ craters with asteroid
    remnants that contain significant amounts of water in the form of hydrated minerals.
    For a more conservative threshold of 5 km, we estimate $\lesssim400$ craters with
    asteroid remnants that contain significant amounts of platinum group metals. These
    values are one to two orders of magnitude larger than the number of ore-bearing
    near-Earth asteroids estimated by Elvis (2014), implying that it may be more advantageous,
    and hence more profitable, to mine asteroids that have impacted the Moon rather
    than the ones that are in orbit.
