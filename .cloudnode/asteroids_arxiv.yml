  title: Solar evolution models with a central black hole
  authors:
  - name: Earl P. Bellinger
    affiliation: []
  - name: Matt E. Caplan
    affiliation: []
  - name: Taeho Ryu
    affiliation: []
  - name: Deepika Bollimpalli
    affiliation: []
  - name: Warrick H. Ball
    affiliation: []
  - name: Florian Kühnel
    affiliation: []
  - name: R. Farmer
    affiliation: []
  - name: S. E. de Mink
    affiliation: []
  - name: Jørgen Christensen-Dalsgaard
    affiliation: []
  summary: Hawking (1971) proposed that the Sun may harbor a primordial black hole
    whose accretion supplies some of the solar luminosity. Such an object would have
    formed within the first 1 s after the Big Bang with the mass of a moon or an asteroid.
    These light black holes are a candidate solution to the dark matter problem, and
    could grow to become stellar-mass black holes (BHs) if captured by stars. Here
    we compute the evolution of stars having such a BH at their center. We find that
    such objects can be surprisingly long-lived, with the lightest black holes having
    no influence over stellar evolution, while more massive ones consume the star
    over time to produce a range of observable consequences. Models of the Sun born
    about a BH whose mass has since grown to approximately $10^{-6}~\rm{M}_\odot$
    are compatible with current observations. In this scenario, the Sun would first
    dim to half its current luminosity over a span of 100 Myr as the accretion starts
    to generate enough energy to quench nuclear reactions. The Sun would then expand
    into a fully-convective star, where it would shine luminously for potentially
    several Gyr with an enriched surface helium abundance, first as a sub-subgiant
    star, and later as a red straggler, before becoming a sub-solar-mass BH. We also
    present results for a range of stellar masses and metallicities. The unique internal
    structures of stars harboring BHs may make it possible for asteroseismology to
    discover them, should they exist. We conclude with a list of open problems and
    predictions.
