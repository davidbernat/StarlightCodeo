- entry_id: http://arxiv.org/abs/2409.13811v1
  short_id: 2409.13811v1
  title: 'Light in the Shadows: Primordial Black Holes Making Dark Matter Shine'
  authors:
  - name: Kaustubh Agashe
    affiliation: []
  - name: Manuel Buen-Abad
    affiliation: []
  - name: Jae Hyeok Chang
    affiliation: []
  - name: Steven J. Clark
    affiliation: []
  - name: Bhaskar Dutta
    affiliation: []
  - name: Yuhsin Tsai
    affiliation: []
  - name: Tao Xu
    affiliation: []
  summary: We consider the possibility of indirect detection of dark sector processes
    by investigating a novel form of interaction between ambient dark matter (DM)
    and primordial black holes (PBHs). The basic scenario we envisage is that the
    ambient DM is ``dormant'', \ie, it has interactions with the SM, but its potential
    for an associated SM signal is not realized for various reasons. We argue that
    the presence of PBHs with active Hawking radiation (independent of any DM considerations)
    can act as a catalyst in this regard by overcoming the aforementioned bottlenecks.
    The central point is that PBHs radiate all types of particles, whether in the
    standard model (SM) or beyond (BSM), which have a mass at or below their Hawking
    temperature. The emission of such radiation is ``democratic" (up to the particle
    spin), since it is based on a coupling of sorts of gravitational origin. In particular,
    such shining of (possibly dark sector) particles onto ambient DM can then activate
    the latter into giving potentially observable SM signals. We illustrate this general
    mechanism with two specific models. First, we consider asymmetric DM, which is
    characterized by an absence of ambient anti-DM, and consequently the absence of
    DM indirect detection signals. In this case, PBHs can ``resurrect'' such a signal
    by radiating anti-DM, which then annihilates with ambient DM in order to give
    SM particles such as photons. In our second example, we consider the PBH emission
    of dark gauge bosons which can excite ambient DM into a heavier state (which is,
    again, not ambient otherwise), this heavier state later decays back into DM and
    photons. Finally, we demonstrate that we can obtain observable signals of these
    BSM models from asteroid-mass PBHs (Hawking radiating currently with $\sim \mathcal{O}(\mathrm{MeV})$
    temperatures) at gamma-ray experiments such as AMEGO-X.
