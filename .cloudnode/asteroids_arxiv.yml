- entry_id: http://arxiv.org/abs/2606.14768v1
  short_id: 2606.14768v1
  title: Kinetics of coagulation phenomena from a granular matter perspective
  authors:
  - name: Gustavo Castillo
    affiliation: []
  - name: Nicolás Mujica
    affiliation: []
  summary: "Aggregation processes play a central role in systems ranging from aerosol\
    \ coagulation and cloud formation to dust growth in protoplanetary disks and granular\
    \ materials. These processes are traditionally described by Smoluchowski's coagulation\
    \ equation, which provides a mean-field account of growth through binary collisions.\
    \ However, incorporation of granular physics-dissipative interactions, spatial\
    \ heterogeneity, and force transmission through contact networks-reveals important\
    \ limitations of this framework.\n  In this review, we show how such effects lead\
    \ to the breakdown of mean-field assumptions and motivate a view of aggregation\
    \ as a multi-scale process shaped by the interplay between interactions, structure,\
    \ and collective dynamics. Phenomena such as segregation, jamming, and clogging\
    \ further highlight the role of mechanical constraints and spatial organization\
    \ in limiting or redirecting growth. By integrating insights from granular physics,\
    \ aerosol science, and astrophysics, we outline a unified perspective on coagulation\
    \ in non-equilibrium particulate systems.\n  This paper is part of the thematic\
    \ issue \"Sand, silos and asteroids: clustering challenges in granular materials\
    \ research\"."
