    affiliation: []
  summary: In an attempt to further characterise the near-Earth asteroid (NEA) population
    we present 38 new light-curves acquired between September 2020 and November 2023
    for NEAs (7335) 1989 JA, (7822) 1991 CS, (154244) 2002 KL6 and (159402) 1999 AP10,
    obtained from observations taken at the Teide Observatory (Tenerife, Spain). With
    these new observations along with archival data, we computed their first shape
    models and spin solutions by applying the light curve inversion method. The obtained
    rotation periods are in good agreement with those reported in previous works,
    with improved uncertainties. Additionally, besides the constant period models
    for (7335) 1989 JA, (7822) 1991 CS and (159402) 1999 AP10, our results for (154244)
    2002 KL6 suggest that it could be affected by a Yarkovsky-O'Keefe-Radzievskii-Paddack
    acceleration with a value of $\upsilon \simeq -7 \times 10^{-9}$ rad d$^{-2}$.
    This would be one of the first detections of this effect slowing down an asteroid.
