- entry_id: http://arxiv.org/abs/2601.15403v2
  short_id: 2601.15403v2
  title: F-Purity of Binomial Edge Ideals
  authors:
  - name: Adam LaClair
    affiliation: []
  - name: Jason McCullough
    affiliation: []
  summary: "In 2012, K. Matsuda introduced the class of weakly closed graphs and investigated\
    \ when binomial edge ideals are F-pure. He proved that weakly closed binomial\
    \ edge ideals are F-pure whenever the base field has positive characteristic.\
    \ He conjectured that: (i) when the base field has characteristic two, every F-pure\
    \ binomial edge ideal comes from a weakly closed graph; and (ii) that every binomial\
    \ edge ideal is F-pure provided that the characteristic of the residue field is\
    \ sufficiently large.\n  In this paper, we resolve both of Matsuda's conjectures.\
    \ We confirm Matsuda's first conjecture, showing that the binomial edge ideal\
    \ of a graph defines an F-pure quotient in characteristic 2 if and only if the\
    \ graph is weakly closed. We also show that Matsuda's second conjecture is false\
    \ in a very strong way by showing that graphs containing asteroidal triples, such\
    \ as the net, define non-F-pure binomial edge ideals in any positive characteristic.\
    \ Our results yield a complete classification of F-pure binomial edge ideals of\
    \ chordal graphs as well as large families of standard graded algebras that are\
    \ F-injective but neither F-pure nor F-rational in all characteristics."
