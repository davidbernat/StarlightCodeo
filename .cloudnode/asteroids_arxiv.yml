  - name: Ken. C. Chambers
    affiliation: []
  - name: Mariusz Gromadzki
    affiliation: []
  - name: Priscila J. Pessi
    affiliation: []
  - name: Ting-Wan Chen
    affiliation: []
  summary: 'Type Ia supernovae (SNe Ia) provide the most robust means of measuring
    extragalactic distances. While most of the effort has focused on increasing the
    number of SNe Ia observed in the optical, near-infrared (NIR) observations remain
    scarce despite their advantages, that is, reduced dust extinction and a more intrinsic
    standard candle behavior, requiring little to no empirical corrections. Here,
    we present ASNOS (ANDICAM-SOFI Near-infrared and Optical type Ia Supernova), a
    dataset with sample size of 1,482 epochs in the $BVRIYJH$ filters from the ANDICAM
    instrument on the 1.3-meter SMARTS telescope at Cerro Tololo Inter-American Observatory,
    along with 125 $JHK$ epochs from the SOFI instrument on the 3.58-meter New Technology
    Telescope on the La Silla Observatory. Additionally, we incorporate optical forced
    photometry from the Zwicky Transient Facility and the Asteroid Terrestrial-impact
    Last Alert System. The sample comprises 41 SNe Ia in total, including 29 normal
    events, eight 1991T-like objects, and four peculiar subtypes, all located at redshifts
    $z < 0.085$. This paper provides a detailed overview of the ASNOS sample selection,
    data reduction, SN photometry, host-galaxy spectral energy distribution construction,
    both global and local, and SN light-curve fitting using three methods: SALT3-NIR,
    SNooPy, and BayeSN. A companion paper will present the cosmological analysis.'
