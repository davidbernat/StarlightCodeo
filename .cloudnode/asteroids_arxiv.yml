  title: Surface dynamics and geophysical environment of asteroid (3200) Phaethon
  authors:
  - name: Hangbin Jo
    affiliation: []
  - name: Masateru Ishiguro
    affiliation: []
  - name: Derek C. Richardson
    affiliation: []
  - name: Sean E. Marshall
