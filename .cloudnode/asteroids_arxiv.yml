- entry_id: http://arxiv.org/abs/2601.20648v2
  short_id: 2601.20648v2
  title: 'On the rotation of M-type asteroids: statistical evidence for higher rotation
    rates'
  authors:
  - name: Fernando Abarzuza
    affiliation: []
  - name: Noemí Pinilla-Alonso
    affiliation: []
  - name: Miquel Serra-Ricart
    affiliation: []
  - name: Santiago Iglesias Álvarez
    affiliation: []
  - name: Miguel R. Alarcon
    affiliation: []
  summary: Rotational dynamics of asteroids carry important information about their
    internal structure, collisional history and material composition. This work investigates
    whether M-type asteroids exhibit systematically higher rotation rates than the
    broader asteroid population. Using Mahlke's probabilistic taxonomy combined with
    rotation periods and diameters from the Small-Body Database, we analyse the rotational
    properties of candidate M-type asteroids and compare them with the general asteroid
    population. Because asteroid rotation strongly depends on size, the comparison
    is performed using a Monte Carlo resampling approach conditioned on the diameter
    distribution of the M-type sample. The results indicate that the M-type asteroids
    rotate, on average, faster than other asteroids of comparable size. While limitations
    remain due to sample size, heterogeneous data sources, and possible selection
    effects, the analysis provides statistical evidence that M-type asteroids are
    associated with higher rotation rates. This finding is consistent with an association
    between M-type classification and enhanced rotational properties, with potential
    implications for the internal structure and collisional evolution of small bodies
    in the Solar System.
