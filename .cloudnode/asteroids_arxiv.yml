- entry_id: http://arxiv.org/abs/2512.25044v1
  short_id: 2512.25044v1
  title: Primordial black hole dark matter from ultra-slow-roll inflation in Horndeski
    gravity
  authors:
  - name: Despina Totolou
    affiliation: []
  - name: Theodoros Papanikolaou
    affiliation: []
  - name: Emmanuel N. Saridakis
    affiliation: []
  summary: Primordial black holes (PBHs) provide a well-motivated non-particle candidate
    for dark matter, requiring an enhancement of curvature perturbations on small
    inflationary scales consistent with observational constraints. In this work we
    study PBH production within Horndeski gravity, accounting for compatibility with
    the GW170817 constraint on the gravitational-wave speed and imposing a constant
    coupling to the Ricci scalar. Under these conditions, and assuming an inflaton
    field characterised by a canonical kinetic term and a smooth potential, the inflationary
    dynamics is controlled by the cubic Horndeski interaction. We show that a suitable
    kinetic dependence of the latter enhances the effective friction acting on the
    inflaton, inducing a transient ultra-slow-roll phase embedded in an otherwise
    standard slow-roll evolution. Interestingly, this mechanism amplifies the curvature
    power spectrum on small scales without introducing any feature in the potential.
    For representative parameter choices we find that pronounced peaks in the scalar
    power spectrum are generated, leading to the formation of asteroid-mass PBHs with
    masses of order $\mathcal{O}(10^{-16})\,M_\odot$, which can account for a substantial
    fraction of the dark matter abundance, reaching $f_{\rm PBH}\simeq 0.9$, while
    satisfying current observational constraints. The resulting sharp features in
    the scalar power spectrum also imply potentially observable scalar-induced gravitational-wave
    signatures.
