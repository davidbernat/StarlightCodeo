  title: Dynamics around the binary system (65803) Didymos
  authors:
  - name: R. Machado Oliveira
    affiliation: []
  - name: O. C. Winter
    affiliation: []
  - name: R. Sfair
    affiliation: []
  - name: G. Valvano
    affiliation: []
  - name: T. S. Moura
    affiliation: []
  - name: G. Borderes-Motta
    affiliation: []
  summary: Didymos and Dimorphos are primary and secondary, respectively, asteroids
    who compose a binary system that make up the set of Near Earth Asteroids (NEAs).
    They are targets of the Double Asteroid Redirection Test (DART), the first test
    mission dedicated to study of planetary defense, for which the main goal is to
    measure the changes caused after the secondary body is hit by a kinect impactor.
    The present work intends to conduct a study, through numerical integrations, on
    the dynamics of massless particles distributed in the vicinity of the two bodies.
    An approximate shape for the primary body was considered as a model of mass concentrations
    (mascons) and the secondary was considered as a massive point. Our results show
    the location and size of stable regions, and also their lifetime.
