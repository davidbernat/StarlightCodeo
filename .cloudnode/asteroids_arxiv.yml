- entry_id: http://arxiv.org/abs/2606.07505v2
  short_id: 2606.07505v2
  title: 'Primordial Black Hole Triggered Type Ia Supernovae II: Comparison with Supernova
    Remnants and Galactic Chemical Evolution'
  authors:
  - name: Shing-Chi Leung
    affiliation: []
  - name: Seth Walther
    affiliation: []
  - name: Alexander Kusenko
    affiliation: []
  - name: Ken'ichi Nomoto
    affiliation: []
  - name: Tomoharu Suzuki
    affiliation: []
  summary: The asteroid-mass class of Primordial Black Holes (PBHs) is one of the
    candidates for the dark matter in the universe. With a mass between $4 \times
    10^{-17} < M_{\rm PBH} < 4 \times 10^{-12}~M_{\odot}$, they could be the major
    component of dark matter in the cosmic mass budget. The infall of these PBH into
    a white dwarf could be one triggering mechanism of Type Ia supernovae (SNe Ia).
    In [Leung et al, ApJ 991, 11 (2025)] (Paper I), we studied the ignition, explosion
    dynamics, radiative transfer, and post-explosion nucleosynthesis of the PBH-triggered
    SNe Ia. The diversity of the explosion models can reconcile with the empirical
    Phillips relation. In this work, we developed the PBH-triggered SN Ia models in
    various metallicity. We show that models from this channel can explain some recently
    observed SN Ia light curves and supernova remnants. We further investigate how
    these supernovae could affect the chemical evolution on the galactic scale by
    adding the new SN Ia models as a new chemical source. We examine how the observed
    chemical trends of stars can lead to constraints on the fraction of this explosion
    channel relative to the canonical binary star channel. Our models suggest that
    the PBH can be one major SN Ia channel in the early universe. We also include
    a comparative study to extract the effects of PBH-triggered SN Ia parameters on
    the actual chemical trends in the galactic chemical evolution model.
