- entry_id: http://arxiv.org/abs/2606.05344v1
  short_id: 2606.05344v1
  title: Sky-Plane Velocity Distributions of Interstellar Objects and Implications
    for Their Detection
  authors:
  - name: Cassidy E. Walker
    affiliation: []
  - name: Darryl Z. Seligman
    affiliation: []
  summary: In the past decade, three macroscopic-scale interstellar objects have been
    discovered, implying that a larger galactic population exists. In this paper,
    we investigate the possibility that the rapid sky-plane velocities of interstellar
    objects may preclude their discovery. We provide an analytic solution for the
    apparent sky motion of an object on an arbitrary orbit observed at an arbitrary
    location which (i) is more efficient and (ii) requires less overhead than the
    numerical approach. This formula is applied to evaluate the typical sky motion
    of an interstellar object as a function of its orbit and limiting magnitude/distance.
    We generate three synthetic populations of $\sim10^5$ interstellar objects within
    heliocentric spheres of radii 1.2, 3.0, and 5.0 AU, and calculate the sky motion
    for these objects when they reach a range of limiting magnitudes for multiple
    populations of interstellar asteroids and comets. The sky motions of the three
    known interstellar objects are broadly characteristic of populations with similar
    absolute magnitudes. Moreover, the intrinsically brighter objects reach detection
    magnitude thresholds at lower speeds than the dim objects, and active comets at
    even lower speeds for the same apparent magnitudes. The tails of these distributions
    extend to speeds faster than the discovery motion of 1I. Therefore, the difficulties
    associated with linking rapidly moving interstellar objects, especially those
    with intrinsically dim properties, could imply that more exist undetected traversing
    the Solar System.
