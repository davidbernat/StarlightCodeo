- entry_id: http://arxiv.org/abs/2310.18252v1
  short_id: 2310.18252v1
  title: Dynamical feasibility of (3) Juno as a parent body of the H chondrites
  authors:
  - name: John W. Noonan
    affiliation: []
  - name: Kathryn Volk
    affiliation: []
  - name: David Nesvorný
    affiliation: []
  - name: William F. Bottke
    affiliation: []
  summary: We test the hypothesis that (3) Juno is a parent body of the H chondrites
    with dynamical modeling of an asteroid-family-forming impact and comparison to
    current observational data. Using a dynamical model that includes the Yarkovsky
    force on a simulated Juno family and a simplified cosmic ray exposure age model
    we examine the expected distribution of Juno family members in both the main belt
    and near-Earth orbits over 300 Myrs and the cosmic ray exposure distribution for
    fragments exiting the main belt via the 3:1J, 5:2J, and 8:3J mean motion resonances.
    We find that the smallest modeled ($D<$10 m) family members of (3) Juno cannot
    be directly responsible for the observed H chondrite flux and that the breakup
    of larger family members creates an CRE distribution that resembles the measured
    H chondrite CRE distribution but is still unable to adequately explain the significant
    number of H chondrites with CRE ages of 6-8 Myrs. A similar model was performed
    for the asteroid (6) Hebe, another parent body candidate, and produced a CRE age
    distribution that is inconsistent with the measured H chondrite CRE ages. We also
    find from our dynamical models that we can expect $<$7 km-scale Juno family members
    in near-Earth orbits in the present day, consistent with the recent discovery
    of the shock-darkened H chondrite-like asteroid (52768) 1998 OR$_{2}$.
