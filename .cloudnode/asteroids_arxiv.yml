- entry_id: http://arxiv.org/abs/2605.14814v1
  short_id: 2605.14814v1
  title: Resonant Networks of Spin-Orbit Coupling in Ellipsoid-Ellipsoid Binary Asteroid
    Systems
  authors:
  - name: Yuanzhe Zhang
    affiliation: []
  - name: Hanlun Lei
    affiliation: []
  summary: The dynamical evolution of binary asteroid systems is deeply influenced
    by spin-orbit resonances. However, their domains of influence and mutual interactions
    remain elusive, in particular in the space where multiple resonant modes coexist.
    In such regimes, the standard single-resonance approach is intrinsically limited
    and fails to capture the true coupled dynamics. To overcome this, we develop a
    global Hamiltonian framework based on elliptic expansions of the spin-orbit coupling
    model, enabling the numerical construction of comprehensive resonant networks.
    Concentrating on a representative synchronous region that encompasses synchronous
    spin-orbit, spin-spin, spin-orbit-spin, and doubly synchronous resonances, we
    study the dynamical boundaries of different resonant modes in a systematical manner.
    Crucially, we identify a secondary resonance structure arising from the strong
    nonlinear coupling between the synchronous resonances of the primary and secondary
    asteroids. Ultimately, this study provides a reliable parameter-space atlas, which
    is helpful for predicting the long-term evolutionary pathways of binary asteroid
    systems.
