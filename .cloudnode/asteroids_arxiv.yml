- entry_id: http://arxiv.org/abs/2506.02963v1
  short_id: 2506.02963v1
  title: Preliminary analysis of a potential asteroid from the IASC campaign using
    Pan-STARRS data
  authors:
  - name: Dharanesh Palaniappan
    affiliation: []
  summary: In this paper, we present a detailed analysis of a potential asteroid candidate,
    ISP0010, using images provided by the Pan-STARRS 1 telescope as part of our participation
    in the International Astronomical Search Collaboration campaign. IASC is one of
    the leading contributors to the detection of various Near-Earth Objects and Main
    Belt asteroids. Using Astrometrica software we analysed those images and extracted
    their key parameters such as signal-to-noise ratio, right ascension, declination,
    flux, FWHM, RMS, and magnitude. Later, we analysed its trajectory, apparent angular
    speed, and error analyses using python and its libraries. In the end, we concluded
    that ISP0010 would be a potential candidate for an asteroid. However, on cross-verifying
    with the Minor Planet Centre database, we found that ISP0010 was already reported
    on February 27, 2021, and a total of 25 observations has been reported up to the
    date and currently the object has been designated as 2021 CP66. Our date of observation
    of 2021 CP66 was February 27, 2025. This study thus provides an independent confirmation
    and characterization of 2021 CP66, demonstrating the accuracy of our analysis
    and underscoring the importance of thorough database verification in asteroid
    detection.
