- entry_id: http://arxiv.org/abs/2512.16714v1
  short_id: 2512.16714v1
  title: Evidence of Possible Spectral Variability in the Patroclus-Menoetius Binary
    System
  authors:
  - name: Ian Wong
    affiliation: []
  - name: William M. Grundy
    affiliation: []
  - name: Joshua P. Emery
    affiliation: []
  - name: Richard P. Binzel
    affiliation: []
  - name: Oriel A. Humes
    affiliation: []
  - name: Simone Marchi
    affiliation: []
  - name: Pippa M. Molyneux
    affiliation: []
  - name: Keith S. Noll
    affiliation: []
  summary: We present new visible-wavelength spectroscopic observations of the Patroclus-Menoetius
    binary system in the Jupiter Trojan population. Motivated by previously published
    spectra from different instruments that showed evidence of significant longitudinal
    variability, we obtained two spectra spanning 440-680 nm at near-opposite rotational
    phases with the Gemini Multi-Object Spectrograph on the Gemini South telescope
    during the late 2024 apparition. The same solar analog was used for both observations
    to remove one source of inconsistency. We measured spectral slopes of 2.51% $\pm$
    0.05%/100 nm and 8.13% $\pm$ 0.05%/100 nm at the two different rotational phases.
    The first of these measurements was serendipitously obtained during an occultation
    of Menoetius by Patroclus. Although the statistical significance of the spectral
    slope discrepancy persists even after considering possible systematic errors stemming
    from differences in slit position angles and air masses between the asteroid and
    solar analog exposures, we consider this report of variability to be tentative.
    We briefly explore several scenarios that could explain the measured spectral
    slope variability. Additional follow-up observations are necessary to definitively
    confirm and characterize any inhomogeneities across the surface, which will have
    major implications for the 2033 flyby of Patroclus-Menoetius by the Lucy spacecraft.
