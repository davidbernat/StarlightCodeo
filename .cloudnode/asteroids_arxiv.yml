- entry_id: http://arxiv.org/abs/2503.21045v2
  short_id: 2503.21045v2
  title: 'Cometary Observations in Light-Polluted Environments: A case study of Interstellar
    Comet 2I/Borisov'
  authors:
  - name: Josep M. Trigo-Rodríguez
    affiliation: []
  - name: Damya Souami
    affiliation: []
  - name: Maria Gritsevich
    affiliation: []
  - name: Marcin Wesołowski
    affiliation: []
  - name: Gennady Borisov
    affiliation: []
  summary: 'Comets and asteroids have long captured human curiosity, and until recently,
    all documented examples belonged to our Solar System. That changed with the discovery
    of the first known interstellar object, 1I/2017 U1 (''Oumuamua), in 2017. Two
    years later, Gennady Borisov discovered a second interstellar object: 2I/Borisov.
    From its initial images, the object''s diffuse appearance hinted at its cometary
    nature. To better understand the photometric evolution of comet 2I as it traveled
    through the inner Solar System, we compiled observations using medium-sized telescopes.
    This data is crucial for gaining insights into its size and composition, as well
    as how such objects, after millions of years in interstellar space, behave when
    exposed to the Sun''s radiation. Given that 2I is the first interstellar comet
    ever observed, constraining its behavior is of great scientific interest. In this
    paper, we present photometric data gathered from observatories in Crimea and Catalonia,
    highlighting the importance of systematic photometric studies of interstellar
    objects using meter-class telescopes. Our observations showed a steady increase
    in the comet''s brightness as it approached perihelion, likely due to the slow
    sublimation of ices. Over the pre-perihelion observation period, we did not detect
    any significant changes in magnitude. The analysis of observations reveals a steady
    increase in comet brightness as it approached perihelion, likely due to the sublimation
    of ices, with no observable outbursts during the five-month pre-perihelion period.
    Additionally, we discuss the challenges in ground-based observation of comets
    posed by light pollution today, particularly in urban areas, where visual observations
    are severely limited. Using sample surface brightness measurements, we demonstrate
    the impact of light pollution and outline the importance of systematic photometric
    studies for interstellar objects.'
