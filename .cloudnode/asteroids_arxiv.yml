- entry_id: http://arxiv.org/abs/2512.14668v1
  short_id: 2512.14668v1
  title: 'From the Solar System to cosmological distances: a complete formalism for
    gravitational wave astrometry'
  authors:
  - name: Gabriele Perna
    affiliation: []
  - name: Nicola Bellomo
    affiliation: []
  - name: Vincenzo Roatti
    affiliation: []
  - name: Daniele Bertacca
    affiliation: []
  summary: The presence of a gravitational wave background (GWB) can be established
    not only via exquisitely precise pulsar timing array (PTA) measurements, but also
    via astrometric observations. Indeed, the very same background responsible for
    the delay in the arrival time of pulse causes an apparent displacement of galactic
    objects as stars and asteroids. In this work we provide a framework that allows
    to derive the displacement of sources overcoming the usually adopted ``infinite
    distance'' approximation. We also present how this formalism can be used to study
    the displacements of objects at distances comparable to the GW wavelength, as
    asteroids, and of objects with a non-trivial three-dimensional distribution, as
    stars in the Milky Way. Thus, it can be used to probe frequencies beyond PTA experiments,
    reaching the mHz GWs, also detectable by LISA. We forecast the capability of observing
    the astrometric deflection induced by a GWB evaluating the harmonic signal-to-noise
    ratio including correlations between different probes. We find an SNR greater
    than one for the relevant cases considered and as a consequence a promising Fisher
    forecast, suggesting a constraining power up to the percent level for a flat background.
