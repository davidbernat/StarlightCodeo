  title: A Mission to Demonstrate Rapid-Response Flyby Reconnaissance for Planetary
    Defense
  authors:
  - name: Nancy L. Chabot
    affiliation: []
  - name: Justin A. Atchison
    affiliation: []
  - name: Rylie Bull
    affiliation: []
  - name: Andrew S. Rivkin
