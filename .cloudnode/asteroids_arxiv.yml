- entry_id: http://arxiv.org/abs/2401.12177v2
  short_id: 2401.12177v2
  title: Control of OSIRIS-REx OTES Observations using OCAMS TAG Images
  authors:
  - name: Kris J. Becker
    affiliation: []
  - name: Kenneth L. Edmundson
    affiliation: []
  summary: As the OSIRIS-REx spacecraft descended toward the asteroid Bennu to collect
    a sample from the surface in the touch-and-go (TAG) procedure, many of the instruments
    were actively collecting observation data. We applied the process of photogrammetric
    control to accurately determine the position and attitude of 190 OCAMS MapCam
    and SamCam descent images at the time of exposure. The average image pixel resolution
    is 10cm (median is 7cm). The images were controlled to ground using simulated
    images generated from high resolution (5cm, 44cm and 88cm ground sample distance)
    shape models of Bennu. After least-squares adjustment, the root mean square (rms)
    of all image measurement residuals was 0.16 pixels. These results were applied
    to 581 OTES observations by interpolation over the updated ephemeris of the OCAMS
    MapCam and SamCam instruments using frame transformations from OCAMS to the OTES
    frame. Then, the surface intercept of the OTES field of view was recomputed by
    ray tracing the adjusted boresight look direction onto the 44cm shape model. The
    average of the adjusted OTES boresight surface intercepts differed from the a
    priori locations on the 88cm shape model by ~37cm with an uncertainty less than
    5cm.
