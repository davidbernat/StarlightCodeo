- entry_id: http://arxiv.org/abs/2510.18769v3
  short_id: 2510.18769v3
  title: Pre-perihelion Development of Interstellar Comet 3I/ATLAS
  authors:
  - name: David Jewitt
    affiliation: []
  - name: Jane Luu
    affiliation: []
  summary: We describe pre-perihelion optical observations of interstellar comet 3I/ATLAS
    taken during July - September 2025 using the Nordic Optical Telescope. Fixed aperture
    photometry of the comet is well described by a power law function of heliocentric
    distance, rH, with the exponent (``index") n = 3.8+/-0.3 across the 4.6 au to
    1.8 au distance range (phase function 0.04+/-0.02 magnitude/degree assumed). This
    indicates that the dust production rates vary in proportion to rH**(-1.8+/-0.3).
    An rH**(-2) variation is expected of a strongly volatile material, and consistent
    with independent spectroscopic observations showing that carbon dioxide is the
    primary driver of activity. The measured heliocentric index is unremarkable in
    the context of solar system comets, for which n is widely dispersed, and provides
    no basis on which to describe 3I as either dynamically old (thermally processed)
    or new (pristine). The morphology of the comet changes from a Sun-facing dust
    fan in the early 2025 July observations, to one dominated by an antisolar dust
    tail at later dates. We attribute the delayed emergence of the tail to the large
    size (effective radius 0.1 mm) and slow ejection (5 m/s) of the optically dominant
    dust particles, and their consequently sluggish response to solar radiation pressure.
    Small (micron-sized) particles may be present but not in numbers sufficient to
    dominate the scattering cross-section. Their relative depletion possibly reflects
    interparticle cohesion, which binds small particles more effectively than large
    ones. A similar preponderance of 0.1 mm grains was reported in 2I/Borisov. However,
    2I differed from 3I in having a much smaller (asteroid-like) heliocentric index,
    n = 1.9+/-0.1. Dust production rates in 3I are 180 kg/s at 2 au, compared with
    70 kg/s in 2I/Borisov at the same distance.
