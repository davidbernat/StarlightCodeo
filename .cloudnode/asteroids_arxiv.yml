- entry_id: http://arxiv.org/abs/2602.12071v1
  short_id: 2602.12071v1
  title: Thermal and Dielectric Properties of Juno's Regolith at One Millimeter Wavelength
  authors:
  - name: Jian-Yang Li
    affiliation: []
  - name: Timothy N. Titus
    affiliation: []
  - name: Arielle Moullet
    affiliation: []
  - name: Henry H. Hsieh
    affiliation: []
  summary: We present the modeling results of the thermal lightcurve of asteroid (3)
    Juno at the wavelength of $λ$ = 1.3 mm measured by the Atacama Large Millimeter-submillimeter
    Array. A thermophysical model together with a radiative transfer model suggest
    a thermal inertia of 13$\pm$10 [J m$^{-2}$ K$^{-1}$ s$^{-0.5}$], an equivalent
    emissivity of 0.8$\pm$0.1, a loss tangent of 0.4$\pm$0.3, and an index of refraction
    1.8$\pm$0.3. Based on previous laboratory measurements, the modeled index of refraction
    suggests a regolith porosity of about 45%. However, thermal inertia models using
    the material parameters of ordinary chondrite indicate a grain size of 10s $μ$m
    and require a high porosity of $\sim$90% to explain the low thermal inertia. In
    order to explain such a contradiction, we postulate that some repulsive mechanism
    might be in effect to reduce the contact of grains and therefore the thermal inertia.
    The loss tangent of Juno's regolith corrected for the modeled thermal skin depth
    is in the order of 0.5, much higher than that of the lunar regolith and indicating
    an electrical skin depth of L = 0.1 - 1.4 mm that is within the thermal skin depth.
    The shape of the rotational lightcurve of Juno in the mm wavelengths is dominated
    by its irregular shape, but rotational variations in the thermal and/or dielectric
    properties cannot be ruled out. Our results demonstrate that mm-wavelength observations
    of asteroids provide an extra dimension of constraints to the porosity and grain
    size of asteroid regolith compared to the thermal infrared observations.
