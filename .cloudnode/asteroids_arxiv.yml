  title: 'Spectro-photometry of Phobos simulants: II. Effects of porosity'
  authors:
  - name: Antonin Wargnier
    affiliation: []
  - name: Olivier Poch
    affiliation: []
  - name: Giovanni Poggiali
    affiliation: []
  - name: Thomas Gautier
    affiliation: []
  - name: Alain Doressoundiram
    affiliation: []
  - name: Pierre Beck
    affiliation: []
  - name: Tomoki Nakamura
    affiliation: []
  - name: Hideaki Miyamoto
    affiliation: []
  - name: Shingo Kameda
    affiliation: []
  - name: Nathalie Ruscassier
    affiliation: []
  - name: Arnaud Buch
    affiliation: []
  - name: Pedro H. Hasselmann
    affiliation: []
  - name: Robin Sultana
    affiliation: []
  - name: Eric Quirico
    affiliation: []
  - name: Sonia Fornasier
    affiliation: []
  - name: Antonella Barucci
    affiliation: []
  summary: Surface porosity has been found to be an important property for small bodies.
    Some asteroids and comets can exhibit an extremely high surface porosity in the
    first millimeter layer. This layer may be produced by various processes and maintained
    by the lack of an atmosphere. However, the influence of porosity on the spectro-photometric
    properties of small body surfaces is not yet fully understood. In this study,
    we looked into the effect of porosity on the spectro-photometric properties of
    Phobos regolith spectroscopic simulants; created by mixing the simulants with
    ultra-pure water, producing ice-dust particles, and then sublimating the water.
    The reflectance spectroscopic properties in the visible and near-infrared (0.5-4.2
    $μ$m) show no strong variations between the porous and compact samples. However,
    one simulant exhibits a bluing of the slope after increasing porosity, providing
    possible insights into the differences between the blue and red units observed
    on Phobos. In the mid-infrared range, a contrast increase of the 10-$μ$m emissivity
    plateau due to silicates is observed. Photometry reveals a modification in the
    phase reddening behavior between the compact powder and the sublimation residue
    for both simulants. However, the observed behavior is different between the simulants,
    suggesting that the phase reddening may be dependent on the composition of the
    simulants. The phase curve also appears to be modified by the addition of porosity,
    with a higher contribution of forward scattering observed for the sublimation
    residue. The derivation of the Hapke parameters indicates an increase in roughness
    for the porous sample, but no significant modification of the opposition effect.
    This study aims to provide new insights into the understanding of porosity by
    using two Phobos simulants in the context of the upcoming JAXA/Martian Moons eXploration
    mission.
