- entry_id: http://arxiv.org/abs/2511.08837v1
  short_id: 2511.08837v1
  title: Incorporating the nonlinearity index into adaptive-mesh sequential convex
    optimization for minimum-fuel low-thrust trajectory design
  authors:
  - name: Saeid Tafazzol
    affiliation: []
  - name: Ehsan Taheri
    affiliation: []
  summary: Successive convex programming (SCP) is a powerful class of direct optimization
    methods, known for its polynomial complexity and computational efficiency, making
    it particularly suitable for autonomous applications. Direct methods are also
    referred to as ``discretize-then-optimize'' with discretization being a fundamental
    solution step. A key step in all practical direct methods is mesh refinement,
    which aims to refine the solution resolution by enhancing the precision and quality
    of discretization techniques through strategic distribution and placement of mesh/grid
    points. We propose a novel method to enhance adaptive mesh refinement stability
    by integrating it with a nonlinearity-index-based trust-region strategy within
    the SCP framework for spacecraft trajectory design. The effectiveness of the proposed
    method is demonstrated through solving minimum-fuel, low-thrust missions, including
    a benchmark Earth-to-Asteroid rendezvous and an Earth-Moon L2 Halo-to-Halo transfer
    using the Circular Restricted Three-Body (CR3BP) model.
