  title: Astrometry, orbit determination, and thermal inertia of the Tianwen-2 target
    asteroid (469219) Kamo`oalewa
  authors:
  - name: Marco Fenucci
    affiliation: []
  - name: Bojan Novaković
    affiliation: []
  - name: Pengfei Zhang
