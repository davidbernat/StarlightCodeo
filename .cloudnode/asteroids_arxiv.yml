  title: Physical Properties of Type II Supernovae Inferred from ZTF and ATLAS Photometric
    Data
  authors:
  - name: Javier Silva-Farfán
    affiliation: []
  - name: Francisco Förster
    affiliation: []
  - name: Takashi J. Moriya
    affiliation: []
  - name: L. Hernández-García
    affiliation: []
  - name: A. M. Muñoz Arancibia
    affiliation: []
  - name: P. Sánchez-Sáez
    affiliation: []
  - name: Joseph P. Anderson
    affiliation: []
  - name: John L. Tonry
    affiliation: []
  - name: Alejandro Clocchiatti
    affiliation: []
  summary: We report an analysis of a sample of 186 spectroscopically confirmed Type
    II supernova (SN) light curves (LCs) obtained from a combination of Zwicky Transient
    Facility (ZTF) and Asteroid Terrestrial-impact Last Alert System (ATLAS) observations.
    We implement a method to infer physical parameters from these LCs using hydrodynamic
    models that take into account the progenitor mass, the explosion energy, and the
    presence of circumstellar matter (CSM). The CSM is modelled via the mass loss
    rate, wind acceleration at the surface of the progenitor star with a $β$ velocity
    law, and the CSM radius. We also infer the time of explosion, attenuation (A$_V$),
    and the redshift for each SN. Our results favor low-mass progenitor stars (M$_{ZAMS}$\,$<$14\,$M_\odot$)
    with a dense CSM ($\dot{M}$ $>$ 10$^{-3}$ [M$_\odot$ yr$^{-1}$], a CSM radius
    of $\sim$ 10$^{15}$ cm, and $β$ $>$ 2). Additionally, we find that the redshift
    inferred from the supernova LCs is significantly more accurate than that inferred
    using the host galaxy photometric redshift, suggesting that this method could
    be used to infer more accurate host galaxy redshifts from large samples of SNe
    II in the LSST era. Lastly, we compare our results with similar works from the
    literature.
