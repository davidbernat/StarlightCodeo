    affiliation: []
  - name: Angela M. Stickle
    affiliation: []
  - name: Evan J. Smith
    affiliation: []
  - name: Joseph J. Linden
    affiliation: []
  - name: Benjamin F. Villac
    affiliation: []
  - name: Jodi R. Berdis
    affiliation: []
  - name: Dawn M. Graninger
    affiliation: []
  - name: Sarah Hefter
    affiliation: []
  summary: International and U.S. strategies and protocols have identified the need
    to develop rapid-response spacecraft reconnaissance capabilities as a priority
    to advance planetary defense readiness. A space-based reconnaissance response
    is recommended for potential impactors as small as 50 m, making these small objects
    the most likely to trigger a space-based response and the ones that drive the
    reconnaissance capabilities needed. Even following the successful completion of
    the NEO Surveyor mission and Rubin Observatory survey efforts, roughly half of
    the 50-m near-Earth object (NEO) population will remain undiscovered. As a result,
    50-m impactors may not be found with long warning times, and a rapid-response
    flyby mission may be the only reconnaissance possible. To develop a robust flyby
    reconnaissance capability for planetary defense, four major requirements are defined
    for a demonstration mission. 1. Enable a flyby of greater than 90 percent of the
    potential asteroid threat population. 2. Demonstrate the flyby reconnaissance
    for a 50 m NEO. 3. Obtain the information needed to determine if and where it
    would impact the Earth. 4. Determine key properties of the asteroid to inform
    decision makers. As commonly noted in the planetary defense community, in planetary
    defense, you do not pick the asteroid, the asteroid picks you. Thus, a planetary
    defense flyby reconnaissance demonstration mission is not about just flying by
    an asteroid, but rather it is about developing a robust capability for the objects
    that are most likely to require a short-warning-time, space-based response.
