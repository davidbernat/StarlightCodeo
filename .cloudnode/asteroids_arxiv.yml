  title: 'The Mini-SiTian Array: Light Curves Analysis of Asteroids'
  authors:
  - name: Zhaoxing Liu
    affiliation: []
  - name: Jian Gao
    affiliation: []
  - name: Hongrui Gu
    affiliation: []
  - name: Yang Huang
    affiliation: []
  - name: Shaoming Hu
    affiliation: []
  - name: Hu Zou
    affiliation: []
  - name: Keyu Xing
    affiliation: []
  - name: Hao Huang
    affiliation: []
  - name: Zehao Zhang
    affiliation: []
  summary: The SiTian project, with its vast field of view, will become an ideal platform
    for asteroid scientific research. In this study, we develop a pipeline to analyze
    the photometry of asteroids and derive their periods from the data collected by
    the SiTian pathfinder project Mini-SiTian (MST). The pipeline is applied to the
    MST f02 region, a MST test region with a sky area of $2.29^{\circ} \times 1.53^{\circ}$.
    Rotation periods of 22 asteroids are derived by the obtained light curves analysis.
    Among them, there are 8 asteroids available in the Asteroid Lightcurve Photometry
    Database (ALCDEF), and 6 of them with more photometric points ($>$200) have similar
    period parameters as the ones in ALCDEF. Additionally, the periods for 14 of these
    asteroids are newly obtained and are not listed in ALCDEF. This study demonstrates
    the feasibility of asteroid photometric research by the SiTian project. It shows
    that future observations from the SiTian project will provide even more photometry
    of asteroids, significantly increasing the number of available light curves. The
    potential vast photometric data of asteroids will help us to further understand
    the physics of asteroids, their material composition, and the formation and evolution
    of the solar system.
