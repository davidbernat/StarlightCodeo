  title: 'Direct $N$-body simulations of satellite formation around small asteroids:
    insights from DART''s encounter with the Didymos system'
  authors:
  - name: Harrison F. Agrusa
    affiliation: []
  - name: Yun Zhang
    affiliation: []
  - name: Derek C. Richardson
    affiliation: []
  - name: Petr Pravec
