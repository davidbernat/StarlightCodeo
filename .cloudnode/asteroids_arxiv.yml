  title: An Effective Theory for Higgs Inflation
  authors:
  - name: A. Tronconi
    affiliation: []
  - name: G. Venturi
    affiliation: []
  summary: The generation of large curvature perturbations associated with the production
    of primordial black holes is studied in the context of a Higgs inflaton. To enable
    this amplification, we consider an inflationary model in which the tree-level
    action for gravity and the Standard Model Higgs is modified by quantum corrections,
    described by a series of higher-dimension operators. Finally within a minimal
    EFT framework, we present two viable models in which the spectrum of curvature
    perturbations generated by the Higgs field is consistent with CMB observations
    and can lead to the formation of primordial black holes in the asteroid mass range,
    potentially accounting for the entirety of dark matter.
