  title: 'Water in protoplanetary disks with JWST-MIRI: spectral excitation atlas
    and radial distribution from temperature diagnostic diagrams and Doppler mapping'
  authors:
  - name: Andrea Banzatti
    affiliation: []
  - name: Colette Salyk
    affiliation: []
  - name: Klaus M. Pontoppidan
    affiliation: []
  - name: John Carr
