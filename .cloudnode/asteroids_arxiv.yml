- entry_id: http://arxiv.org/abs/2507.22491v1
  short_id: 2507.22491v1
  title: 'Exploring Impact Vapor Plume Reactions from Asteroidal Impacts: Monte Carlo
    Simulations and Implications for Biomolecules Synthesis'
  authors:
  - name: Yoko Ochiai
    affiliation: []
  - name: Shigeru Ida
    affiliation: []
  - name: Daigo Shoji
    affiliation: []
  summary: During a hypervelocity impact, both the impactor and target materials evaporate,
    generating an impact vapor plume with temperatures reaching several thousand K.
    As the plume cools through adiabatic expansion, chemical reactions are predicted
    to quench, leading to a non-equilibrium composition. However, it is still unclear
    how chemical reactions proceed during the cooling impact vapor plume and lead
    to the synthesis of organic molecules. In this study, to investigate the evolution
    of chemical composition within impact vapor plumes, we conducted a Monte Carlo
    chemical reaction simulation for complex organic synthesis, developed in our previous
    work. Our model does not rely on a predefined reaction network; instead, it utilizes
    imposed conditions for chemical changes and an approximate method for calculating
    reaction rates suited to our objectives. Additionally, we developed a new approach
    to couple these chemical reaction calculations with the rapid temperature and
    pressure decay in the vapor plume. Results show diverse organic molecule production
    depending on the impactor materials assumed in this study. These products include
    important precursors to biomolecules such as amino acids, sugars, and nucleobases.
    On the other hand, for all impactor compositions, the abundance of biomolecules
    themselves remains extremely low throughout the reactions from an impact to quenching.
    Therefore, our results suggest that biomolecules are not directly produced in
    impact vapor plumes but rather synthesized through reactions of these precursor
    molecules in aqueous solutions, following H2O condensation as the vapor plume
    cools. Many of the detected organic compounds, including the precursor molecules
    such as imine compounds and formamide, are not included in the reaction networks
    of previous kinetic model simulations, and their formation has not been predicted.
