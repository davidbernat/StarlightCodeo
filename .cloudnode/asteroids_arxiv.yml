- entry_id: http://arxiv.org/abs/2605.13042v1
  short_id: 2605.13042v1
  title: 'The Gravitational Spectral Radio Forest: A Signature of Primordial Black
    Holes'
  authors:
  - name: P. George Christopher
    affiliation:
    - IIT Bombay
  - name: K. Hari
    affiliation:
    - IIT Bombay
  - name: S. Shankaranarayanan
    affiliation:
    - IIT Bombay
  summary: We propose a novel gravitational signature to detect Primordial Black Hole
    (PBH) dark matter by treating interstellar hydrogen as a quantum sensor for spacetime
    curvature. Focusing on H II regions, we demonstrate that the Riemann tidal tensor
    of an \emph{asteroid-mass} PBH induces a symmetric splitting of the $2P_{3/2}$
    state in bound hydrogen atoms. This relativistic effect redistributes $9.9\,\mathrm{GHz}$
    absorption line into a gravitational spectral radio forest with a bandwidth $\sim
    2\,\mathrm{GHz}$. By accounting for active accretion of Hydrogen atoms and the
    resulting density-squared emission measure within the Bondi radius, we find a
    relatively enhanced absorption spectrum. This feature presents a concrete, high-contrast
    target for upcoming radio-surveys to constrain PBH populations in the dark matter
    sector.
