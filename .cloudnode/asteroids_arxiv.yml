- entry_id: http://arxiv.org/abs/2404.09258v2
  short_id: 2404.09258v2
  title: On the dynamical evolution of the asteroid belt in a massive star-neutron
    star binary
  authors:
  - name: Chen Deng
    affiliation: []
  - name: Yong-Feng Huang
    affiliation: []
  - name: Chen Du
    affiliation: []
  - name: Pei Wang
    affiliation: []
  - name: Zi-Gao Dai
    affiliation: []
  summary: Some fast radio bursts (FRBs) exhibit repetitive behaviors and their origins
    remain enigmatic. It has been argued that repeating FRBs could be produced by
    the interaction between a neutron star and an asteroid belt. Here we consider
    the systems in which an asteroid belt dwells around a massive star, while a neutron
    star, as a companion of the massive star, interacts with the belt through gravitational
    force. Various orbital configurations are assumed for the system. Direct N-body
    simulations are performed to investigate the dynamical evolution of the asteroids
    belt. It is found that a larger orbital eccentricity of the neutron star will
    destroy the belt more quickly, with a large number of asteroids being scattered
    out of the system. A low inclination not only suppresses the collisions but also
    inhibits the ejection rate at early stages. However, highly inclined systems may
    undergo strong oscillations, resulting in the Kozai--Lidov instabilities. Among
    the various configurations, a clear periodicity is observed in the collision events
    for the case with an orbital eccentricity of 0.7 and mutual inclination of $0^{\circ}$.
    It is found that such a periodicity can be sustained for at least 8 neutron star
    orbital periods, supporting this mechanism as a possible explanation for periodically
    repeating FRBs. Our studies also suggest that the active stage of these kinds
    of FRB sources should be limited, since the asteroid belt would finally be destroyed
    by the neutron star after multiple passages.
