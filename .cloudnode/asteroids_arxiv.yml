- entry_id: http://arxiv.org/abs/2311.15026v1
  short_id: 2311.15026v1
  title: Impact craters formed by spinning granular projectiles
  authors:
  - name: Douglas Daniel de Carvalho
    affiliation: []
  - name: Nicolao Cerqueira Lima
    affiliation: []
  - name: Erick de Moraes Franklin
    affiliation: []
  summary: Craters formed by the impact of agglomerated materials are commonly observed
    in nature, such as asteroids colliding with planets and moons. In this paper,
    we investigate how the projectile spin and cohesion lead to different crater shapes.
    For that, we carried out DEM (discrete element method) computations of spinning
    granular projectiles impacting onto cohesionless grains, for different bonding
    stresses, initial spins and initial heights. We found that, as the bonding stresses
    decrease and the initial spin increases, the projectile's grains spread farther
    from the collision point, and, in consequence, the crater shape becomes flatter,
    with peaks around the rim and in the center of craters. Our results shed light
    on the dispersion of the projectile's material and the different shapes of craters
    found on Earth and other planetary environments.
