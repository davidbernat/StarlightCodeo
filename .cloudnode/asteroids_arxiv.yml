  - name: Shude Mao
    affiliation: []
  - name: Weicheng Zang
    affiliation: []
  - name: Dong-Jin Kim
    affiliation: []
  summary: Since 2015, the Korea Microlensing Telescope Network (KMTNet) has conducted
    high-cadence, near-continuous observations of the Galactic bulge for nearly nine
    months each year from three sites in Chile, South Africa, and Australia, and its
    wide field of view provides a unique opportunity to extract asteroid lightcurves
    from archival survey data. In this work, we performed photometric measurements
    of bright asteroids ($V< 20$~mag) identified within a one-square-degree field
    during the 2018 KMTNet bulge season. We derived reliable rotation periods for
    96 asteroids, including 84 objects without previously published lightcurves. The
    reliable spin-rates of the asteroids in our sample are broadly consistent with
    those reported in the Asteroid Lightcurve Database. This archival mining approach
    can be readily extended to a much larger KMTNet footprint, and the existing $\sim12$~deg$^2$
    high-cadence KMTNet dataset has the potential to yield reliable rotation periods
    (U $\geq 2+$) for more than 5,500 asteroids, substantially expanding the current
    database of asteroid rotational properties.
