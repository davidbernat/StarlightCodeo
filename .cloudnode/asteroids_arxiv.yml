  title: A Python client for the ATLAS API
  authors:
  - name: Heloise F. Stevance
    affiliation: []
  - name: Jack Leland
    affiliation: []
  - name: Ken W. Smith
    affiliation: []
  summary: The Asteroid Terrestrial-impact Last Alert System (ATLAS) is an all-sky
    optical sky survey with a cadence of 24 to 48 hours and the ATLAS Transient Server
    processes the alert stream to enable the discovery and follow-up of extra-galactic
    transients. The data from the ATLAS server can be accessed through a REST API,
    which has allowed the development of bots that need direct access to the data
    to help rank alerts and trigger followup observations of promising targets. Here
    we present the python client we have developed for the ATLAS API to help connect
    bots and scientists to our data.
