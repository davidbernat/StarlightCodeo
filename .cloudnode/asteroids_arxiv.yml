- entry_id: http://arxiv.org/abs/2507.20594v2
  short_id: 2507.20594v2
  title: 'Thick Disks around White Dwarfs viewed ''Edge-off'': Effects on Transit
    Properties and Infrared Excess'
  authors:
  - name: Soumyadeep Bhattacharjee
    affiliation: []
  summary: 'A significant fraction of white dwarfs (WDs) host dust/debris disks formed
    from the tidal disruption of asteroids and planetesimals. Several studies indicate
    that the disks can attain significant vertical heights through collisional cascade.
    In this work I model the effects of geometrically thick disks on two primary observables:
    photometric transits by the disk when viewed at high inclinations and infrared
    dust emission. Specifically, I consider disks with a Gaussian vertical profile
    with scale heights comparable to or larger than the WD radius. I primarily focus
    on inclinations $\gtrsim$$87$ degrees (`edge-off''), which can produce significant
    transits with moderate disk thickness. Both the transit depth and color become
    strong functions of inclination, and I explore their dependence on the disk parameters.
    I show that such a setup can produce the recently discovered reddening in the
    transit of WD J1013$-$0427. Moving to infrared emission, I show that the contribution
    from the heated inner rim can be substantial even at high inclinations. It can
    potentially explain the infrared excess observed in two transiting debris systems,
    WD 1145$+$017 and WD 1232$+$563, consistently with the transits. The other two
    important radiation components are the optically thin dust emission from the disk''s
    outer layers and the optically thick emission from the backwarmed disk interior.
    Extending my analysis to G29-38 shows that the former can adequately produce the
    silicate emission feature with optically thin dust mass of $>$$10^{17}$ grams.
    The inner dense layers, on the other hand, allow the disk to contain orders of
    magnitude larger net dust mass. Overall, I show that thick disk effects can be
    significant and should be taken into account. I motivate detailed studies to quantify
    the effects accurately.'
  comment: '14+3 (main+appendix) pages, 14 figures. Updates: Updated optically thin
