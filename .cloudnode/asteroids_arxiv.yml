- entry_id: http://arxiv.org/abs/2310.09898v2
  short_id: 2310.09898v2
  title: Monochromatic Mass Spectrum of Primordial Black Holes
  authors:
  - name: Matthew Kleban
    affiliation: []
  - name: Cameron E. Norton
    affiliation: []
  summary: During slow-roll inflation, non-perturbative transitions can produce bubbles
    of metastable vacuum. These bubbles expand exponentially during inflation to super-horizon
    size, and later collapse into black holes when the expansion of the universe is
    decelerating. Estimating the rate for these transitions during a time-dependent
    slow-roll phase requires the development of new techniques. Our results show that
    in a broad class of models, the inflationary fine-tuning that gives rise to small
    density fluctuations causes these bubbles to appear only during a time interval
    that is short compared to the inflationary Hubble time. As a result, despite the
    fact that the final mass of the black hole is exponentially sensitive to the moment
    bubbles form during inflation, the resulting primordial black hole mass spectrum
    can be nearly monochromatic. If the transition occurs near the middle of inflation,
    the mass can fall in the "asteroid" range $10^{17}-10^{22}$ g in which all known
    observations are compatible with black holes comprising 100% of dark matter.
