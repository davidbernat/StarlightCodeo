    affiliation: []
  - name: C. W. V. Wolner
    affiliation: []
  - name: D. N. DellaGiustina
    affiliation: []
  - name: H. C. Connolly,
    affiliation: []
  - name: D. S. Lauretta
    affiliation: []
  summary: Owing to the extremely low gravity of small near-Earth asteroids (NEAs),
    it has been assumed that impact-generated rock fragments escape into space and
    thus do not contribute to the accumulation of regolith. However, centimeter-sized
    stones returned from the small NEA Bennu by NASA's OSIRIS-REx mission exhibit
    impact craters up to a few millimeters wide, implying that impact fragments and
    impact-processed rocks are retained despite the microgravity environment. To understand
    how, we combined detailed physical analysis of Bennu samples, laboratory experiments
    of impacts into simulant rocks, and 3D numerical simulations of disruptive impacts
    into boulders. We find that the majority (85% by mass) of impact fragments eject
    toward and penetrate the asteroid's weak, porous surface, leading to their retention.
    In addition, crater depth-to-diameter ratios (d/D) suggest that the Bennu samples
    (median crater d/D = 0.36 $\pm$ 0.1) are structurally representative of the asteroid's
    large boulders (median crater d/D = 0.33 $\pm$ 0.08, measured previously). Our
    analyses indicate that most of Bennu's surface rocks (those with diameters $\lesssim$
    20 m) could be products of in situ collisional disruption. This impact-driven
    mechanism of regolith production likely occurs on other small NEAs with highly
    porous surfaces.
