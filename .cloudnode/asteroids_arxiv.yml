- entry_id: http://arxiv.org/abs/2601.21554v1
  short_id: 2601.21554v1
  title: The dynamically hazardous asteroid 2025 TV$_{10}$. A new co-orbital asteroid
    of Venus
  authors:
  - name: V. Carruba
    affiliation: []
  - name: R. Sfair
    affiliation: []
  - name: O. C. Winter
    affiliation: []
  summary: Twenty co-orbital asteroids of Venus are currently known, several of which
    may evolve into potentially hazardous asteroids (PHAs) over timescales of thousands
    of years. We report the identification and first dynamical characterization of
    2025 TV$_{10}$, a newly discovered Venus co-orbital asteroid, and assess its potential
    collisional hazard to Earth. We performed numerical simulations of a large number
    of asteroid clones, and we studied their close encounters with Venus and Earth.
    The asteroid may leave its co-orbital orbit on timescales of 1200 yr. The orbit
    of 2025 TV$_{10}$ is one of the closest of the absolute minimum of the "minimum
    orbital intersection distance" (MOID) with Earth for the Venus co-orbital asteroids
    known to date. Owing to its orbital parameters, 2025 TV$_{10}$ represents one
    of the most dynamically hazardous members of the Venus co-orbital population identified
    to date. Its faint magnitude and restricted observability windows make future
    observations challenging but essential for constraining its orbit.
