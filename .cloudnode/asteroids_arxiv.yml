- entry_id: http://arxiv.org/abs/2503.15901v1
  short_id: 2503.15901v1
  title: A multi-model approach using XAI and anomaly detection to predict asteroid
    hazards
  authors:
  - name: Amit Kumar Mondal
    affiliation: []
  - name: Nafisha Aslam
    affiliation: []
  - name: Prasenjit Maji
    affiliation: []
  - name: Hemanta Kumar Mondal
    affiliation: []
  summary: The potential for catastrophic collision makes near-Earth asteroids (NEAs)
    a serious concern. Planetary defense depends on accurately classifying potentially
    hazardous asteroids (PHAs), however the complexity of the data hampers conventional
    techniques. This work offers a sophisticated method for accurately predicting
    hazards by combining machine learning, deep learning, explainable AI (XAI), and
    anomaly detection. Our approach extracts essential parameters like size, velocity,
    and trajectory from historical and real-time asteroid data. A hybrid algorithm
    improves prediction accuracy by combining several cutting-edge models. A forecasting
    module predicts future asteroid behavior, and Monte Carlo simulations evaluate
    the likelihood of collisions. Timely mitigation is made possible by a real-time
    alarm system that notifies worldwide monitoring stations. This technique enhances
    planetary defense efforts by combining real-time alarms with sophisticated predictive
    modeling.
