- entry_id: http://arxiv.org/abs/2605.30395v1
  short_id: 2605.30395v1
  title: Experiments on Settling of Granular and Cohesive Material in Low Gravity
  authors:
  - name: Matthias Keulen
    affiliation: []
  - name: Timo Giese
    affiliation: []
  - name: Kolja Joeris
    affiliation: []
  - name: Jonathan Kollmer
    affiliation: []
  summary: The regolith of rocky bodies, such as planets or asteroids, generally settles
    under gravity conditions different from those of Earth. The behavior of granular
    material is not easily scalable for different gravities. To predict these highly
    complex systems where cohesive inter particle forces can be comparable to gravitational
    forces, we need simulations and experiments. We did experiments on settling of
    three different granular samples in varying reduced gravities and examined their
    packing densities. We used a high precision linear stage to artificially induce
    reduced gravities inside the zero $g$ environment provided by the ZARM drop tower
    and observe the settling of our samples. The three samples were fine basalt with
    particle diameters of $1\text{-}200\,μ$m, coarse basalt with $2\text{-}5\,$mm
    and glass beads with $750\text{-}1000\,μ$m. The artificial gravities were $150,\,250,\,500,\,750$
    and $1000\,$mm/s$^2$ and therefore ranged from large asteroid gravity to almost
    moon gravity. We saw the granular samples have higher volumes in lower gravities
    and therefore lower packing densities, we also saw the fine basalt be the most
    sensitive to changes in gravity, up to $+19.6\,\%$ in volume for $250\,$mm/s$^2$,
    followed by the coarse basalt particles, up to $+12.2\,\%$ for $150\,$mm/s$^2$
    and the glass beads packing density being the least sensitive to changes in gravity,
    up to $+4.25\,\%$ for $250\,$mm/s$^2$. With these experiments we show change in
    volume is not solely dependent of particle size but also roughness and uniformity,
    we provide real life experimental data to validate theoretical works and highlight
    the role of cohesive forces in low gravity environments.
