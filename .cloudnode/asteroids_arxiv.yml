  title: NEO Colors from The Mission Accessible Near-Earth Object Survey (MANOS)
  authors:
  - name: Nicholas Moskovitz
    affiliation: []
  - name: Theodore Kareta
    affiliation: []
  - name: Samantha Hemmelgarn
