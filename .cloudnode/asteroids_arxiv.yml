  title: Primordial Black Holes Formed during Magneto-Hydrodynamic Turbulence in The
    Early Universe as Dominant Part of Dark Matter
  authors:
  - name: Jia-xiang Liang
    affiliation: []
  - name: Peng Xu
    affiliation: []
  - name: Ming-hui Du
    affiliation: []
  - name: Zi-ren Luo
    affiliation: []
  summary: Primordial black holes (PBHs) offer a compelling candidate for dark matter.
    The production of PBHs through well-tested and accepted physical processes is
    highly worthy of investigation. This work highlights the role of turbulences in
    the very early universe in sustaining intense and persistent fluctuations in energy
    or mass density, which could provide a natural mechanism for PBH formation in
    the primordial universe. We analyze the mass range and abundance of PBHs produced
    in the magnetohydrodynamic turbulence induced by the electroweak phase transition.
    Remarkably, we find that the mass range of the produced PBHs falls within the
    most viable ``asteroid mass'' window from the present-day observations, and within
    natural parameter regions their abundance can be sufficiently large. These findings
    suggest that PBHs produced during magnetohydrodynamic turbulence in the very early
    universe may comprise a dominant part of dark matter.
