  title: Numerical investigations of the orbital dynamics around a synchronous binary
    system of asteroids
  authors:
  - name: L. B. T. Santos
    affiliation: []
  - name: Allan Kardec de Almeida
    affiliation: []
  - name: P. A. Sousa-Silva
    affiliation: []
  - name: M. O. Terra
    affiliation: []
  - name: D. M. Sanchez
    affiliation: []
  - name: S. Aljbaae
    affiliation: []
  - name: A. F. B. A. Prado
    affiliation: []
  - name: F Monteiro
    affiliation: []
  summary: In this article, equilibrium points and families of periodic orbits in
    the vicinity of the collinear equilibrium points of a binary asteroid system are
    investigated with respect to the angular velocity of the secondary body, the mass
    ratio of the system and the size of the secondary. We assume that the gravitational
    fields of the bodies are modeled assuming the primary as a mass point and the
    secondary as a rotating mass dipole. This model allows to compute families of
    planar and halo periodic orbits that emanate from the equilibrium points $ L_1
    $ and $L_2$. The stability and bifurcations of these families are analyzed and
    the results are compared with the results obtained with the Restricted Three-Body
    Problem (RTBP). The results provide an overview of the dynamical behavior in the
    vicinity of a binary asteroid system.
