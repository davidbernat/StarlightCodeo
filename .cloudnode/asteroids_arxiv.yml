    affiliation: []
  - name: Anirudh Chhabra
    affiliation: []
  - name: Ricardo Torres
    affiliation: []
  - name: Andrew Jones
    affiliation: []
  summary: "Asteroids preserve the solar system's earliest history and pose real threats\
    \ to Earth. Strengthening the UK's capabilities to detect, track, and characterise\
    \ Near-Earth Objects (NEOs) is vital for national security, world-leading planetary\
    \ science, and future space resource opportunities. The UK has been an influential\
    \ contributor to planetary defence, from establishing the UK NEO Task Force in\
    \ 2000 to active roles in the International Asteroid Warning Network (IAWN), the\
    \ Space Mission Planning Advisory Group (SMPAG), and the development of the National\
    \ Space Operations Centre (NSpOC). UK scientists contribute to major international\
    \ asteroid missions including NASA's OSIRIS-REx, DART, Lucy, and Psyche; ESA's\
    \ Hera and RAMSES; and JAXA's Hayabusa2 and MMX. However, the UK currently lacks\
    \ dedicated funding streams to deliver asteroid missions. Ground-based observations\
    \ of asteroids cannot definitively determine the physical characteristics of these\
    \ objects, which are crucial for impact-risk assessment, deflection strategy,\
    \ and resource evaluation.\n  This white paper proposes UK leadership in autonomous,\
    \ low-cost asteroid-rendezvous missions, leveraging technologies developed through\
    \ the UKRI-funded REMORA programme. We outline four priorities: (1) strengthen\
    \ NEO detection capabilities; (2) reinforce UK participation in international\
    \ planetary defence missions; (3) develop autonomous rendezvous and in-situ characterisation\
    \ technologies; and (4) enable the future space resource economy through targeted\
    \ asteroid exploration. Together, these actions position the UK to lead rapid,\
    \ affordable deep-space missions and secure a long-term strategic advantage."
