  title: A Radio Science Experiment for the Ramses Mission to Apophis
  authors:
  - name: Riccardo Lasagni Manghi
    affiliation: []
  - name: Marco Zannoni
    affiliation: []
  - name: Edoardo Gramigna
    affiliation: []
  - name: Paolo Tortora
