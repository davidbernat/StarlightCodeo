    affiliation: []
  - name: D. Baklouti
    affiliation: []
  - name: M. Combi
    affiliation: []
  - name: S. A. Fuselier
    affiliation: []
  - name: J. De Keyser
    affiliation: []
  - name: D. R. Müller
    affiliation: []
  - name: M. Rubin
    affiliation: []
  - name: S. F. Wampfler
    affiliation: []
  summary: The puzzling complexity of terrestrial biomolecules is driving the search
    for complex organic molecules in the Interstellar Medium (ISM) and serves as a
    motivation for many in situ studies of reservoirs of extraterrestrial organics
    from meteorites and interplanetary dust particles (IDPs) to comets and asteroids.
    Comet 67P/Churyumov-Gerasimenko (67P) -- the best-studied comet to date -- has
    been visited and accompanied for two years by the European Space Agency's Rosetta
    spacecraft. Around 67P's perihelion and under dusty conditions, the high-resolution
    mass spectrometer on board provided a spectacular glimpse into this comet's chemical
    complexity. For this work, we analyzed in unprecedented detail the O-bearing organic
    volatiles. In a comparison of 67P's inventory to molecules detected in the ISM,
    in other comets, and in Soluble Organic Matter (SOM) extracted from the Murchison
    meteorite, we also highlight the (pre)biotic relevance of different chemical groups
    of species. We report first evidence for abundant extraterrestrial O-bearing heterocycles
    (with abundances relative to methanol often on the order of 10% with a relative
    error margin of 30-50%) and various representatives of other molecule classes
    such as carboxylic acids and esters, aldehydes, ketones, and alcohols. Like with
    the pure hydrocarbons, some hydrogenated forms seem to be dominant over their
    dehydrogenated counterparts. An interesting example is tetrahydrofuran (THF) as
    it might be a more promising candidate for searches in the ISM than the long-sought
    furan itself. Our findings not only support and guide future efforts to investigate
    the origins of chemical complexity in space, but also they strongly encourage
    studies of, e.g., the ratios of unbranched vs. branched and hydrogenated vs. dehydrogenated
    species in astrophysical ice analogs in the laboratory as well as by modeling.
