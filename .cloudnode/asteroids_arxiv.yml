- entry_id: http://arxiv.org/abs/2603.03479v1
  short_id: 2603.03479v1
  title: Multidisciplinary Design Optimization of a Low-Thrust Asteroid Orbit Insertion
    Using Electric Propulsion
  authors:
  - name: Yacob Medhin
    affiliation: []
  - name: Tushar Sial
    affiliation: []
  - name: Simone Servadio
    affiliation: []
  summary: Low-thrust electric propulsion missions are often designed under simplifying
    assumptions such as constant thrust or fixed specific impulse, neglecting the
    strong coupling between trajectory dynamics, spacecraft power availability, and
    propulsion performance. In deep-space environments with reduced solar irradiance,
    these assumptions can lead to suboptimal or infeasible designs, underscoring the
    need to simultaneously optimize the trajectory and power subsystem. This paper
    presents a multidisciplinary design optimization (MDO) framework for the simultaneous
    design of low-thrust trajectories and spacecraft power systems, with explicit
    coupling to electric propulsion performance. The framework incorporates a high-fidelity
    variable-specific impulse model of the SPT-140 Hall thruster, in which thrust
    and efficiency are directly constrained by time-varying solar power availability
    and solar array degradation, rather than treated as fixed parameters. The coupled
    problem is posed as a time-optimal control problem and addressed using a framework
    built on top of OpenMDAO and Dymos toolchains, where Dymos employs a collocation-based
    direct-transcription approach for trajectory optimization. OpenMDAO provides accurate
    analytic partial derivatives, enabling efficient gradient-based optimization.
    A Fast Fourier Series shape-based method is used to generate dynamically feasible
    initial guess trajectories, and the resulting nonlinear programming problem is
    solved using IPOPT. The proposed framework is demonstrated through a low-thrust
    orbit insertion scenario around asteroid 16-Psyche, a regime in which reduced
    solar irradiance makes power-aware trajectory design particularly critical. Simulation
    results demonstrate the framework's ability to capture key power-propulsion-trajectory
    trade-offs, highlighting the importance of integrated power optimization for realistic
    electric propulsion mission design.
