  title: Analysis of the dynamics of a spacecraft in the vicinity of an asteroid binary
    system with equal masses
  authors:
  - name: L. B. T. Santos
    affiliation: []
  - name: P. A. Sousa-Silva
    affiliation: []
  - name: M. O. Terra
    affiliation: []
