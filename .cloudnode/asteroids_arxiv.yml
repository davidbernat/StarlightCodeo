  title: 'Tuning the Legacy Survey of Space and Time (LSST) Observing Strategy for
    Solar System Science: Incremental Templates in Year 1'
  authors:
  - name: James E. Robinson
    affiliation: []
  - name: Megan E. Schwamb
    affiliation: []
  - name: R. Lynne Jones
    affiliation: []
  - name: Mario Jurić
    affiliation: []
  - name: Peter Yoachim
    affiliation: []
  - name: Bryce T. Bolin
    affiliation: []
  - name: Colin O. Chandler
    affiliation: []
  - name: Steven R. Chesley
    affiliation: []
  - name: Grigori Fedorets
    affiliation: []
  - name: Wesley C. Fraser
    affiliation: []
  - name: Sarah Greenstreet
    affiliation: []
  - name: Henry H. Hsieh
    affiliation: []
  - name: Lauren J. McGinley
    affiliation: []
  - name: Stephanie R. Merritt
    affiliation: []
  - name: Cyrielle Opitom
    affiliation: []
  - name: John K. Parejko
    affiliation: []
  summary: The Vera C. Rubin Observatory is due to commence the 10-year Legacy Survey
    of Space and Time (LSST) at the end of 2025. To detect transient/variable sources
    and identify solar system objects (SSOs), the processing pipelines require templates
    of the static sky to perform difference imaging. During the first year of the
    LSST, templates must be generated as the survey progresses, otherwise SSOs cannot
    be discovered nightly. The incremental template generation strategy has not been
    finalized; therefore, we use the Metric Analysis Framework (MAF) and a simulation
    of the survey cadence (one_snap_v4.0_10yrs}) to explore template generation in
    Year 1. We have assessed the effects of generating templates over timescales of
    days-weeks, when at least four images of sufficient quality are available for
    $\geq90\%$ of the visit. We predict that SSO discoveries will begin $\sim$2-3
    months after the start of the survey. We find that the ability of the LSST to
    discover SSOs in real-time is reduced in Year 1. This is especially true for detections
    in areas of the sky that receive fewer visits, such as the North Ecliptic Spur
    (NES), and in less commonly used filters, such as the $u$ and $g$-bands. The lack
    of templates in the NES dominates the loss of real-time SSO discoveries; across
    the whole sky the MAF Main-Belt asteroid (MBA) discovery metric decreases by up
    to $63\%$ compared to the baseline observing strategy, whereas the metric decreases
    by up to $79\%$ for MBAs in the NES alone.
