- entry_id: http://arxiv.org/abs/2502.12248v3
  short_id: 2502.12248v3
  title: Filtered cogenesis of PBH dark matter and baryons
  authors:
  - name: Debasish Borah
    affiliation: []
  - name: Indrajit Saha
    affiliation: []
  summary: We propose a novel cogenesis of baryon and dark matter (DM) in the Universe
    by utilising a first-order phase transition (FOPT) in the dark sector containing
    an asymmetric Dirac fermion $χ$. Due to the mass difference of $χ$ across the
    bubble walls, it is energetically favourable for $χ$ to get trapped in the false
    vacuum leading to the formation of Fermi-ball, which can self-collapse to form
    primordial black hole (PBH) if $χ$ has a sufficiently large Yukawa interaction.
    While such PBH formed out of false vacuum collapse can give rise to the DM in
    the Universe, a tiny amount of asymmetric $χ$ leaking into the true vacuum through
    the bubble walls can transfer the dark asymmetry into the visible sector via decay.
    The same mass difference of $χ$ across the two minima which decides the amount
    of trapping or filtering of $χ$, also allows $χ$ decay into visible sector in
    the true minima while keeping it stable in the false vacuum. Our filtered cogenesis
    scenario can be probed via FOPT generated stochastic gravitational waves (GW)
    at near future detectors in addition to the well-known detection aspects of asteroid
    mass PBH constituting DM in the Universe.
