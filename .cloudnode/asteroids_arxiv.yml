- entry_id: http://arxiv.org/abs/2405.05410v6
  short_id: 2405.05410v6
  title: Pulsar Timing Noise from Brownian Motion of the Sun
  authors:
  - name: Abraham Loeb
    affiliation:
    - Harvard
  summary: Recently, Pulsar Timing Arrays (PTAs) reported a signal at nanohertz frequencies
    consistent with a stochastic gravitational wave background. Here, I show that
    the Brownian motion of the Sun as a result of its random gravitational interactions
    with the cluster of thousands of unmodeled Main-belt asteroids of diameters <80km,
    combined with small inaccuracies in the estimated masses of larger asteroids,
    introduces timing noise for pulsars which is up to 20% of the reported signal
    at frequencies of ~1/(few-years). The asteroid contribution needs to be modeled
    better in order to obtain accurate inferences from the PTA signal.
