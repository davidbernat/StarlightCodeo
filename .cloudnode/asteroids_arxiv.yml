  title: Shock-cooling Constraints via Early-time Observations of the Type IIb SN
    2022hnt
  authors:
  - name: Joseph R. Farah
    affiliation: []
  - name: D. Andrew Howell
    affiliation: []
  - name: Giacomo Terreran
    affiliation: []
  - name: Ido Irani
