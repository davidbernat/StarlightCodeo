  summary: Understanding stellar evolution and its effect on planetary systems is
    crucial for correctly interpreting the chemical constraints of exo-planetary material
    that can be given to us by white dwarfs. This article will describe how asteroids,
    moons, and comets, as well as boulders, pebbles and dust, evolve into eventual
    targets for chemical spectroscopy, and how planets and companion stars play a
    vital role in reshaping system architectures for this purpose.
