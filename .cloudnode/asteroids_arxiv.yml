  title: Performance of the 4-m International Liquid Mirror Telescope tested in two
    fields at high and low ecliptic and galactic latitudes
  authors:
  - name: Sara Filali
    affiliation: []
  - name: Kumar Pranshu
    affiliation: []
  - name: Jean Surdej
    affiliation: []
  - name: Paul Hickson
    affiliation: []
