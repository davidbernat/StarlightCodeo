  title: Main-belt and Trojan Asteroid Phase Curves from the ATLAS Survey
  authors:
  - name: James E. Robinson
    affiliation: []
  - name: Alan Fitzsimmons
    affiliation: []
  - name: David R. Young
    affiliation: []
  - name: Michele Bannister
    affiliation: []
  - name: Larry Denneau
    affiliation: []
  - name: Nicolas Erasmus
    affiliation: []
  - name: Amanda Lawrence
