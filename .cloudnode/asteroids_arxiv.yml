  title: Compositional characterisation of asteroid (84) Klio with JWST
  authors:
  - name: Tania Le Pivert-Jolivet
    affiliation: []
  - name: Julia de León
    affiliation: []
  - name: Javier Licandro
    affiliation: []
  - name: Bryan Holler
    affiliation: []
  - name: Noemí Pinilla-Alonso
    affiliation: []
  - name: Mário De Prá
    affiliation: []
  - name: Joshua Emery
    affiliation: []
  - name: Brittany Harvison
    affiliation: []
  - name: Joseph Masiero
    affiliation: []
  - name: Lucas McClure
    affiliation: []
  - name: Driss Takir
    affiliation: []
  summary: The analysis of the composition of primitive C$-$complex asteroids is essential
    to understand the distribution of volatiles in the Solar System since its formation.
    Primitive low-albedo families within the inner main asteroid belt are of particular
    interest because they are a significant source of carbonaceous near-Earth asteroids,
    such as Ryugu and Bennu. This study, part of the JWST SAMBA3 project (Spectral
    Analysis of Main Belt Asteroids in the 3 $μ$m region), report the first spectroscopic
    analysis of asteroid (84) Klio in the 3 $μ$m region, in order to better constrain
    its composition. We analysed the infrared (0.97$-$5.10 $μ$m) Spectrum of Klio
    measured by the NIRSpec instrument on board JWST. We used the NEATM thermal model
    to extract the reflectance spectrum of the asteroid. Several spectral features
    were then analysed in the 2.8, 3.4, and 3.9 $μ$m regions by different Gaussian
    fitting. The Spectrum of Klio shows an absorption band at 2.776 $\pm$ 0.001 $μ$m
    that we attributed to phyllosilicates. We compared the position and shape of the
    feature with that observed in primitive materials such as carbonaceous chondrites
    and returned samples from Ryugu and Bennu. The position and shape of the 2.8 $μ$m
    band, as well as the presence of a 0.7 $μ$m band in the visible, suggest that
    Klio's spectrum is similar to certain CM2 meteorites. We observed an absorption
    band around 3.9 $μ$m, with a depth of $0.020 \pm 0.001$ that could be attributed
    to carbonates. We could not clearly detect any absorption associated with organics
    at 3.4 $μ$m.
