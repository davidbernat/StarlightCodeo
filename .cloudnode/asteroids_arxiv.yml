  title: Shape and spin-state model of tumbling asteroid (319) Leona
  authors:
  - name: J. Ďurech
    affiliation: []
  - name: J. L. Ortiz
    affiliation: []
  - name: M. Ferrais
    affiliation: []
  - name: E. Jehin
