- entry_id: http://arxiv.org/abs/2504.10690v1
  short_id: 2504.10690v1
  title: Perihelion history and atmospheric survival as primary drivers of the Earth`s
    meteorite record
  authors:
  - name: Patrick M. Shober
    affiliation: []
  - name: Hadrien A. R. Devillepoix
    affiliation: []
  - name: Jeremie Vaubaillon
    affiliation: []
  - name: Simon Anghel
    affiliation: []
  - name: Sophie E. Deam
    affiliation: []
  - name: Eleanor K. Sansom
    affiliation: []
  - name: Francois Colas
    affiliation: []
  - name: Brigitte Zanda
    affiliation: []
  - name: Pierre Vernazza
    affiliation: []
  - name: Phil Bland
    affiliation: []
  summary: Models predict that more than half of all impacting meteoroids should be
    carbonaceous, reflecting the abundance of carbon-rich asteroids in the main belt
    and near-Earth space. Yet carbonaceous chondrites represent only about 4% of meteorites
    recovered worldwide. Here we analyse 7,982 meteoroid impacts and 540 potential
    meteorite falls from 19 global observation networks and demonstrate that intense
    thermal stress at low perihelion distances coupled with the filtering effect of
    Earth`s atmosphere explains this mismatch. Meteoroids repeatedly subjected to
    intense thermal cycling near the Sun fracture and weaken, removing the most friable
    objects even before atmospheric entry. Our data also show that tidally disrupted
    meteoroid streams produce especially fragile fragments that rarely survive to
    the ground. Consequently, compact, higher-strength, thermally cycled bodies dominate
    the meteorite record. These findings reconcile the predicted carbonaceous flux
    with its scarcity in collections, underscoring how orbital evolution and atmospheric
    filtering shape the materials that reach Earth`s surface.
