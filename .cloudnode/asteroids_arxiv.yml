  title: 'The ANDICAM-SOFI Near-infrared and Optical type Ia Supernova (ASNOS) sample:
    Description and data release'
  authors:
  - name: Kim Phan
    affiliation: []
  - name: Lluís Galbany
    affiliation: []
  - name: Tomás E. Müller-Bravo
    affiliation: []
  - name: Subhash Bose
