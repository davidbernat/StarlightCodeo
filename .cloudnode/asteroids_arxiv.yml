- entry_id: http://arxiv.org/abs/2309.14933v12
  short_id: 2309.14933v12
  title: 'Baryonium Dark Matter: Events with Circle Configurations in the Atmosphere
    and on the Surface of Earth'
  authors:
  - name: O. I. Piskounova
    affiliation: []
  summary: 'This research supposes the parallel study of the manifestations of Baryonium
    Dark Matter (BDM) in astroparticle collisions in the atmosphere and among the
    footprints of the massive extraterrestrial objects that fall on the surface of
    Earth. These objects differ from stone asteroids and are seen as lightning bolides
    that are burning with a blue flame. Since BDM is a QCD state, the characteristics
    of BDM disintegration events can be analyzed with the same Quark-Gluon Strings
    Model (QGSM) as hadroproproduction data on colliders. It was concluded that the
    HE event, which was detected in the stratosphere in 1975, differs from the collision
    of the nucleus. The signatures of such events are 1) the circle distribution of
    heavy secondary hadrons with almost nothing inside the ring and 2) the presence
    of heavy secondary particles with a mass out of range of known hadrons. The circle
    will also be the signature of heavy BDM conglomerate that disintegrate in the
    atmosphere (or in space) for a few similar lower-mass BDMs. These signatures should
    be observed in super-heavy BDM collapses on the Earth. The traces of such events
    are seen as circles of pits or shafts in the ground rocks. There are at least
    two pieces of evidence of such holes: cenotes on the Yucatan peninsula (Mexico)
    and pits in Durrington Walls (England). The vertical pits, or wells (because sometimes
    they are filled with water) have a depth of 5 - 50 meters. These super-heavy BDM
    collapses differ from the meteorite crash, because they do not form the craters.
    The existence of these places around the globe indicates the rare likelihood of
    meeting the super-massive BDM in proximity to Earth. The Tunguska meteorite could
    also be a BDM collapse. Finally, some suggestions are made about the emission
    of Baryonium Dark Matter toroidal conglomerates with the jets from giant active
    Supermassive Black Holes (SMBH).'
