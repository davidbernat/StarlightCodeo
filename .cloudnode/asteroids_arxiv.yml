- entry_id: http://arxiv.org/abs/2504.08252v1
  short_id: 2504.08252v1
  title: Stereophotoclinometry Revisited
  authors:
  - name: Travis Driver
    affiliation: []
  - name: Andrew Vaughan
    affiliation: []
  - name: Yang Cheng
    affiliation: []
  - name: Adnan Ansar
    affiliation: []
  - name: John Christian
    affiliation: []
  - name: Panagiotis Tsiotras
    affiliation: []
  summary: Image-based surface reconstruction and characterization is crucial for
    missions to small celestial bodies, as it informs mission planning, navigation,
    and scientific analysis. However, current state-of-the-practice methods, such
    as stereophotoclinometry (SPC), rely heavily on human-in-the-loop verification
    and high-fidelity a priori information. This paper proposes Photoclinometry-from-Motion
    (PhoMo), a novel framework that incorporates photoclinometry techniques into a
    keypoint-based structure-from-motion (SfM) system to estimate the surface normal
    and albedo at detected landmarks to improve autonomous surface and shape characterization
    of small celestial bodies from in-situ imagery. In contrast to SPC, we forego
    the expensive maplet estimation step and instead use dense keypoint measurements
    and correspondences from an autonomous keypoint detection and matching method
    based on deep learning. Moreover, we develop a factor graph-based approach allowing
    for simultaneous optimization of the spacecraft's pose, landmark positions, Sun-relative
    direction, and surface normals and albedos via fusion of Sun vector measurements
    and image keypoint measurements. The proposed framework is validated on real imagery
    taken by the Dawn mission to the asteroid 4 Vesta and the minor planet 1 Ceres
    and compared against an SPC reconstruction, where we demonstrate superior rendering
    performance compared to an SPC solution and precise alignment to a stereophotogrammetry
    (SPG) solution without relying on any a priori camera pose and topography information
    or humans-in-the-loop.
