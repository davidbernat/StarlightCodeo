- entry_id: http://arxiv.org/abs/2606.25052v1
  short_id: 2606.25052v1
  title: 'Shape model and dynamical state of the asteroid (300) Geraldina: Implications
    for its possible ancient origin'
  authors:
  - name: G. Apostolovska
    affiliation: []
  - name: N. Todorovic
    affiliation: []
  - name: E. Vchkova Bebekovska
    affiliation: []
  - name: G. Borisov
    affiliation: []
  - name: A. Kostov
    affiliation: []
  - name: Z. Donchev
    affiliation: []
  summary: In this study, we present a comprehensive photometric and physical characterisation
    of the main-belt asteroid (300) Geraldina. Our analysis includes determining its
    sidereal rotational period, shape modelling, spin-axis orientation, as well as
    dynamical and spectral properties. The investigation is based on two decades of
    archival photometry from the Bulgarian National Astronomical Observatory (BNAO)
    Rozhen, complemented by dense CCD lightcurve observations obtained since 2017
    at the Astronomical Station Vidojevica (ASV), dense data from ALCDEF, and augmented
    with sparse-in-time measurements from Gaia Data Release 3 (DR3). By combining
    these heterogeneous datasets within and using the lightcurve inversion method,
    we confirmed the asteroid's prograde sense of rotation and obtained two symmetrically
    mirrored pole solutions for the asteroid model. Our dynamical studies show that
    (300) Geraldina remains stable in 100 Myr. Although close to the 2:1 mean-motion
    resonance with Jupiter, it is not captured into it during the observed time. Instead,
    it exhibits interactions with an unidentified high-order mean-motion resonance,
    which appears to contribute to its long-term stability. Its spectral type (C)
    with a primitive carbonaceous composition, in combination with low albedo and
    long-term stability, is consistent with the assumption that (300) Geraldina is
    an ancient asteroid.
