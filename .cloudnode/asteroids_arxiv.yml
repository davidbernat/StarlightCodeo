- entry_id: http://arxiv.org/abs/2508.02854v1
  short_id: 2508.02854v1
  title: Surface Response of Mercury's Sulfides under Solar Wind Ion Irradiation
  authors:
  - name: Noah Jäggi
    affiliation: []
  - name: Catherine A. Dukes
    affiliation: []
  summary: The MESSENGER mission revealed unexpectedly high sulfur content within
    Mercury's surface, deviating from the Lunar regolith, which was, until recently,
    considered a good Mercury analogue. Mercury's exposure to energetic space weathering
    processes such as meteoritic impact and solar-wind sputtering suggests this high
    sulfur concentration should be reflected in the suprathermal sulfur population
    of the Hermean exosphere. UV spectroscopy has not yet detected exospheric sulfur,
    a result attributed primarily to its low glow-factor. Future detection by BepiColombo's
    Mass Spectrum Analyzer depends on sulfur abundance in the exosphere. Radiation-induced
    segregation has been observed in the common sulfide troilite (FeS), a constituent
    mineral in returned Lunar samples, meteorites, and asteroids, where the resulting
    metal cap is expected to reduce sulfur ejection to Mercury's exosphere. In this
    work, we investigate the irradiation response of Mercury-relevant sulfides. Niningerite
    (MgS) and oldhamite (CaS) were irradiated with solar-wind speed 2 keV H$_2^+$
    or 4 keV He$^+$, and in-situ compositional and chemical bond analysis as a function
    of fluence was performed using an XPS microprobe. Neither MgS nor CaS expressed
    detectable damage-induced segregation and instead reached metal-to-sulfur ratios
    close to bulk with irradiation. Based on this finding, structural information,
    and literature analyses, we infer that an S-S anionic spacing exceeding $\sim$3.2
    Å inhibits radiation-induced sulfur depletion and promotes stoichiometric sputtering.
    We therefore predict no cation (metal) surface segregation in Hermean sulfides
    and no reduction in suprathermal sulfur emission caused by metal cladding formation
    in TiS, CrS, and Ca-Mg sulfides. This radiation-hardness for Mercury-relevant
    sulfides is novel and unexpected, and should facilitate detection in Mercury's
    exosphere by the BepiColombo mission.
