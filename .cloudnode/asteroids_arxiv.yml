- entry_id: http://arxiv.org/abs/2606.05036v1
  short_id: 2606.05036v1
  title: An 800-Million-Year-Old Impact Shower on the Terrestrial Planets from the
    Breakup of the Eulalia Parent Body
  authors:
  - name: William F. Bottke
    affiliation: []
  - name: David Vokrouhlický
    affiliation: []
  - name: Melissa Dykhuis
    affiliation: []
  - name: Nicolle Zellner
    affiliation: []
  summary: Multiple studies have proposed a substantial surge in large lunar impacts
    approximately $800$ million years ago (Ma). Some are based on analyses of the
    ages of large lunar craters, such as the $93$ km Copernicus crater. Others focus
    on the age distributions of impact glasses returned by lunar missions. A key challenge
    has been identifying and testing a plausible source for this putative impact spike.
    Here we use collisional and dynamical models to link this event to the formation
    of the Eulalia asteroid family, whose primitive carbonaceous chondrite-like parent
    body disrupted $\sim 800$ Ma near the 3:1 mean motion resonance with Jupiter (J3:1).
    Our simulations indicate that approximately three-quarters of the family's fragments
    eventually entered the J3:1 over a $\sim 150$-million year interval. While some
    fragments were injected into the resonance immediately after the disruption, others
    migrated more gradually via non-gravitational (Yarkovsky) thermal forces. Once
    in the J3:1, the fragments were dynamically transported into the planet-crossing
    region, leading to an elevated rate of bombardment on the Moon and terrestrial
    planets. Our results demonstrate that the Eulalia breakup can plausibly account
    for the observed lunar craters formed near $800$ Ma. Intriguingly, this event
    may also have had widespread repercussions across the inner Solar System. On Earth,
    its timing coincides with significant shifts in the biosphere, possibly linked
    to large impacts. On Mars, these impacts might have triggered a pulse of volcanic
    activity. Together, they showcase how certain catastrophic collisions in the main
    belt can have far-reaching consequences for the history of the terrestrial planets.
