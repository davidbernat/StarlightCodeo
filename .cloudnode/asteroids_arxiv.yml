  title: Estimate of water and hydroxyl abundance on asteroid (16) Psyche from JWST
    data
  authors:
  - name: Stephanie G. Jarmak
    affiliation: []
  - name: Tracy M. Becker
    affiliation: []
  - name: Charles E. Woodward
    affiliation: []
  - name: Casey I. Honniball
    affiliation: []
  - name: Andrew S. Rivkin
    affiliation: []
  - name: Margaret M. McAdam
    affiliation: []
  - name: Zoe A. Landsman
    affiliation: []
  - name: Saverio Cambioni
    affiliation: []
  - name: Thomas G. Müller
    affiliation: []
  - name: Driss Takir
    affiliation: []
  - name: Kurt D. Retherford
    affiliation: []
  - name: Anicia Arredondo
    affiliation: []
  - name: Linda T. Elkins-Tanton
    affiliation: []
  summary: Our understanding of Solar System evolution is closely tied to interpretations
    of asteroid composition, particularly the M-class asteroids. These asteroids were
    initially thought to be the exposed cores of differentiated planetesimals, a hypothesis
    based on their spectral similarity to iron meteorites. However, recent astronomical
    observations have revealed hydration on their surface through the detection of
    3-$μ$m absorption features associated with OH and potentially H2O. We present
    evidence of hydration due mainly to OH on asteroid (16) Psyche, the largest M-class
    asteroid, using data from the James Webb Space Telescope (JWST) spanning 1.1 -
    6.63 $μ$m. Our observations include two detections of the full 3-$μ$m feature
    associated with OH and H2O resembling those found in CY-, CH-, and CB-type carbonaceous
    chondrites, and no 6-$μ$m feature uniquely associated with H2O across two observations.
    We observe 3-$μ$m depths of between 4.3 and 6% across two observations, values
    consistent with hydrogen abundance estimates on other airless bodies of 250 -
    400 ppm. We place an upper limit of 39 ppm on the water abundance from the standard
    deviation around the 6-$μ$m feature region. The presence of hydrated minerals
    suggests a complex history for Psyche. Exogenous sources of OH-bearing minerals
    could come from hydrated impactors. Endogenous OH-bearing minerals would indicate
    a composition more similar to E-or P-class asteroids. If the hydration is endogenous,
    it supports the theory that Psyche originated beyond the snow line and later migrated
    to the outer main belt.
