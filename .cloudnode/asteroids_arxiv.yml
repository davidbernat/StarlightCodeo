  summary: 'The Legacy Survey of Space and Time (LSST) at Vera C. Rubin Observatory
    is planned to begin in the Fall of 2025. The LSST survey cadence has been designed
    via a community-driven process regulated by the Survey Cadence Optimization Committee
    (SCOC), which recommended up to 3% of the observing time to carry out Target of
    Opportunity (ToO) observations. Experts from the scientific community, Rubin Observatory
    personnel, and members of the SCOC were brought together to deliver a recommendation
    for the implementation of the ToO program during a workshop held in March 2024.
    Four main science cases were identified: gravitational wave multi-messenger astronomy,
    high energy neutrinos, Galactic supernovae, and small potentially hazardous asteroids
    possible impactors. Additional science cases were identified and briefly addressed
    in the documents, including lensed or poorly localized gamma-ray bursts and twilight
    discoveries. Trigger prioritization, automated response, and detailed strategies
    were discussed for each science case. This document represents the outcome of
    the Rubin ToO 2024 workshop, with additional contributions from members of the
    Rubin Science Collaborations. The implementation of the selection criteria and
    strategies presented in this document has been endorsed in the SCOC Phase 3 Recommendations
    document (PSTN-056). Although the ToO program is still to be finalized, this document
    serves as a baseline plan for ToO observations with the Rubin Observatory.'
