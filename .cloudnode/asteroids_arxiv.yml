- entry_id: http://arxiv.org/abs/2603.24332v1
  short_id: 2603.24332v1
  title: New Insights into Erg Chech 002 Analogues in the Main Belt from Near-Infrared
    Spectroscopy
  authors:
  - name: M. Galinier
    affiliation: []
  - name: C. Avdellidou
    affiliation: []
  - name: M. Delbo
    affiliation: []
  - name: L. Galluccio
    affiliation: []
  summary: Erg Chech 002 is an andesitic meteorite that formed early in the Solar
    System's history, and that is thought to have been formed in the primitive crust
    of an early accreted and differentiated planetesimal. It shows unique spectral
    features, and no known asteroid spectral type was initially found to match with
    its compositional type. In the literature, asteroids (10537) 1991 RY16, (7472)
    Kumakiri and (14390) 1990 QP10 were found to show peculiar spectra, and were not
    classified in any known existing spectral class. These objects were hypothesised
    to be fragments of differentiated planetesimals. In a previous study, the Gaia
    Data Release 3 dataset of visible reflectance spectra of Solar System Objects
    was exploited to search for potential analogues of Erg Chech 002 in the main belt.
    As a result, 142 asteroids were found to potentially match this meteorite. In
    this work, we present NASA's IRTF near-infrared observations of 20 main belt asteroids
    found as potential analogues of Erg Chech 002. We classified these asteroids based
    on their visible-near-infrared spectra, then studied and compared their diagnostic
    spectral features with those of the laboratory spectra of Erg Chech 002. We classified
    16 of the 20 observed asteroids as V-types, one as S-complex and one as A-type,
    and conclude that none of the observed objects match with Erg Chech 002. In addition,
    we show that asteroids (10537) 1991 RY16 and (14390) 1990 QP10 are good spectral
    matches to Erg Chech 002 based on the study of their diagnostic spectral features.
    Asteroid (7472) Kumakiri could match a more olivine-rich Erg Chech 002-like material,
    and cannot be completely ruled out as a match of the meteorite. This possible
    link between the meteorite and these asteroids is consistent with the theories
    regarding their formation, and these asteroids could be part of a new spectral
    class of andesitic bodies in the main belt.
