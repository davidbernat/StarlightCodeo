- entry_id: http://arxiv.org/abs/2410.10948v2
  short_id: 2410.10948v2
  title: 'Revisiting the Chemical Composition of WD 1145+017: Impact of Circumstellar
    Disks Contamination on Photospheric Abundances'
  authors:
  - name: Érika Le Bourdais
    affiliation: []
  - name: Patrick Dufour
    affiliation: []
  - name: Siyi Xu
    affiliation: []
  summary: We performed a chemical analysis of the asteroid-bearing white dwarf WD
    1145+017 using optical and ultraviolet spectroscopic data from 25 epochs between
    2015 and 2023. We present an updated gas disk model with improved opacity calculations
    and temperature profiles to properly account for all circumstellar absorption
    features. Incorporating these changes into our models, we identified at least
    10 elements in the disk, including a detection of circumstellar Na. We detected
    16 elements in the photosphere, including new detections of P, Co and Cu. At 16
    elements, WD 1145+017 ties GD 362 as one of the most polluted white dwarfs in
    terms of the number of elements detected. We find that both the disk and photosphere
    compositions align, to first order, with CI Chondrite. Our study underscores the
    importance of accounting for circumstellar absorption, as neglecting them leads
    to significant abundance errors. Additionally, the analysis of the disk's opacity
    highlighted a ultraviolet flux reduction due to a pseudo-continuum due to a optically
    thick component. This result may affect previous analyses of other polluted white
    dwarfs, suggesting a need for revisiting some studies.
