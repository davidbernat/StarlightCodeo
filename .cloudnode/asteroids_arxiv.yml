  - name: T. Kaeufer
    affiliation: []
  - name: J. Kanwar
    affiliation: []
  - name: G. Perotti
    affiliation: []
  - name: K. Schwarz
    affiliation: []
  - name: M. Temmink
    affiliation: []
  summary: Mechanisms such as collisions of rocky bodies or cometary activity give
    rise to dusty debris disks. Debris disks trace the leftover building blocks of
    planets, and thus also planetary composition. HD 172555, a stellar twin of beta
    Pic, hosts a debris disk thought to have resulted from a giant collision. It is
    known for its extreme mid-infrared silica dust feature, indicating a warm population
    of silica-rich grains in the asteroid belt (~5 au), cold CO observed by ALMA,
    and small bodies evaporating as they approach close to the star. Our JWST MIRI/MRS
    observations now reveal emission from an inner gaseous disk (<0.5 au) that arises
    from the evaporation of close-in material. For the first time in a debris disk,
    we detect neutral atomic chlorine and sulfur, as well as ionized nickel. We recovered
    the neutral sulfur line in ~20-year-old Spitzer data, showing it is long-lived
    and stable. Ionized iron, previously seen only in beta Pic, is also detected.
    All lines are broadened by Keplerian rotation, pinpointing the gas location. The
    HD 172555 system serves as a unique laboratory to study the composition of planetesimals,
    asteroids, and comets beyond the Solar System. The comparison to beta Pic reveals,
    that the gas in HD 172555 is hotter, closer to the star, and poor in argon --
    suggesting it originates from evaporating rocky bodies near the star, while beta
    Pic's gas may trace volatile-rich bodies from larger separations.
