  short_id: 2510.23825v1
  title: New Trends in Astrophysical Self-Organized Criticality
  authors:
  - name: Markus J. Aschwanden
    affiliation: []
  summary: This review is focused on recent {\sl Self-Organized Criticality (SOC)}
    literature of astrophysical phenomena, covering the last decade of (2015-2025),
    while previous SOC literature (1987-2014) is reviewed elsewhere. The selection
    of literature is mostly based on searches with the NASA-supported {\sl Astrophysics
    Data System (ADS)}. The discussed astrophysical SOC phenomena are subdivided into
    solar flares, solar atmosphere (photosphere, chromosphere, corona), heliospheric
    systems (coronal mass ejections, solar wind, solar energetic particles), planetary
    systems (asteroids and small bodies, lunar cratering, Saturnian ring systems,
    magnetospheric systems), stellar flares, and galactic systems (pulsar glitches,
    gamma ray bursts, soft gamma-ray repeaters, supergiant fast X-ray transients,
    fast transient radio bursts, magnetars, blazars, black holes).
