- entry_id: http://arxiv.org/abs/2511.07764v1
  short_id: 2511.07764v1
  title: The formation and structure of iron-dominated planetesimals
  authors:
  - name: Terry-Ann Suer
    affiliation: []
  - name: Edgar S. Steenstra
    affiliation: []
  - name: Simone Marchi
    affiliation: []
  - name: John A. Tarduno
    affiliation: []
  - name: Ilaria Pascucci
    affiliation: []
  summary: Metal-rich asteroids and iron meteorites are considered core remnants of
    differentiated planetesimals and or products of oxygen-depleted accretion. Investigating
    the origins of iron-rich planetesimals could provide key insights into planet
    formation mechanisms. Using differentiation models, we evaluate the interior structure
    and composition of representative-sized planetesimals (approx. 200 km diameter)
    while varying oxygen fugacity and initial bulk meteoritic composition. Under the
    oxygen-poor conditions that likely existed early in the inner regions of the Solar
    System and other protoplanetary disks, core fractions remain relatively consistent
    across a range of bulk compositions (CI, H, EH, and CBa). Some of these cores
    could incorporate significant amounts of silicon (10-30 wt percent) and explain
    the metal fractions of Fe-rich bodies in the absence of mantle stripping. Conversely,
    planetesimals forming under more oxidizing conditions, such as beyond snow lines,
    could exhibit smaller cores enriched in carbon, sulfur (more than 1 wt percent),
    and oxides. Sulfur-rich cores, like those formed from EH and H bulk compositions,
    could remain partly molten, sustain dynamos, and even drive sulfur-rich volcanism.
    Additionally, bodies with high carbon contents, such as CI compositions, can form
    graphitic outer layers. These variations highlight the importance of initial formation
    conditions in shaping planetesimal structures. Future missions, such as NASA's
    Psyche mission, offer an opportunity to measure the relative abundances of key
    elements (Fe, Ni, Si, and S) necessary to distinguish among formation scenarios
    and structure models for Fe-rich and reduced planetesimals.
