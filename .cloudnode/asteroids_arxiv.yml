  title: Detection of a space capsule entering Earth's atmosphere with distributed
    acoustic sensing (DAS)
  authors:
  - name: Chris G. Carr
    affiliation: []
  - name: Carly M. Donahue
    affiliation: []
  - name: Loic Viens
    affiliation: []
  - name: Luke B. Beardslee
    affiliation: []
  - name: Elisa A. McGhee
    affiliation: []
  - name: Lisa R. Danielson
    affiliation: []
  summary: On 24 September 2023, the Origins, Spectral Interpretation, Resource Identification,
    and Security Regolith Explorer (OSIRIS-REx) Sample Return Capsule entered the
    Earth's atmosphere after successfully collecting samples from an asteroid. The
    known trajectory and timing of this return provided a rare opportunity to strategically
    instrument sites to record geophysical signals produced by the capsule as it traveled
    at hypersonic speeds through the atmosphere. We deployed two optical-fiber distributed
    acoustic sensing (DAS) interrogators to sample over 12 km of surface-draped, fiber-optic
    cables along with six co-located seismometer-infrasound sensor pairs, spread across
    two sites near Eureka, NV. This campaign-style rapid deployment is the first reported
    recording of a sample return capsule entry with any distributed fiber optic sensing
    technology. The DAS interrogators recorded an impulsive arrival with an extended
    coda which had features that were similar to recordings from both the seismometers
    and infrasound sensors. While the signal-to-noise of the DAS data was lower than
    the seismic-infrasound data, the extremely dense spacing of fiber-optic sensors
    allowed for more phases to be clearly distinguished and the continuous transformation
    of the wavefront as it impacted the ground could be visualized. Unexpectedly,
    the DAS recordings contain less low-frequency content than is present in both
    the seismic and infrasound data. The deployment conditions strongly affected the
    recorded DAS data, in particular, we observed that fiber selection and placement
    exert strong controls on data quality.
