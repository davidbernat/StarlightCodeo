  summary: We present an analysis of a stellar occultation event caused by a near-Earth
    asteroid (98943) 2001 CC21, an upcoming flyby target in the Hayabusa2 extended
    mission, on March 5, 2023. To accurately determine the asteroid's shape from diffraction-affected
    light curves, we developed a novel data reduction technique named the Diffracted
    Occultation's United Simulator for Highly Informative Transient Explorations (DOUSHITE).
    Using DOUSHITE-generated synthetic models, we derived constraints on (98943) 2001
    CC21's shadow shape from the single-chord occultation data. Our results suggest
    a significant elongation of the shadow with an axis ratio of $b/a = 0.37\pm0.09$.
    This shape can be crucial for planning Hayabusa2's high-speed flyby to optimise
    the limited imaging opportunities.
