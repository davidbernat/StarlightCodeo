- entry_id: http://arxiv.org/abs/2509.21407v2
  short_id: 2509.21407v2
  title: Debris disks and their properties with the Habitable Worlds Observatory
  authors:
  - name: Isabel Rebollido
    affiliation: []
  - name: Yasuhiro Hasegawa
    affiliation: []
  - name: Meredith MacGregor
    affiliation: []
  - name: Bin Ren
    affiliation: []
  - name: Mark Booth
    affiliation: []
  - name: Jonathan Marshall
    affiliation: []
  - name: Courtney Dressing
    affiliation: []
  - name: Patricia Luppe
    affiliation: []
  summary: The study of the last stages of planet formation, also known as debris
    disks, is fundamental to place constrains on the formation of planetary sized
    bodies. Debris disks are composed of dust and occasionally small amounts of gas,
    both released through dynamical interactions of small rocky bodies and dust particles,
    such as collisions and evaporation. The distribution of the dust can reveal the
    presence of forming planets and its composition can directly trace that of comets,
    asteroids and even planets. While we have been observing debris disks for 40 years
    now, most observations so far have been restricted to the cold outer regions of
    the system, and therefore information of the terrestrial zone is still missing.
    The improved spatial resolution, inner working angle and sensitivity that the
    Habitable Worlds Observatory will provide will enable a much closer look into
    the structure and composition of debris disks (particularly of its inner region)
    and enable the search for the forming rocky planets within the disk.
