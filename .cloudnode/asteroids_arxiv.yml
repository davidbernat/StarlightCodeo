  title: Small body harvest with the Antarctic Search for Transiting Exoplanets (ASTEP)
    project
  authors:
  - name: Samantha Hasler
    affiliation: []
  - name: Artem Burdanov
    affiliation: []
  - name: Julien de Wit
    affiliation: []
  - name: Georgina Dransfield
    affiliation: []
  - name: Lyu Abe
    affiliation: []
  - name: A. Agabi
    affiliation: []
  - name: Philippe Bendjoya
    affiliation: []
  - name: Nicolas Crouzet
    affiliation: []
  - name: Tristan Guillot
    affiliation: []
  - name: Djamel Mékarnia
    affiliation: []
  - name: F. -X. Schmider
    affiliation: []
  - name: Olga Suárez
    affiliation: []
  - name: Amaury Triaud
    affiliation: []
  summary: Small Solar system bodies serve as pristine records that have been minimally
    altered since their formation. Their observations provide valuable information
    regarding the formation and evolution of our Solar system. Interstellar objects
    (ISOs) can also provide insight on the formation of exoplanetary systems and planetary
    system evolution as a whole. In this work, we present the application of our framework
    to search for small Solar system bodies in exoplanet transit survey data collected
    by the Antarctic Search for Transiting ExoPlanets (ASTEP) project. We analysed
    data collected during the Austral winter of 2021 by the ASTEP 400 telescope located
    at the Concordia Station, at Dome C, Antarctica. We identified 20 known objects
    from dynamical classes ranging from Inner Main-belt asteroids to one comet. Our
    search recovered known objects down to a magnitude of $V$ = 20.4 mag, with a retrieval
    rate of $\sim$80% for objects with $V \le $ 20 mag. Future work will apply the
    pipeline to archival ASTEP data that observed fields for periods of longer than
    a few hours to treat them as deep-drilling datasets and reach fainter limiting
    magnitudes for slow-moving objects, on the order of $V\approx $ 23-24 mag.
