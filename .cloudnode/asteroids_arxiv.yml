  summary: Small Solar system Objects (SSOs) preserve the physical, chemical, and
    dynamical signatures of the Sun's protoplanetary disk. Upcoming surveys will discover
    vast numbers of new objects, yet their scientific value will depend on follow-up
    observations requiring far greater sensitivity and resolution than those currently
    available. A 30-m class telescope like the Extremely Large Telescope (ELT) will
    be transformative, but its Southern location will leave significant regions of
    the sky poorly covered or even non accessible. A Northern 30-40m telescope is
    therefore essential to achieve full-sky coverage and fully exploit the small body
    discoveries of the 2030-2050 era, in particular for targets of opportunity or
    unexpected discoveries, like those of interstellar objects and potentially hazardous
    asteroids, as well as for distant trans-Neptunian objects and space mission targets.
