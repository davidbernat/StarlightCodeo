  title: Near-Discovery Observations of Interstellar Comet 3I/ATLAS with the NASA
    Infrared Telescope Facility
  authors:
  - name: Theodore Kareta
    affiliation:
    - Villanova U.
  - name: Chansey Champagne
    affiliation:
