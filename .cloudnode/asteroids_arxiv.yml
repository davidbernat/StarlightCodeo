  summary: Utilizing high-cadence and continuous g- and r-band data over three nights
    acquired from the 3.6-meter Canada France Hawaii Telescope (CFHT) aimed to find
    short-duration microlensing events, we conduct a systematic search for variables,
    transients, and asteroids across a $\sim1^\circ$ field of view of the Andromeda
    Galaxy (M 31). We present a catalog of 5859 variable stars, yielding the most
    extensive compilation of short-period variable sources of M 31. We also detected
    19 flares, predominantly associated with foreground M dwarfs in the Milky Way.
    In addition, we discovered 17 previously unknown asteroid candidates, and we subsequently
    reported them to the Minor Planet Center. Lastly, we report a microlensing event
    candidate C-ML-1 and present a preliminary analysis.
