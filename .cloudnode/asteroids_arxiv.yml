- entry_id: http://arxiv.org/abs/2605.30420v1
  short_id: 2605.30420v1
  title: Parameter resolution of near-Earth asteroids using LISA
  authors:
  - name: Sara Marques
    affiliation: []
  - name: Oliver Jennrich
    affiliation: []
  summary: The detection of near-Earth asteroids (NEAs) is critical for planetary
    defense and for advancing our understanding of the small-body population in the
    Solar System. Traditional detection techniques, including optical and radar, are
    the cornerstone of NEA discoveries. However, these are limited by observational
    constraints. We investigate whether the Laser Interferometer Space Antenna (LISA),
    a future space-borne gravitational wave detector, might detect and constrain the
    parameters of NEAs through their gravitational effect on the spacecraft test masses
    during a close approach at the minimum orbital intersection distance. We modeled
    the gravitational perturbations of the test masses on the LISA spacecraft exerted
    by a passing NEA. Based on this, we computed its signal-to-noise ratio (S/N) to
    determine detectability using the LISA requirements. Furthermore, we used the
    Fisher information formalism to estimate the uncertainties on the state vector
    and mass of the asteroid given it is detected. These estimates provide a first-order
    assessment of the LISA capability to resolve NEA parameters under favorable encounter
    geometries. The Fisher information study showed that the fractional uncertainty
    on the asteroid mass scales as the inverse of the S/N. Consequently, a detection
    with an S/N $\geq 5$ yields a mass determination with an uncertainty of $\sim20\%$
    at most. In contrast, the state vectors exhibit considerably larger uncertainties
    as they depend significantly on the geometry of the close approach. Nevertheless,
    for very high S/N cases, this precision may be comparable to the uncertainties
    obtained by some of the current observational methods. The analysis of the correlation
    matrices confirms that each close encounter produces a specific signal and provides
    a practical means to assign independent error bars to the recovered state vector.
