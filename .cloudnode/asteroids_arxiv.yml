- entry_id: http://arxiv.org/abs/2410.01348v2
  short_id: 2410.01348v2
  title: Prospects for detecting asteroid-mass primordial black holes in extreme mass-ratio
    inspirals with continuous gravitational waves
  authors:
  - name: Andrew L. Miller
    affiliation: []
  summary: Despite decades of research, the existence of asteroid-mass primordial
    black holes (PBHs) remains almost completely unconstrained and thus could still
    comprise the totality of dark matter (DM). In this paper, we show that standard
    searches for continuous gravitational waves -- long-lived, quasi-monochromatic
    signals -- could detect extreme mass-ratio inspirals of asteroid-mass PBHs in
    orbit around a stellar-mass companion using future gravitational-wave (GW) data
    from Einstein Telescope (ET) and the Neutron Star Extreme Matter Observatory (NEMO).
    We evaluate the robustness of our projected constraints against the eccentricity
    of the binary, the choice of the mass of the primary object, and the GW frequency
    range that we analyze. Furthermore, to determine whether there could be ways to
    detect asteroid-mass PBHs using current GW data, we quantify the impact of changes
    in current techniques on the sensitivity towards asteroid-mass PBHs. We show that
    methods that allow for signals with increased and more complicated frequency drifts
    over time could obtain much more stringent constraints now than those derived
    from standard techniques, though at slightly larger computational cost, potentially
    constraining the fraction of DM that certain asteroid-mass PBHs could compose
    to be less than one with current detectors.
