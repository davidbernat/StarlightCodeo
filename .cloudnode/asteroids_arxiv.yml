- entry_id: http://arxiv.org/abs/2603.28107v1
  short_id: 2603.28107v1
  title: Shape, regolith size and thickness, SMFe^0 content, and spectral type of
    Tianwen-2 target asteroid (469219) Kamo'oalewa
  authors:
  - name: Pengfei Zhang
    affiliation: []
