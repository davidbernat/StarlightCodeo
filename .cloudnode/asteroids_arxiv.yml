  summary: Mitigation of the threat from airbursting asteroids requires an understanding
    of the potential risk they pose for the ground. How asteroids release their kinetic
    energy in the atmosphere is not well understood due to the rarity of significant
    impacts. Ordinary chondrites, in particular L chondrites, represent a frequent
    type of Earth-impacting asteroids. Here, we present the first comprehensive, space-to-lab
    characterization of an L chondrite impact. Small asteroid 2023 CX1 was detected
    in space and predicted to impact over Normandy, France, on 13 February 2023. Observations
    from multiple independent sensors and reduction techniques revealed an unusual
    but potentially high-risk fragmentation behavior. The nearly spherical 650 $\pm$
    160 kg (72 $\pm$ 6 cm diameter) asteroid catastrophically fragmented around 28
    km altitude, releasing 98% of its total energy in a concentrated region of the
    atmosphere. The resulting shockwave was spherical, not cylindrical, and released
    more energy closer to the ground. This type of fragmentation increases the risk
    of significant damage at ground level. These results warrant consideration for
    a planetary defense strategy for cases where a >3-4 MPa dynamic pressure is expected,
    including planning for evacuation of areas beneath anticipated disruption locations.
