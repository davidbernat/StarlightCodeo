    affiliation: []
  - name: Paul Hickson
    affiliation: []
  - name: Brajesh Kumar
    affiliation: []
  - name: Vibhore Negi
    affiliation: []
  - name: Jean Surdej
    affiliation: []
  summary: The International Liquid Mirror Telescope (ILMT) is a 4-m aperture, zenith-pointing
    telescope with a field-of-view of 22', situated in the foothills of the Himalayas.
    The telescope operates in continuous survey mode, making it a useful instrument
    for time-domain astronomy, particularly for detecting transients, variable stars,
    active galactic nuclei variability, and asteroids. This paper presents the PyLMT
    transient detection pipeline to detect such transient/varying sources in the ILMT
    images. The pipeline utilises the image subtraction technique to compare a pair
    of images from the same field, identifying such sources in subtracted images with
    the help of convolutional neural networks (CNN) based real/bogus classifiers.
    The test accuracies determined for the real/bogus classifiers ranged from 94%
    to 98%. The resulting precision of the pipeline calculated over candidate alerts
    in the ILMT frames is 0.91. It also houses a CNN-aided transient candidate classifier
    that classifies the transient/variable candidates based on host morphology. The
    test accuracy of the candidate classifier is 98.6%. It has the provision to identify
    catalogued asteroids and other solar system objects using public databases. The
    median execution time of the pipeline is approximately 29 minutes per image of
    17 minutes exposure. Relevant CNNs have been trained on data acquired with the
    ILMT during the cycle of October-November 2022. Subsequent tests on those images
    have confirmed the detection of numerous catalogued asteroids, variable stars,
    and other uncatalogued sources. The pipeline has been operational and has detected
    12 extragalactic transients, including 2 new discoveries in the November 2023-May
    2024 observation cycle.
