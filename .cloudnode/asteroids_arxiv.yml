  summary: Asteroid search is a global effort for planetary defense. The International
    Astronomical Search Collaboration (IASC) is the leading global educational outreach
    program that provides high-quality astronomical datasets to citizen scientists
    to discover asteroids. Since December 4, 2020, the Pan-African Citizen Science
    e-Lab (PACS e-Lab) has been IASC's biggest partner on the continent in recruiting
    and training citizen scientists in asteroid search endeavors. Over 30 asteroids
    have been discovered by 60 citizen scientists. About 595 citizen scientists from
    over 40 countries have been engaged in the project up to the time of composing
    this literature. The group is set to expand its endeavors to the rest of the continent
    and aims to engage thousands of citizen scientists.
