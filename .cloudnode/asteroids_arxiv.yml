- entry_id: http://arxiv.org/abs/2410.08585v1
  short_id: 2410.08585v1
  title: Blind and robust reconstruction of adaptive optics point spread functions
    for asteroid deconvolution and moon detection
  authors:
  - name: Anthony Berdeu
    affiliation:
    - LESIA
  - name: Férréol Soulez
    affiliation:
    - CRAL
  - name: Kate Minker
    affiliation:
    - OCA
  - name: Benoit Carry
    affiliation:
    - OCA
  - name: Guillaume Bourdarot
    affiliation:
    - MPE
  - name: Antoine Kaszczyc
    affiliation:
    - CRAL
  - name: Maud Langlois
    affiliation:
    - CRAL
  summary: Initially designed to detect and characterize exoplanets, extreme adaptive
    optics systems (AO) open a new window on the solar system by resolving its small
    bodies. Nonetheless, despite the always increasing performances of AO systems,
    the correction is not perfect, degrading their image and producing a bright halo
    that can hide faint and close moons. Using a reference point spread function (PSF)
    is not always sufficient due to the random nature of the turbulence. In this work,
    we present our method to overcome this limitation. It blindly reconstructs the
    AO-PSF directly in the data of interest, without any prior on the instrument nor
    the asteroid's shape. This is done by first estimating the PSF core parameters
    under the assumption of a sharp-edge and flat object, allowing the image of the
    main body to be deconvolved. Then, the PSF faint extensions are reconstructed
    with a robust penalization optimization, discarding outliers on-the-fly such as
    cosmic rays, defective pixels and moons. This allows to properly model and remove
    the asteroid's halo. Finally, moons can be detected in the residuals, using the
    reconstructed PSF and the knowledge of the outliers learned with the robust method.
    We show that our method can be easily applied to different instruments (VLT/SPHERE,
    Keck/NIRC2), efficiently retrieving the features of AO-PSFs. Compared with state-of-the-art
    moon enhancement algorithms, moon signal is greatly improved and our robust detection
    method manages to discriminate faint moons from outliers.
