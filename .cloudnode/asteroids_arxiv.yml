- entry_id: http://arxiv.org/abs/2605.26790v3
  short_id: 2605.26790v3
  title: Pretrained Approximators for Low-Thrust Trajectory Cost and Reachability
  authors:
  - name: Zhong Zhang
    affiliation: []
  - name: Giacomo Acciarini
    affiliation: []
  - name: Dario Izzo
    affiliation: []
  - name: Hexi Baoyin
    affiliation: []
  - name: Francesco Topputo
    affiliation: []
  summary: Low-thrust trajectory design relies heavily on repeated evaluations of
    fuel consumption and transfer feasibility, which require expensive optimal control
    solutions. In this work, we show these quantities can be accurately approximated
    by machine learning surrogates, enabling fast and scalable evaluation across a
    wide range of scenarios. By increasing both dataset size and model capacity, we
    observe that low-thrust trajectory optimization follows a scaling law, with performance
    improving linearly with the logarithm of training data and network parameters,
    and no evidence of saturation within the explored regime. Guided by this observation,
    we construct a large-scale dataset using the proposed homotopy-ray strategy tailored
    to mission design requirements. A key is the introduction of a self-similar transformation,
    which allows generalization across semi-major axes, inclinations, and central
    bodies avoiding retraining. As a result, the same neural approximator can be applied
    to diverse orbital environments and mission classes. The proposed models accurately
    predict optimal fuel consumption and minimum transfer time for single- and multi-revolution
    transfers. Their performance and generalization are demonstrated on a public dataset,
    a multi-asteroid flyby problem from the Global Trajectory Optimization Competition,
    and an asteroid rendezvous mission design. The models and datasets are released
    as open-source to support the space community.
