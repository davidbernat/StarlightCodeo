  title: Apsidal Precession in Binary Asteroids
  authors:
  - name: Alex J Meyer
    affiliation: []
  - name: Daniel J Scheeres
    affiliation: []
  summary: While the secondary in a binary asteroid plays an important role in the
    precession of the mutual orbit, this role has not been thoroughly studied. Given
    the complex spin-orbit coupled dynamics in binary asteroids, we use a numerical
    approach to study the relationship between the secondary's shape and spin and
    the apsidal precession rate of the orbit. Using this approach in conjunction with
    observations of Didymos, we find it is likely that Dimorphos was significantly
    reshaped as a result of the DART impact, with its new shape more elongated than
    the pre-impact shape. Finally, we show that non-principal axis rotation of the
    secondary can lead to a chaotic evolution of the longitude of the periapsis.
