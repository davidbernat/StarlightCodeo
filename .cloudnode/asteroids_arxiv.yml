- entry_id: http://arxiv.org/abs/2606.25031v2
  short_id: 2606.25031v2
  title: 'The swallowed spike: the formation of light primordial black hole structures
    around heavy seeds'
  authors:
  - name: Agnese Tolino
    affiliation: []
  - name: Francesca Scarcella
    affiliation: []
  - name: Bradley J. Kavanagh
    affiliation: []
  - name: Valentina De Romeri
    affiliation: []
  - name: Daniele Gaggero
    affiliation: []
  summary: Spikes are steep enhancements in the dark matter (DM) distribution around
    a heavy compact object. If the compact object is primordial, and the bulk of the
    DM is also composed of (lighter) primordial compact objects, for instance asteroid-mass
    primordial black holes (PBHs), the phenomenology of spike formation is highly
    non-trivial. In fact, lighter PBHs have negligible angular momentum at formation
    with respect to the massive central object and would therefore be captured unless
    enough torque is exerted from either small-scale or large-scale matter fluctuations.
    In this paper, we present the first comprehensive assessment of this scenario.
    We define the mechanisms and the initial conditions that allow light PBHs to avoid
    capture. We then quantify the different types of torque and follow the corresponding
    angular momentum evolution with a combination of analytical prescriptions and
    numerical simulations. We find that in the innermost region no mechanism studied
    here is capable of providing enough torque; the resulting inner core is expected
    to be significantly less dense than in particle scenarios, potentially leading
    to interesting phenomenology.
