- entry_id: http://arxiv.org/abs/2512.11144v1
  short_id: 2512.11144v1
  title: 'Asteroid Occultations with VERITAS: Observations and Considerations'
  authors:
  - name: Joshua Bartkoske
    affiliation:
    - for the VERITAS Collaboration
  - name: Anne Duerr
    affiliation: []
  - name: Dave Kieda
    affiliation: []
  summary: Occultations, the covering up of one celestial body by another celestial
    body, have been used in astronomy for millennia to learn about the sun and moon.
    Since 2018, VERITAS has implemented a program to detect predicted asteroid occultations,
    where an asteroid covers up a star. VERITAS has attempted to observe over 100
    occultations to date and successfully observed 20 occultations. With these occultations,
    VERITAS can directly measure the smallest angular diameters of any instrument
    or technique in the optical for stars between magnitude 9 and 13. Each angular
    diameter is measured by fitting the diffraction pattern observed by the central
    VERITAS pixel at the start and end of an occultation. Once a planned FADC upgrade
    is complete, VERITAS will begin a program to search for serendipitous occultations
    within its full field of view (3 deg). Serendipitous occultations of sub-km trans-Neptunian
    objects (TNOs) have the potential to constrain models of solar system formation.
    This work details how VERITAS predicts and observes occultations as well as the
    overall status of the asteroid occultation program and future steps for observing
    occultations of both asteroids and TNOs.
