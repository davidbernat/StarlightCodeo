    affiliation: []
  summary: In this proceedings, we study the possible gravitational impact of primordial
    black holes (PBHs) or dark matter (DM) clumps on GNSS satellite orbits and gravimeter
    measurements. It provides a preliminary step to the future exhaustive statistical
    analysis over 28 years of gravimeter and GNSS data to get constraints over the
    density of asteroid-mass PBH and DM clumps inside the solar system. Such constraints
    would be the first to be obtained by direct observation on a terrestrial scale.
