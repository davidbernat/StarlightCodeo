- entry_id: http://arxiv.org/abs/2504.11405v1
  short_id: 2504.11405v1
  title: Size-Frequency Distribution of Terrestrial Leftover Planetesimals and S-complex
    Implanted Asteroids
  authors:
  - name: Rogerio Deienno
    affiliation: []
  - name: Andre Izidoro
    affiliation: []
  - name: David Nesvorny
    affiliation: []
  - name: William F. Bottke
    affiliation: []
  - name: Fernando Roig
    affiliation: []
  - name: Simone Marchi
    affiliation: []
  summary: The isotopic composition of meteorites linked to S-complex asteroids has
    been used to suggest that these asteroids originated in the terrestrial planet's
    region, i.e., within 1.5 au, and later got implanted into the main asteroid belt
    (MAB). Dynamical models of planet formation support this view. Yet, it remains
    to be demonstrated whether the currently observed size-frequency distribution
    (SFD) of S-complex bodies in the MAB can be reproduced via this implantation process.
    Here we studied the evolution of the SFD of planetesimals during the accretion
    of terrestrial planets with the code LIPAD self-consistently accounting for growth
    and fragmentation of planetesimals. In our simulations we vary the initial surface
    density of planetesimals, the gaseous disk lifetime, and the power slope of the
    initial planetesimals' SFD. We compared the final SFDs of leftover planetesimals
    in the terrestrial planet region with the SFD of observed S-complex MAB objects
    (D $>$ 100km). We found that the SFDs of our planetesimal populations and that
    of S-complex MAB objects show very similar cumulative power index (i.e., q $\approx$
    3.15 in N($>$D)$~\propto$ D$^{-q}$) for slopes in the diameter range 100 km $<$
    D $<$ 400 km by the end of our simulations. Our results support the hypothesis
    of S-complex MAB implantation from the terrestrial planet forming region, assuming
    implantation is size-independent, and implies that implantation efficiency is
    smaller than $\mathcal{O}$(10$^{\rm -2}$--10$^{\rm -4}$) to avoid over-implantation
    of (4) Vesta-sized objects or larger.
