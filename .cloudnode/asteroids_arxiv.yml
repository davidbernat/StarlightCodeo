  title: 'Unjamming in a 3D Granular System: The Micromechanical Role of Friction
    in Force Distributions and Rheological Properties'
  authors:
  - name: Vicente Salinas
    affiliation: []
  - name: Héctor Alarcón
    affiliation: []
  - name: Eduardo Rojas
    affiliation: []
  - name: Pablo Gutiérrez
    affiliation: []
  - name: Gustavo Castillo
    affiliation: []
  summary: "In this work, we investigate the unjamming transition in a three-dimensional\
    \ granular system composed of frictional spheres, in which the packing fraction\
    \ is systematically reduced by random particle extractions. Using Discrete Element\
    \ Method (DEM) simulations, we analyze the evolution of key micro-mechanical quantities,\
    \ such as the interparticle forces, the coordination number and the overall packing\
    \ density as a function of the interparticle friction coefficient. Our results\
    \ reveal friction-dependent relationships on structural as well as mechanical\
    \ observables, and exhibit trends that are qualitatively consistent with observations\
    \ reported in dense granular systems. These trends persist despite the very different\
    \ driving mechanism considered here.\n  This paper is part of the thematic issue\
    \ \\emph{``Sand, silos and asteroids: clustering challenges in granular materials\
    \ research''}."
