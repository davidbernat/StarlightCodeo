- entry_id: http://arxiv.org/abs/2504.10715v3
  short_id: 2504.10715v3
  title: Inferring Fireball Velocity Profiles and Characteristic Parameters of Meteoroids
    from Incomplete Datasets
  authors:
  - name: Eloy Peña-Asensio
    affiliation: []
  - name: Maria Gritsevich
    affiliation: []
  summary: Extracting additional information from old or incomplete fireball datasets
    remains a challenge. To address missing point-by-point observations, we introduce
    a method for estimating atmospheric flight parameters of meteoroids using metaheuristic
    optimization techniques. Using a fireball catalog from the European Fireball Network
    (EN), we reconstruct velocity profiles, meteoroid bulk densities, mass loss rates,
    and ablation and ballistic coefficients, based on the initial and terminal points'
    height, velocity, and mass with the purely dynamical $α$-$β$ model. Additionally,
    the method's performance is compared to the Meteorite Observation and Recovery
    Project (MORP) derived fits, confirming the robustness of the computed parameters
    for objects with asteroidal compositions. Our findings show that $α$-$β$ model
    yields parameters consistent with the photometric and dynamic mass estimates in
    the EN catalog for $P_E$ type I events. However, in the implementation proposed
    here, $α$-$β$ model encounters limitations in accurately representing the final
    deceleration of more fragile high-velocity meteoroids. This is likely due to challenges
    in representing complex fragmentation processes by fitting only two points, even
    when initial and terminal residuals are minimal. The retrieved $α$-$β$ distribution
    differs from the one derived from MORP data, likely due to the imposed mass constraints,
    which strongly influence the results, especially the bulk density. The results
    suggest that $P_E$ constraints reduce fitting accuracy (from 90% to 44%), while
    flexibility and freedom from assumptions improve $α$-$β$ performance. The method
    yields 26% of the events compatible with the catalog $P_E$ classification. Our
    approach is well-suited for interpreting historical or sparse datasets.
