- entry_id: http://arxiv.org/abs/2501.03031v1
  short_id: 2501.03031v1
  title: Production of linear alkanes via the solid-state hydrogenation of interstellar
    polyynes
  authors:
  - name: G. Fedoseev
    affiliation: []
  - name: X. Li
    affiliation: []
  - name: G. A. Baratta
    affiliation: []
  - name: M. E. Palumbo
    affiliation: []
  - name: K. -J. Chuang
    affiliation: []
  summary: 'Highly unsaturated carbon chains, including polyynes, have been detected
    in many astronomical regions and planetary systems. With the success of the QUIJOTE
    survey of the TMC-1, the community has seen a "boom" in the number of detected
    carbon chains. On the other hand, the Rosetta mission revealed the release of
    fully saturated hydrocarbons, C$_3$H$_8$, C$_4$H$_{10}$, C$_5$H$_{12}$, and (under
    specific conditions) C$_6$H$_{14}$ with C$_7$H$_{16}$, from the comet 67P/Churyumov-Gerasimenko.
    The detection of the latter two is attributed to dust-rich events. Similarly,
    the analysis of samples returned from asteroid Ryugu by Hayabusa2 mission indicates
    the presence of long saturated aliphatic chains in Ryugu''s organic matter. The
    surface chemistry of unsaturated carbon chains under conditions resembling those
    of molecular clouds can provide a possible link among these independent observations.
    However, laboratory-based investigations to validate such a chemistry is still
    lacking. In the present study, we aim to experimentally verify the formation of
    fully saturated hydrocarbons by the surface hydrogenation of C$_{2n}$H$_2$ ($n>1$)
    polyynes under ultra-high vacuum conditions at 10 K. We undertook a two-step experimental
    technique. First, a thin layer of C$_2$H$_2$ ice was irradiated by UV-photons
    ($\geq$ 121 nm) to achieve a partial conversion of C$_2$H$_2$ into larger polyynes:
    C$_4$H$_2$ and C$_6$H$_2$. Afterwards, the obtained photoprocessed ice was exposed
    to H atoms to verify the formation of various saturated hydrocarbons. In addition
    to C$_2$H$_6$, which was investigated previously, the formation of larger alkanes,
    including C$_4$H$_{10}$ and (tentatively) C$_6$H$_{14}$, is confirmed by our study.
    A qualitative analysis of the obtained kinetic data indicates that hydrogenation
    of HCCH and HCCCCH triple bonds proceeds at comparable rates, given a surface
    temperature of 10 K.}'
