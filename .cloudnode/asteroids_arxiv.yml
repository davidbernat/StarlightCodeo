- entry_id: http://arxiv.org/abs/2606.24992v1
  short_id: 2606.24992v1
  title: Synergies Between Pulsar Timing Array and Astrometry
  authors:
  - name: Gabriele Perna
    affiliation: []
  - name: Nicola Bellomo
    affiliation: []
  - name: Daniele Bertacca
    affiliation: []
  summary: The presence of a gravitational wave background can be established not
    only via exquisitely precise pulsar timing array (PTA) measurements, but also
    via astrometric observations. In fact, the very same background responsible for
    the delay in the arrival time of pulse is also responsible of an apparent displacement
    of galactic objects as stars and asteroids. In this chapter we explore the natural
    synergy between the SKA Observatory, and current/future astrometric probes of
    the position of Milky Way objects. On top of presenting the potential of SKAO
    alone in terms of detecting a gravitational wave background, we also demonstrate
    the increased sensitivity that is actually achievable when SKAO measurements are
    used in combination with astrometric ones. In particular, we observe an approximate
    improvement ranging from~$10\%$ up to~$50\%$ in terms of forecast sensitivity
    for a PTA-astrometry joint-analysis.
