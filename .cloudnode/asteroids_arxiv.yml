  title: Improved models for near-Earth asteroids (2100) Ra-Shalom, (3103) Eger, (12711)
    Tukmit & (161989) Cacus
  authors:
  - name: Javier Rodríguez Rodríguez
    affiliation: []
  - name: Enrique Díez Alonso
    affiliation: []
  - name: Santiago Iglesias Álvarez
    affiliation: []
  - name: Saúl Pérez Fernández
    affiliation: []
  - name: Javier Licandro
    affiliation: []
  - name: Miguel R. Alarcon
    affiliation: []
  - name: Miquel Serra-Ricart
    affiliation: []
  - name: Noemi Pinilla-Alonso
    affiliation: []
  - name: Susana Fernández Menéndez
    affiliation: []
  - name: Francisco Javier de Cos Juez
    affiliation: []
  summary: We present 24 new dense lightcurves of the near-Earth asteroids (3103)
    Eger, (161989) Cacus, (2100) Ra-Shalom and (12711) Tukmit, obtained with the Instituto
    Astrofísico Canarias 80 and Telescopio Abierto Remoto 2 telescopes at the Teide
    Observatory (Tenerife, Spain) during 2021 and 2022, in the framework of projects
    visible NEAs observations survey and NEO Rapid Observation, Characterization and
    Key Simulations. The shape models and rotation state parameters ($P$, $λ$, $β$)
    were computed by applying the lightcurve inversion method to the new data altogether
    with the archival data. For (3013) Eger and (161989) Cacus, our shape models and
    rotation state parameters agree with previous works, though they have smaller
    uncertainties. For (2100) Ra-Shalom, our results also agree with previous studies.
    Still, we find that a Yarkovsky - O'Keefe - Radzievskii - Paddack acceleration
    of $\upsilon = (0.223\pm0.237)\times10^{-8}$ rad d$^{-2}$ slightly improves the
    fit of the lightcurves, suggesting that (2100) Ra-Shalom could be affected by
    this acceleration. We also present for the first time a shape model for (12711)
    Tukmit, along with its rotation state parameters ($P=3.484900 \pm 0.000031$ hr,
    $λ= 27^{\circ}\pm 8^{\circ}$, $β= 9^{\circ} \pm 15^{\circ}$).
