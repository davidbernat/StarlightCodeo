    affiliation: []
  summary: Contact binaries are found throughout the solar system. The recent discovery
    of Selam, the satellite of MBA (152830) Dinkinesh, by the NASA LUCY mission has
    made it clear that the term `contact binary' covers a variety of different types
    of bi-modal mass distributions and formation mechanisms. Only by modelling more
    contact binaries can this population be properly understood. We determined a spin
    state and shape model for the Apollo group contact binary asteroid (388188) 2006
    DP14 using ground-based optical and radar observations collected between 2014
    and 2023. Radar delay-Doppler images and continuous wave spectra were collected
    over two days in February 2014, while 16 lightcurves in the Cousins R and SDSS-r
    filters were collected in 2014, 2022 and 2023. We modelled the spin state using
    convex inversion before using the SHAPE modelling software to include the radar
    observations in modelling concavities and the distinctive neck structure connecting
    the two lobes. We find a spin state with a period of $(5.7860\pm0.0001)$ hours
    and pole solution of $λ= (180\pm121)^\circ$ and $β= (-80\pm7)^\circ$ with morphology
    indicating a 520 m long bi-lobed shape. The model's asymmetrical bi-modal mass
    distribution resembles other small NEA contact binaries such as (85990) 1999 JV6
    or (8567) 1996 HW1, which also feature a smaller `head' attached to a larger `body'.
    The final model features a crater on the larger lobe, similar to several other
    modelled contact binaries. The model's resolution is 25 m, comparable to that
    of the radar images used.
