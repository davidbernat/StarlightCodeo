  title: 'SOLO: wide-field asteroid light curve monitoring system for SPHEREx'
  authors:
  - name: Bumhoo Lim
    affiliation: []
  - name: Seungwon Choi
    affiliation: []
  - name: Yoonsoo P. Bach
    affiliation: []
  - name: Masateru Ishiguro
