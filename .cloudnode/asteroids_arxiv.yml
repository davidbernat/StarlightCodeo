- entry_id: http://arxiv.org/abs/2403.14397v1
  short_id: 2403.14397v1
  title: Probing Primordial Black Holes and Dark Matter Clumps in the Solar System
    with Gravimeter and GNSS Networks
  authors:
  - name: Michal Cuadrat-Grzybowski
    affiliation: []
  - name: Sébastien Clesse
    affiliation: []
  - name: Pascale Defraigne
    affiliation: []
  - name: Michel Van Camp
    affiliation: []
  - name: Bruno Bertrand
    affiliation: []
  summary: We show that Global Navigation Satellite Systems (GNSS) and gravimeters
    on Earth and in space can potentially offer the most accurate direct measurement
    of local density of near-Earth asteroid-mass Primordial Black Holes (PBHs) and
    Dark Matter (DM) clumps in the solar system by means of gravitational influence.
    Using semi-analytical methods and Monte Carlo simulation, this paper revisits
    the analysis of the trajectories of DM clumps in the solar system, including both
    captured objects and hyperbolic trajectories. A link is thus made between the
    frequency and distance of Earth overflights for a given mass flux, and a direct
    measure of dark matter clump density in the solar system. We then model the signature
    of a close flyby of a DM object on orbital data from GNSS satellites and gravity
    measurements from gravimeters. We thus obtain a first assessment of the single
    probe sensitivity. It paves the way for an exhaustive statistical analysis of
    28 years of gravimeters and GNSS data to obtain observational constraints on the
    density of the PBHs and DM clumps within the solar system, for the mass range
    $[10^8-10^{17}]$ kg. In addition, our methodology offers a possibility of direct
    detection in cases where DM clumps are endowed with an additional long-range clump-matter
    fifth-force beyond gravity.
