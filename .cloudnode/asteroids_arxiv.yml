  title: Dynamics Around an Asteroid Modeled as a Mass Tripole
  authors:
  - name: L. B. T. Santos
    affiliation: []
  - name: L. O. Marchi
    affiliation: []
  - name: P. A. Sousa-Silva
    affiliation: []
