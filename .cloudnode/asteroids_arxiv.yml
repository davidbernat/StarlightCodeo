- entry_id: http://arxiv.org/abs/2404.10828v1
  short_id: 2404.10828v1
  title: The link between Athor and EL meteorites does not constrain the timing of
    the giant planet instability
  authors:
  - name: Andre Izidoro
    affiliation: []
  - name: Rogerio Deienno
    affiliation: []
  - name: Sean N. Raymond
    affiliation: []
  - name: Matthew S. Clement
    affiliation: []
  summary: The asteroid Athor, residing today in the inner main asteroid belt, has
    been recently associated as the source of EL enstatite meteorites to Earth. It
    has been argued that Athor formed in the terrestrial region -- as indicated by
    similarity in isotopic compositions between Earth and EL meteorites -- and was
    implanted in the belt $\gtrsim$60 Myr after the formation of the solar system.
    A recently published study modelling Athor's implantation in the belt (Avdellidou
    et al 2024) further concluded, using an idealized set of numerical simulations,
    that Athor cannot have been scattered from the terrestrial region and implanted
    at its current location unless the giant planet dynamical instability occurred
    {\em after} Athor's implantation ($\gtrsim$60~Myr). In this work, we revisit this
    problem with a comprehensive suite of dynamical simulations of the implantation
    of asteroids into the belt during the terrestrial planet accretion. We find that
    Athor-like objects can in fact be implanted into the belt long after the giant
    planets' dynamical instability. The probability of implanting Athor analogs when
    the instability occurs at $\lesssim15$~Myr is at most a factor of $\sim$2 lower
    than that of an instability occurring at $\sim100$~Myr after the solar system
    formation. Moreover, Athor's implantation can occur up to $\gtrsim$100 Myr after
    the giant planet instability. We conclude that Athor's link to EL meteorites does
    not constrain the timing of the solar system's dynamical instability.
