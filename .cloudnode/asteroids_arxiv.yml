  - name: Sarvesh Kumar Yadav
    affiliation: []
  summary: The International Liquid Mirror Telescope (ILMT) covers a 22.3' wide strip
    of sky in declination (δ), centred at δ = +29° 21' 41.4'' and right ascension
    (α) in the range 0 h <= α < 24 h. Having a short focal length (f /D ~ 2.4) and
    a large diameter (4 m), makes the ILMT an excellent asteroid hunter. The ILMT
    began its 4th cycle in October 2024, running through May 2025. The astrometric
    accuracy has been improved to 0.1'' , and the PyLMT - a detection and classification
    pipeline -, has been fine-tuned using data from previous cycles. The current detection
    rate is tens of transients detected each night with high accuracy in classification
    and identification. We present statistical results for the asteroids detected
    during ILMT's Cycles 1-4. We first evaluate the astrometric performance of the
    detections across different ecliptic latitude ranges. We then describe the positions,
    apparent motions, and V magnitudes predicted by the Minor Planet Center (MPC)
    for the asteroids observed in the SDSS g', r', and i' bands. Finally, we assess
    the ILMT's potential for detecting near-Earth objects (NEOs), potentially hazardous
    asteroids (PHAs), and comets.
