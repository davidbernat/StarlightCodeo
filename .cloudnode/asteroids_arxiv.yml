  title: Rotational and radio emission properties of PSR J0738-4042 over half a century
  authors:
  - name: M. E. Lower
    affiliation: []
  - name: S. Johnston
    affiliation: []
  - name: A. Karastergiou
    affiliation: []
  - name: P. R. Brook
