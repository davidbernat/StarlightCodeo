- entry_id: http://arxiv.org/abs/2510.27092v1
  short_id: 2510.27092v1
  title: 'Micrometeoroid Impacts: Dual Pathways for Iron Reduction and Oxidation on
    Lunar and Asteroidal Surfaces'
  authors:
  - name: Ziyu Huang
    affiliation: []
  - name: Masatoshi Hirabayashi
    affiliation: []
  - name: Thomas M. Orlando
    affiliation: []
  summary: Nanophase metallic iron ( $\mathrm{npFe}^0$ ) is a key indicator of space
    weathering on the lunar surface, primarily attributed to solar wind irradiation
    and micrometeoroid impacts. Recent discoveries of hematite ( $\mathrm{Fe}_2 \mathrm{O}_3$
    ), a highly oxidized form of iron, in the lunar polar regions challenge the prevailing
    understanding of the Moon's reducing environment. This study, using ReaxFF molecular
    dynamics simulations of micrometeoroid impacts on fayalite ( $\mathrm{Fe}_2 \mathrm{SiO}_4$
    ), investigates the atomistic mechanisms leading to both reduced and oxidized
    iron species. Our simulations reveals that the high-temperature and pressure conditions
    at the impact crater surface produces a reduced iron environment while providing
    a transient oxygen-rich environment in the expanding plume. Our findings bridge
    previously disparate observations-linking impact-driven $\mathrm{npFe}^0$ formation
    to the puzzling presence of oxidized iron phases on the Moon, completing the observed
    strong dichotomous distribution of hematite between the nearside and farside of
    the Moon. These findings highlight that micrometeoroid impacts, by simultaneously
    generating spatially distinct redox environments, provide a formation mechanism
    that reconciles the ubiquitous identification of nanophase metallic iron ( $\mathrm{npFe}^0$
    ) in returned lunar samples with $\mathrm{Fe}^{3+}$ signatures detected by remote
    sensing. This underscores the dynamic nature of space weathering processes. For
    a more nuanced understanding of regolith evolution, we should also consider the
    presence of different generations or types of $\mathrm{npFe}{ }^0$, such as those
    formed from solar wind reduction versus impact disproportionation.
