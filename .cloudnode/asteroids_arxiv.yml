- entry_id: http://arxiv.org/abs/2310.14699v1
  short_id: 2310.14699v1
  title: 'Gaia Focused Product Release: Asteroid orbital solution. Properties and
    assessment'
  authors:
  - name: ' Gaia Collaboration'
    affiliation: []
  - name: P. David
    affiliation: []
  - name: F. Mignard
    affiliation: []
  - name: D. Hestroffer
    affiliation: []
  - name: P. Tanga
    affiliation: []
  summary: Context. We report the exploitation of a sample of epoch astrometry for
    157 000 asteroids, the same object in the Gaia Data Release 3, extended over the
    time coverage planned for the Gaia DR4, which is not expected before the end of
    2025. This data set covers more than one full orbital period for the vast majority
    of these asteroids. The orbital solutions are derived from the Gaia data alone
    over a relatively short arc compared to the observation history of many of these
    asteroids. Aims. The work aims to produce orbital elements for a large set of
    asteroids based on 66 months of accurate astrometry provided by Gaia and to assess
    the accuracy of these orbital solutions with a comparison to the best available
    orbits derived from independent observations. A second validation is performed
    with accurate occultation timings. Methods. We processed the raw astrometric measurements
    of Gaia to obtain astrometric positions of moving objects with 1D sub-mas accuracy
    at the bright end. For each asteroid that we matched to the data, an orbit fitting
    was attempted in the form of the best fit of the initial conditions at the median
    epoch. Results. Orbits are provided in the form of state vectors in the International
    Celestial Reference Frame for 156 764 asteroids, including near-Earth objects,
    main-belt asteroids, and Trojans. For the asteroids with the best observations,
    the (formal) relative uncertainty is better than 1E10. Results are compared to
    orbits available from the Jet Propulsion Laboratory and MPC. Their orbits are
    based on much longer data arcs, but from positions of lower quality. The relative
    differences in semi-major axes have a mean of 5E10 and a scatter of 5E9.
