- entry_id: http://arxiv.org/abs/2503.17099v1
  short_id: 2503.17099v1
  title: An Energy-Angular Momentum Phase Function for Rubble Pile Asteroids
  authors:
  - name: D. J. Scheeres
    affiliation: []
  summary: This work analyzes the energetics of asteroid rubble piles in order to
    understand what asteroid morphologies should naturally arise from their formation
    and evolution process. In doing this, a phase diagram is developed that maps out
    the range of final minimum energy states that a collapsing gravitational aggregate
    can achieve as a function of total angular momentum and mass distribution. This
    is developed assuming properties associated with rubble pile asteroids, and can
    provide insight into the formation and subsequent evolution of contact binaries
    and orbital binaries in the solar system as an outcome of catastrophic disruptions.
    The system angular momentum is used as an independent parameter, combined with
    resulting minimum energy configurations as a simple function of mass morphology
    of the final system. The configuration of systems with an energy boosted above
    the minimum energy state are also considered. This paper considers an ideal case,
    but outlines general results that can be continued for more precise models of
    distributed granular media modeled using continuum models or using discrete element
    models.
