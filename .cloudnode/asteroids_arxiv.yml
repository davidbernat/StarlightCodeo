- entry_id: http://arxiv.org/abs/2509.17642v1
  short_id: 2509.17642v1
  title: An ancient L- type family associated to (460) Scania in the Middle Main Belt
    as revealed by Gaia DR3 spectra
  authors:
  - name: Roberto Balossi
    affiliation: []
  - name: Paolo Tanga
    affiliation: []
  - name: Marco Delbo
    affiliation: []
  - name: Alberto Cellino
    affiliation: []
  - name: Federica Spoto
    affiliation: []
  summary: Asteroid families are typically identified using hierarchical clustering
    methods (HCM) in the proper element phase space. However, these methods struggle
    with overlapping families, interlopers, and the detection of older structures.
    Spectroscopic data can help overcome these limitations. The Gaia Data Release
    3 (DR3) contains reflectance spectra at visible wavelengths for 60,518 asteroids
    over the range between 374-1034 nm, representing a large sample that is well suited
    to studies of asteroid families. Using Gaia spectroscopic data, we investigate
    a region in the central Main Belt centered around 2.72 AU, known for its connection
    to L- type asteroids. Conflicting family memberships reported by different HCM
    implementations underscore the need for an independent dynamical analysis of this
    region. We determine family memberships by applying a color taxonomy derived from
    Gaia data and by assessing the spectral similarity between candidate members and
    the template spectrum of each family. We identify an L- type asteroid family in
    the central Main Belt, with (460) Scania as its largest member. Analysis of the
    family's V-shape indicates that it is relatively old, with an estimated age of
    approximately 1 Gyr, which likely explains its non detection by the HCM. The family's
    existence is supported by statistical validation, and its distribution in proper
    element space is well reproduced by numerical simulations. Independent evidence
    from taxonomy, polarimetry, and spin-axis obliquities consistently supports the
    existence of this L- type family. This work highlights the value of combining
    dynamical and physical data to characterize asteroid families and raises questions
    about the origin of L- type families, potentially linked to primordial objects
    retaining early protoplanetary disk properties. Further spectroscopic data are
    needed to clarify these families.
