- entry_id: http://arxiv.org/abs/2409.02807v4
  short_id: 2409.02807v4
  title: Primordial regular black holes as all the dark matter. II. Non-time-radial-symmetric
    and loop quantum gravity-inspired metrics
  authors:
  - name: Marco Calzà
    affiliation: []
  - name: Davide Pedrotti
    affiliation: []
  - name: Sunny Vagnozzi
    affiliation: []
  summary: 'It is a common belief that a theory of quantum gravity should ultimately
    cure curvature singularities which are inevitable within General Relativity, and
    plague for instance the Schwarzschild and Kerr metrics, usually considered as
    prototypes for primordial black holes (PBHs) as dark matter (DM) candidates. We
    continue our study, initiated in a companion paper, of non-singular objects as
    PBHs, considering three regular non-tr (non-time-radial)-symmetric metrics, all
    of which are one-parameter extensions of the Schwarzschild space-time: the Simpson-Visser,
    Peltola-Kunstatter, and D''Ambrosio-Rovelli space-times, with the latter two motivated
    by loop quantum gravity. We study evaporation constraints on PBHs described by
    these regular metrics, deriving upper limits on $f_{\text{pbh}}$, the fraction
    of DM in the form of PBHs. Compared to their Schwarzschild counterparts, these
    limits are weaker, and result in a larger asteroid mass window where all the DM
    can be in the form of PBHs, with the lower edge moving potentially more than an
    order of magnitude. Our work demonstrates as a proof-of-principle that quantum
    gravity-inspired space-times can simultaneously play an important role in the
    resolution of singularities and in the DM problem.'
