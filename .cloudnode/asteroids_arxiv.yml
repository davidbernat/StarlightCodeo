  title: Instantaneous thermally-driven erosion can explain dearth of dark near-Sun
    asteroids
  authors:
  - name: Georgios Tsirvoulis
    affiliation: []
  - name: Mikael Granvik
    affiliation: []
  - name: Leonard Schirner
    affiliation: []
  - name: Athanasia Toliou
    affiliation: []
  - name: Jooyeon Geem
    affiliation: []
  - name: Axel Hagermann
    affiliation: []
  summary: Recent models of the near-Earth asteroid population show that asteroids
    must be super-catastrophically destroyed when they evolve to orbits with perihelion
    passages well inside of Mercury's orbit. The heliocentric distances at which the
    disruptions typically occur are tens of solar radii, which is too far from the
    Sun for asteroids to be destroyed by sublimation and tidal disruption. The typical
    disruption distance also appears to be larger for darker asteroids. Here, by carrying
    out irradiance experiments in vacuum that replicate the conditions in the near-Sun
    environment, we show that CI meteorite simulants are destroyed within minutes
    when exposed to the level of solar irradiance encountered at heliocentric distances
    of up to about 0.2 au. Our results provide an explanation for the scarcity of
    dark, carbonaceous asteroids with perihelion distances less than 0.2 au, and for
    the observed mass-loss rate of the asteroid-like object 322P/SOHO~1 assuming its
    composition is similar to CI carbonaceous chondrites.
