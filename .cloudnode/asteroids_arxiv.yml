- entry_id: http://arxiv.org/abs/2511.11121v2
  short_id: 2511.11121v2
  title: A Simulation Platform for Small Solar System Bodies' Gravity Using the Einstein-Elevator
  authors:
  - name: E. Tahtali
    affiliation: []
  - name: C. Kreuzig
    affiliation: []
  - name: G. Meier
    affiliation: []
  - name: J. Blum
    affiliation: []
  - name: L. Overmeyer
    affiliation: []
  - name: C. Lotz
    affiliation: []
  summary: Small solar system bodies (SSSB), which in this study are defined primarily
    as asteroids and comets, are becoming increasingly important as more data have
    become available for their study. Their significance is also highlighted by missions
    like NASA's OSIRIS-REx or ESA's Rosetta. However, the study of the characteristics
    and behavior of these objects on Earth is a challenge as the simulation of their
    environmental conditions are difficult. We present in this paper an approach to
    enable the gravity simulation of SSSBs such as comets or asteroids in a drop tower
    facility on Earth, which is being addressed as part of the AKUS ("Activity of
    Comets under Partial Gravity") project. This especially concerns gravity levels
    between 10$^{-2}$~\textit{g} and 10$^{-4}$~\textit{g}, where the duration of the
    adjusted acceleration ranges from 2.5 to 3.2 seconds. In order to simulate the
    conditions of SSSB as accurately as possible, an acceleration system based on
    servo motors and spindle axes has been developed. The accelerations are transferred
    from the motors to the spindle axes containing a comet-like sample. The current
    dimensions of the total load (including sample, sample holder, data- and communication
    box) are 315~mm x 160~mm x 331~mm (w x d x h), with a total weight of approximately
    15~kg. These are together placed inside a vacuum chamber providing a vacuum quality
    of 10$^{-6}$~mbar. The whole setup is installed inside the Einstein-Elevator.
    Our results show that, with the current setup, we are able to generate conditions
    from 10$^{-2}$~\textit{g} down to 10$^{-3}$~\textit{g}. The maximum deviations
    under these conditions are $\pm5$$\cdot 10^{-4}$~\textit{g}.
