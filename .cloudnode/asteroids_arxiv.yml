  summary: The isotopic compositions of samples returned from Cb-type asteroid Ryugu
    and Ivuna-type (CI) chondrites are distinct from other carbonaceous chondrites,
    which has led to the suggestion that Ryugu and CI chondrites formed in a different
    region of the accretion disk, possibly around the orbits of Uranus and Neptune.
    We show that, like for Fe, Ryugu and CI chondrites also have indistinguishable
    Ni isotope anomalies, which differ from those of other carbonaceous chondrites.
    We propose that this unique Fe and Ni isotopic composition reflects different
    accretion efficiencies of small FeNi metal grains among the carbonaceous chondrite
    parent bodies. The CI chondrites incorporated these grains more efficiently, possibly
    because they formed at the end of the disk's lifetime, when planetesimal formation
    was also triggered by photoevaporation of the disk. Isotopic variations among
    carbonaceous chondrites may thus reflect fractionation of distinct dust components
    from a common reservoir, implying CI chondrites and Ryugu may have formed in the
    same region of the accretion disk as other carbonaceous chondrites.
