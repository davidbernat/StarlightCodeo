- entry_id: http://arxiv.org/abs/2507.21041v3
  short_id: 2507.21041v3
  title: 'Primordial Black Hole Triggered Type Ia Supernovae I: Impact on Explosion
    Dynamics and Light Curves'
  authors:
  - name: Shing-Chi Leung
    affiliation: []
  - name: Seth Walther
    affiliation: []
  - name: Ken'ichi Nomoto
    affiliation: []
  - name: Alexander Kusenko
    affiliation: []
  summary: Primordial black holes (PBHs) in the asteroid-mass window are compelling
    dark matter candidates, made plausible by the existence of black holes and by
    the variety of mechanisms of their production in the early universe. If a PBH
    falls into a white dwarf (WD), the strong tidal forces can generate enough heat
    to trigger a thermonuclear runaway explosion, depending on the WD mass and the
    PBH orbital parameters. In this work, we investigate the WD explosion triggered
    by the passage of PBH. We perform 2D simulations of the WD undergoing thermonuclear
    explosion in this scenario, with the predicted ignition site as the parameter
    assuming the deflagration-detonation transition model. We study the explosion
    dynamics and predict the associated light curves and nucleosynthesis. We find
    that the model sequence predicts the light curves which align with the Phillip's
    relation ($B_{\max}$ vs. $ΔM_{15}$). Our models hint at a unifying approach in
    triggering Type Ia supernovae without involving two distinctive evolutionary tracks.
