- entry_id: http://arxiv.org/abs/2504.07161v1
  short_id: 2504.07161v1
  title: The Minimum Mass of Planets, Dwarf Planets, and Planetary-scale Satellites
  authors:
  - name: David G. Russell
    affiliation: []
  summary: 'The International Astronomical Union definitions for Planet and Dwarf
    Planet both require that a body has sufficient mass to overcome rigid body forces
    and self gravitate into a nearly round shape. However, quantitative standards
    for determining when a body is sufficiently round have been lacking. Previously
    published triaxial ellipsoid solutions for asteroids, satellites, and Dwarf Planets
    in the radius range 135 to 800 km are examined to identify a minimum mass above
    which the entire population, regardless of composition, is round. From this data,
    the minimum mass to meet the roundness criterion is 5.0 x 10E20 kg. The triaxial
    shape data suggests three radius ranges: (1) bodies with a radius less than 160
    km are non-spheroidal, (2) bodies with a radius in the range 160 to 450 km are
    transitional in shape or nearly round, (3) bodies with a radius greater than 450
    km are spheroidal. Bodies orbiting the Sun with a mass greater than 5.0 x 10E20
    kg are Planets or Dwarf Planets. Arguments are presented for including the 16
    spheroidal moons of the Solar System as a third dynamical class that can be identified
    as Satellite Planets. Definitions are proposed that expand upon the taxonomy started
    in 2006 with the International Astronomomical Union Planet and Dwarf Planet classes.'
