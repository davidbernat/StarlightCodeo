  title: JWST sighting of decameter main-belt asteroids and view on meteorite sources
  authors:
  - name: Artem Y. Burdanov
    affiliation: []
  - name: Julien de Wit
    affiliation: []
  - name: Miroslav Brož
    affiliation: []
  - name: Thomas G. Müller
