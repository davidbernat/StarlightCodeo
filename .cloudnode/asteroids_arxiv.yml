- entry_id: http://arxiv.org/abs/2605.11709v1
  short_id: 2605.11709v1
  title: Synergy between the Cherenkov Telescope Array Observatory and the Vera C.
    Rubin Observatory
  authors:
  - name: J. Biteau
    affiliation: []
  - name: J. Hamo
    affiliation: []
  - name: A. Mikhno
    affiliation: []
  - name: J. Peloton
    affiliation: []
  - name: J. -P. Lenain
    affiliation: []
  summary: 'The Cherenkov Telescope Array Observatory (CTAO) and the Vera C. Rubin
    Observatory are set to transform our understanding of the universe over the next
    decade. These two observatories have multiple areas of complementarity in their
    scientific applications, ranging from constraints on cosmological parameters to
    studies of asteroid occultations. The most opportune area of synergy probably
    lies in the field of time-domain astronomy. Due to their sensitivity and saturation
    limits, it will be difficult for the two observatories to conduct joint studies
    of variable and transient sources in the Milky Way. However, they could offer
    a fresh and rich perspective on non-thermal extragalactic sources, in particular
    gamma-ray bursts, active galactic nuclei and jetted tidal disruption events. Among
    these sources lie the best candidates for multi-messenger research into the origin
    of TeV-PeV neutrinos and multi-EeV cosmic rays. Thus, combined with multi-wavelength
    observations by X-ray satellites and wide-field gamma-ray instruments, the synergy
    between Rubin and the CTAO could provide answers to some of the most important
    questions in astroparticle physics. This scientific potential comes with a challenge:
    selecting a few alerts from the ten million issued by Rubin each night to repoint
    the CTAO telescopes. We use the variability of blazars over timescales ranging
    from a few days to several years as a case study to demonstrate how to address
    this challenge using the Fink broker of Rubin.'
