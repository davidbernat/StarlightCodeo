- entry_id: http://arxiv.org/abs/2512.09478v1
  short_id: 2512.09478v1
  title: Modeling Complex Multiphysics Systems with Discrete Element Method Enriched
    with the Kernel-Independent Fast Multipole Method
  authors:
  - name: Igor A. Ostanin
    affiliation: []
  summary: The paper describes the coupling of the MercuryDPM discrete element method
    (DEM) code and the implementation of the kernel-independent fast multipole method
    (KIFMM). The combined simulation framework allows addressing the large class of
    multiscale problems, including both the mechanical interactions of particulates
    at the fine scale and the long-range interactions of various natures at the coarse
    scale. Among these are electrostatic interactions in powders, clays, and particulates,
    magnetic interactions in ferromagnetic granulates, and gravitational interactions
    in asteroid clouds. The formalism of rigid clumps is successfully combined with
    KIFMM, enabling addressing problems involving complex long-large interactions
    between non-spherical particles with arbitrary charge distributions. The capabilities
    of our technique are demonstrated in several application examples.
