- entry_id: http://arxiv.org/abs/2511.04895v1
  short_id: 2511.04895v1
  title: Novel Solar System Probes for Primordial Black Holes
  authors:
  - name: Oem Trivedi
    affiliation: []
  - name: Abraham Loeb
    affiliation: []
  summary: Primordial Black Holes (PBHs) represent one of the more interesting ways
    to address dark matter, at the interface of both cosmology and quantum gravity.
    It is no surprise then that testing PBHs is a venue of active interest, with several
    cosmological and astrophysical probes constraining different mass ranges. In this
    work, we propose novel Solar System scale searches for PBHs, motivated by the
    unique precision and coverage of local observables. We show that asteroid to dwarf
    planet mass PBHs can induce measurable dipolar timing signatures in pulsar timing
    arrays, while planetary mass PBHs can generate detectable ADAF accretion flares
    through interactions with Kuiper Belt bodies. Together, these complementary approaches
    open a new observational frontier for probing PBHs across mass ranges that remain
    unconstrained by conventional cosmological methods.
