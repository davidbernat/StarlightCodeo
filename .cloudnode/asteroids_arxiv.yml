- entry_id: http://arxiv.org/abs/2602.03630v1
  short_id: 2602.03630v1
  title: Can LLMs Do Rocket Science? Exploring the Limits of Complex Reasoning with
    GTOC 12
  authors:
  - name: Iñaki del Campo
    affiliation: []
  - name: Pablo Cuervo
    affiliation: []
  - name: Victor Rodriguez-Fernandez
    affiliation: []
  - name: Roberto Armellin
    affiliation: []
  - name: Jack Yarndley
    affiliation: []
  summary: 'Large Language Models (LLMs) have demonstrated remarkable proficiency
    in code generation and general reasoning, yet their capacity for autonomous multi-stage
    planning in high-dimensional, physically constrained environments remains an open
    research question. This study investigates the limits of current AI agents by
    evaluating them against the 12th Global Trajectory Optimization Competition (GTOC
    12), a complex astrodynamics challenge requiring the design of a large-scale asteroid
    mining campaign. We adapt the MLE-Bench framework to the domain of orbital mechanics
    and deploy an AIDE-based agent architecture to autonomously generate and refine
    mission solutions. To assess performance beyond binary validity, we employ an
    "LLM-as-a-Judge" methodology, utilizing a rubric developed by domain experts to
    evaluate strategic viability across five structural categories. A comparative
    analysis of models, ranging from GPT-4-Turbo to reasoning-enhanced architectures
    like Gemini 2.5 Pro, and o3, reveals a significant trend: the average strategic
    viability score has nearly doubled in the last two years (rising from 9.3 to 17.2
    out of 26). However, we identify a critical capability gap between strategy and
    execution. While advanced models demonstrate sophisticated conceptual understanding,
    correctly framing objective functions and mission architectures, they consistently
    fail at implementation due to physical unit inconsistencies, boundary condition
    errors, and inefficient debugging loops. We conclude that, while current LLMs
    often demonstrate sufficient knowledge and intelligence to tackle space science
    tasks, they remain limited by an implementation barrier, functioning as powerful
    domain facilitators rather than fully autonomous engineers.'
